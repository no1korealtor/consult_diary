<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>일정 상세</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .info {
            margin-bottom: 10px;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="title" id="contractType"></div>

        <div class="info" id="address"></div>

        <div class="info" id="entrancePassword" style="color: #ef4444; font-size: 16px; font-weight: bold;"></div>

        <div class="info" id="date"></div>

        <div class="info" id="memo"></div>

    </div>

    <div style="text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold;">
        강북3고객센터 <a href="tel:1588-5788" style="color: #3b82f6; text-decoration: none;">1588-5788</a>
    </div>

    <button type="button" onclick="openKakaoMap()" style="background-color: #FEE500; color: #000000; border: none; font-weight: bold;">
        카카오맵 길찾기
    </button>

    <button type="button" onclick="goSettlement()">
        공과금 정산
    </button>

    <button onclick="editDeal()">
        일정 수정
    </button>

    <button onclick="deleteDeal()">
        일정 삭제
    </button>

    <button onclick="location.href='deal-register.html'" style="background: #e5e7eb; color: #374151;">
        목록으로 돌아가기
    </button>

    <script src="auth-helper.js"></script>
    <script>

        const params =
            new URLSearchParams(
                window.location.search
            );

        const dealId =
            params.get('id');

        async function loadDeal() {

            const { data, error } =
                await supabaseClient
                    .from('deals')
                    .select(`
                        *,
                        buildings (
                            road_address,
                            entrance_password
                        ),
                        rooms (
                            room_name
                        )
                    `)
                    .eq('id', dealId)
                    .eq('user_id', window.currentUser.id)
                    .single();

            if (error) {
                console.log(error);
                return;
            }

            document.getElementById(
                'contractType'
            ).innerText =
                data.contract_type;

            document.getElementById(
                'address'
            ).innerText =
                data.buildings.road_address
                + ' '
                + data.rooms.room_name;

            const pwd = data.buildings.entrance_password;
            document.getElementById('entrancePassword').innerText = pwd ? '공동현관 비밀번호: ' + pwd : '';

            document.getElementById(
                'date'
            ).innerText =
                data.balance_date;

            document.getElementById(
                'memo'
            ).innerText =
                data.memo || '';

        }

        function openKakaoMap() {
            const address =
                document.getElementById(
                    'address'
                ).innerText;

            const url =
                'https://map.kakao.com/link/search/'
                + encodeURIComponent(address);

            window.open(url);
        }

        function goSettlement() {

            alert('다음 단계에서 연결 예정');

        }

        function editDeal() {

            alert('다음 단계에서 연결 예정');

        }

        async function deleteDeal() {

            const ok =
                confirm('일정을 삭제할까요?');

            if (!ok) return;

            const { error } =
                await supabaseClient
                    .from('deals')
                    .delete()
                    .eq('id', dealId);

            if (error) {

                alert(error.message);

                return;
            }

            alert('삭제 완료');

            location.href =
                'schedule-list.html';

        }

        async function init() {
            const user = await requireAuth();
            if (user) {
                loadDeal();
            }
        }
        init();

    </script>

</body>

</html>
