<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>일정 상세</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .info {
            margin-bottom: 10px;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="title" id="contractType"></div>

        <div class="info" id="address"></div>

        <div class="info" id="entrancePassword" style="color: #ef4444; font-size: 16px; font-weight: bold;"></div>

        <div class="info" id="date"></div>

        <div class="info" id="memo"></div>

        <div id="meterInfo" style="margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 10px; font-size: 16px; color: #4b5563; display: none;">
            <div style="font-weight: bold; margin-bottom: 5px; color: #1f2937;">최근 정산 입력정보</div>
            <div id="meterData"></div>
        </div>

    </div>

    <div style="text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold;">
        강북3고객센터 <a href="tel:1588-5788" style="color: #3b82f6; text-decoration: none;">1588-5788</a>
    </div>

    <button type="button" onclick="openKakaoMap()" style="background-color: #FEE500; color: #000000; border: none; font-weight: bold;">
        카카오맵 길찾기
    </button>

    <button type="button" onclick="goSettlement()">
        공과금 정산정보입력
    </button>

    <button onclick="editDeal()">
        일정 수정
    </button>

    <button onclick="deleteDeal()">
        일정 삭제
    </button>

    <button onclick="location.href='deal-register.html'" style="background: #e5e7eb; color: #374151;">
        목록으로 돌아가기
    </button>

    <script src="auth-helper.js"></script>
    <script>

        const params =
            new URLSearchParams(
                window.location.search
            );

        const dealId =
            params.get('id');

        async function loadDeal() {

            const { data, error } =
                await supabaseClient
                    .from('deals')
                    .select(`
                        *,
                        buildings (
                            jibun_address,
                            road_address,
                            entrance_password
                        ),
                        rooms (
                            room_name
                        )
                    `)
                    .eq('id', dealId)
                    .eq('user_id', window.currentUser.id)
                    .single();

            if (error) {
                console.log(error);
                return;
            }

            document.getElementById(
                'contractType'
            ).innerText =
                data.contract_type;

            let finalAddress = data.buildings.road_address;
            if (data.buildings.jibun_address) {
                finalAddress += ' (' + data.buildings.jibun_address + ')';
            }
            
            document.getElementById(
                'address'
            ).innerText =
                finalAddress
                + ' '
                + data.rooms.room_name;

            const pwd = data.buildings.entrance_password;
            document.getElementById('entrancePassword').innerText = pwd ? '공동현관 비밀번호: ' + pwd : '';

            document.getElementById(
                'date'
            ).innerText =
                data.balance_date;

            document.getElementById(
                'memo'
            ).innerText =
                data.memo || '';

            window.currentBuildingId = data.building_id;
            window.currentRoomId = data.room_id;

            await loadMeters(data.room_id);
        }

        async function loadMeters(roomId) {
            const { data, error } = await supabaseClient
                .from('utility_meters')
                .select('*')
                .eq('room_id', roomId)
                .eq('user_id', window.currentUser.id);

            if (error) {
                document.getElementById('meterInfo').style.display = 'block';
                document.getElementById('meterData').innerHTML = `<div style="color:red;">오류 발생: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                // 데이터가 없는 경우 (아직 입력 안 됨 등) -> 영역은 보이되 없다고 표시
                document.getElementById('meterInfo').style.display = 'block';
                document.getElementById('meterData').innerHTML = `<div style="color:#9ca3af;">입력된 정산 정보가 없습니다.</div>`;
                return;
            }

            let electric = '-', water = '-', gas = '-';
            
            for (let m of data) {
                if (m.type === 'electric') electric = m.meter_last4;
                if (m.type === 'water') water = m.meter_last4;
                if (m.type === 'gas') gas = m.meter_last4;
            }

            document.getElementById('meterInfo').style.display = 'block';
            document.getElementById('meterData').innerHTML = `
                <div>⚡ 전기: ${electric}</div>
                <div>💧 수도: ${water}</div>
                <div>🔥 가스: ${gas}</div>
            `;
        }

        function openKakaoMap() {
            const address =
                document.getElementById(
                    'address'
                ).innerText;

            const url =
                'https://map.kakao.com/link/search/'
                + encodeURIComponent(address);

            window.open(url);
        }

        function goSettlement() {
            if (window.currentBuildingId && window.currentRoomId) {
                location.href = 'meter-register.html?building_id=' + window.currentBuildingId + '&room_id=' + window.currentRoomId + '&deal_id=' + dealId;
            } else {
                alert('일정 정보를 불러오는 중입니다.');
            }
        }

        function editDeal() {

            alert('다음 단계에서 연결 예정');

        }

        async function deleteDeal() {

            const ok =
                confirm('일정을 삭제할까요?');

            if (!ok) return;

            const { error } =
                await supabaseClient
                    .from('deals')
                    .delete()
                    .eq('id', dealId);

            if (error) {

                alert(error.message);

                return;
            }

            alert('삭제 완료');

            location.href =
                'schedule-list.html';

        }

        async function init() {
            const user = await requireAuth();
            if (user) {
                loadDeal();
            }
        }
        init();

    </script>

</body>

</html>
