<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>일정 상세</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .info {
            margin-bottom: 10px;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 18px;
        }
    </style>

</head>

<body>

    <div class="card">

        <div class="title" id="contractType"></div>

        <div class="info" id="address"></div>

        <div class="info" id="date"></div>

        <div class="info" id="memo"></div>

    </div>

    <div style="text-align: center; margin-bottom: 15px; font-size: 18px; font-weight: bold;">
        강북3고객센터 <a href="tel:1588-5788" style="color: #3b82f6; text-decoration: none;">1588-5788</a>
    </div>

    <button type="button" onclick="goSettlement()">
        공과금 정산
    </button>

    <button onclick="editDeal()">
        일정 수정
    </button>

    <button onclick="deleteDeal()">
        일정 삭제
    </button>

    <script>

        const SUPABASE_URL =
            'https://clzrbyplzjdrrscctcsl.supabase.co';

        const SUPABASE_ANON_KEY =
            'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k';

        const supabaseClient =
            window.supabase.createClient(
                SUPABASE_URL,
                SUPABASE_ANON_KEY
            );

        const params =
            new URLSearchParams(
                window.location.search
            );

        const dealId =
            params.get('id');

        async function loadDeal() {

            const { data, error } =
                await supabaseClient
                    .from('deals')
                    .select(`
                        *,
                        buildings (
                            road_address
                        ),
                        rooms (
                            room_name
                        )
                    `)
                    .eq('id', dealId)
                    .single();

            if (error) {
                console.log(error);
                return;
            }

            document.getElementById(
                'contractType'
            ).innerText =
                data.contract_type;

            document.getElementById(
                'address'
            ).innerText =
                data.buildings.road_address
                + ' '
                + data.rooms.room_name;

            document.getElementById(
                'date'
            ).innerText =
                data.balance_date;

            document.getElementById(
                'memo'
            ).innerText =
                data.memo || '';

        }

        function goSettlement() {

            alert('다음 단계에서 연결 예정');

        }

        function editDeal() {

            alert('다음 단계에서 연결 예정');

        }

        async function deleteDeal() {

            const ok =
                confirm('일정을 삭제할까요?');

            if (!ok) return;

            const { error } =
                await supabaseClient
                    .from('deals')
                    .delete()
                    .eq('id', dealId);

            if (error) {

                alert(error.message);

                return;
            }

            alert('삭제 완료');

            location.href =
                'schedule-list.html';

        }

        loadDeal();

    </script>

</body>

</html>
