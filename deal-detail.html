<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>일정 상세</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>

        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        .card {
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .info {
            margin-bottom: 10px;
            font-size: 18px;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 18px;
            cursor: pointer;
        }

    </style>

</head>

<body>

    <div class="card">

        <div
            class="title"
            id="contractType"
        ></div>

        <div
            class="info"
            id="address"
        ></div>

        <div
            class="info"
            id="date"
        ></div>

        <div
            class="info"
            id="memo"
        ></div>

    </div>

    <button type="button" onclick="goSettlement()">
        공과금 정산
    </button>

    <button type="button" onclick="editDeal()">
        일정 수정
    </button>

    <button type="button" onclick="deleteDeal()">
        일정 삭제
    </button>

    <button type="button" onclick="location.href='deal-register.html'">
        목록으로 돌아가기
    </button>

    <script>

        const SUPABASE_URL =
            'https://clzrbyplzjdrrscctcsl.supabase.co';

        const SUPABASE_ANON_KEY =
            'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k';

        const supabaseClient =
            window.supabase.createClient(
                SUPABASE_URL,
                SUPABASE_ANON_KEY
            );

        const params =
            new URLSearchParams(
                window.location.search
            );

        const dealId =
            params.get('id');

        async function loadDeal(){

            if (!dealId) {
                alert('잘못된 접근입니다.');
                location.href = 'deal-register.html';
                return;
            }

            const { data, error } =
                await supabaseClient
                    .from('deals')
                    .select(`
                        *,
                        buildings (
                            road_address
                        ),
                        rooms (
                            room_name
                        )
                    `)
                    .eq('id', dealId)
                    .single();

            if(error){
                console.log(error);
                alert('일정 정보를 불러오지 못했습니다.');
                return;
            }

            document.getElementById(
                'contractType'
            ).innerText =
                data.contract_type;

            const bName = data.buildings ? data.buildings.road_address : '알 수 없는 건물';
            const rName = data.rooms ? data.rooms.room_name : '알 수 없는 호수';

            document.getElementById(
                'address'
            ).innerText =
                bName + ' ' + rName;

            document.getElementById(
                'date'
            ).innerText =
                data.balance_date || '날짜 미정';

            document.getElementById(
                'memo'
            ).innerText =
                data.memo || '';

        }

        function goSettlement(){
            alert('다음 단계에서 연결 예정');
        }

        function editDeal(){
            alert('다음 단계에서 연결 예정');
        }

        async function deleteDeal(){

            const ok =
                confirm('일정을 정말 삭제하시겠습니까?');

            if(!ok) return;

            const { error } =
                await supabaseClient
                    .from('deals')
                    .delete()
                    .eq('id', dealId);

            if(error){
                alert(error.message);
                return;
            }

            alert('삭제 완료');
            location.href = 'deal-register.html';

        }

        loadDeal();

    </script>

</body>

</html>
