<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>하모니카 연습실 (Harmonica Master)</title>
    
    <!-- PWA / 바로가기 아이콘 설정 -->
    <link rel="icon" type="image/png" href="harmonica_icon.png">
    <link rel="apple-touch-icon" href="harmonica_icon.png">
    <link rel="manifest" href="harmonica_manifest.json">
    <meta name="theme-color" content="#1e1e2f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&family=Jua&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            min-height: 100vh;
            box-sizing: border-box;
        }

        @media(min-width: 900px) {
            body {
                display: grid;
                grid-template-columns: 2fr 1fr;
                padding: 20px;
                gap: 20px;
                align-items: start;
            }
            .score-panel {
                grid-column: 1 / 2;
            }
            .right-panels {
                position: sticky;
                top: 20px;
            }
        }

        .right-panels {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel {
            background: #2a2a40;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }
        @media(min-width: 900px) {
            .panel { padding: 20px; }
        }

        .panel-title {
            font-family: 'Jua', sans-serif;
            font-size: 20px;
            color: #4facfe;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media(min-width: 900px) {
            .panel-title { font-size: 24px; margin-bottom: 20px; }
        }

        /* --- Score Viewer --- */
        .score-panel {
            flex-grow: 1;
            min-height: 400px;
        }
        @media(min-width: 900px) {
            .score-panel { 
                height: calc(100vh - 80px); 
            }
        }
        .file-upload {
            background: #3a3a5a;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .score-display {
            flex-grow: 1;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            color: #2d3436;
            font-size: 24px;
            line-height: 2.5;
            overflow-y: auto;
            font-weight: bold;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 10px;
        }
        
        .note-block {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 30px;
        }
        
        .note-dot-up { font-size: 14px; color: #ff758c; height: 10px; }
        .note-dot-down { font-size: 14px; color: #4facfe; height: 10px; margin-top: -5px; }
        .note-number { font-size: 28px; }
        .rest-number { color: #b2bec3; }

        /* --- Metronome --- */
        .bpm-display {
            font-size: 36px;
            font-weight: 800;
            color: #00f2fe;
            text-align: center;
            margin: 10px 0;
        }
        @media(min-width: 900px) {
            .bpm-display { font-size: 48px; }
        }
        input[type=range] {
            width: 100%;
            accent-color: #00f2fe;
            margin-bottom: 20px;
        }
        .btn-play {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
            transition: transform 0.2s;
        }
        .btn-play:active { transform: scale(0.95); }

        /* --- Tuner --- */
        .tuner-note {
            font-size: 40px;
            font-weight: 800;
            color: #1dd1a1;
            text-align: center;
            margin: 10px 0;
        }
        @media(min-width: 900px) {
            .tuner-note { font-size: 50px; }
        }
        .tuner-meter {
            width: 100%;
            height: 15px;
            background: #1e1e2f;
            border-radius: 10px;
            position: relative;
            margin-bottom: 20px;
        }
        .meter-indicator {
            position: absolute;
            top: 0; bottom: 0;
            width: 4px;
            background: #ff4757;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s ease-out;
        }
        .meter-center {
            position: absolute;
            top: 0; bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.3);
            left: 50%;
            transform: translateX(-50%);
        }
        .btn-mic {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .beat-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3a3a5a;
            transition: all 0.1s ease;
        }
        .beat-dot.active {
            background: #00f2fe;
            box-shadow: 0 0 12px #00f2fe;
            transform: scale(1.3);
        }
        .beat-dot.active-strong {
            background: #ff758c;
            box-shadow: 0 0 12px #ff758c;
            transform: scale(1.4);
        }
        .site-footer {
            grid-column: 1 / -1;
            text-align: center;
            padding: 20px;
            background: rgba(42, 42, 64, 0.5);
            border-radius: 15px;
            color: #a0a0b0;
            font-size: 14px;
            line-height: 1.6;
        }
        .site-footer strong {
            color: #4facfe;
            font-size: 16px;
            font-family: 'Jua', sans-serif;
            letter-spacing: 1px;
        }

        /* --- Harmonica Grid --- */
        .harmonica-grid {
            display: grid;
            grid-template-columns: repeat(22, 1fr);
            gap: 1px;
            background: #4facfe;
            border: 2px solid #4facfe;
            border-radius: 8px;
            min-width: 800px;
            overflow: hidden;
        }
        .harmonica-cell {
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Jua', sans-serif;
        }
        .harmonica-cell.top { height: 40px; border-bottom: 1px solid #2a2a40; }
        .harmonica-cell.middle { background: #ffffff; height: 26px; font-size: 16px; border-bottom: 1px solid #dfe6e9; }
        .harmonica-cell.bottom { background: #dfe6e9; height: 26px; font-size: 16px; }
    </style>
</head>
<body>
    
    <!-- Harmonica Layout Panel -->
    <div class="panel" style="position: sticky; top: 0; z-index: 1000; grid-column: 1 / -1; overflow-x: auto; padding: 6px 10px; margin-bottom: 6px; border-radius: 0 0 15px 15px; border-top: none; box-shadow: 0 10px 20px rgba(0,0,0,0.4);">
        <h2 class="panel-title" style="margin-bottom: 4px; font-size: 16px;">🎵 C 메이저 트레몰로 22홀 배열도</h2>
        <div id="harmonica-layout-container"></div>
    </div>

    <!-- Score Viewer Panel -->
    <div class="panel score-panel" style="display: flex; flex-direction: column; padding: 10px;">
        <div class="score-display" id="score-display" style="flex-grow:1; padding:0; overflow:hidden; position:relative;">
            <div id="placeholder-text" style="color:#a0a0b0; font-size:18px; width:100%; text-align:center; position:absolute; top:50%; transform:translateY(-50%);">
                우측(또는 아래)의 '📁 파일 열기' 버튼을 눌러 악보를 불러오세요!
            </div>
        </div>
    </div>

    <div class="right-panels">
        <!-- File Open Panel -->
        <div class="panel" style="padding: 15px;">
            <div class="panel-title" style="margin-bottom: 0;">
                <span style="display:flex; align-items:center; font-size: 18px;">🎼 내 악보 보기</span>
                <label for="pdf-upload" style="cursor: pointer; background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); color: white; padding: 8px 16px; border-radius: 20px; font-size: 15px; font-family: 'Nunito', sans-serif; font-weight: bold; box-shadow: 0 4px 10px rgba(79, 172, 254, 0.3);">
                    📁 파일 열기
                </label>
                <input type="file" id="pdf-upload" accept="application/pdf, image/*" onchange="handleFileUpload(event)" style="display: none;">
            </div>
        </div>

        <!-- Metronome Panel -->
        <div class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 class="panel-title" style="margin: 0;">⏱️ 메트로놈</h2>
                <button class="btn-play" id="play-btn" onclick="toggleMetronome()" style="padding: 8px 16px; font-size: 14px; margin: 0; box-shadow: 0 2px 5px rgba(79, 172, 254, 0.4);">▶ 재생</button>
            </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; flex-wrap:wrap; gap:10px;">
            <div class="bpm-display" style="margin:0;"><span id="bpm-val">120</span> BPM</div>
            <select id="time-signature" onchange="updateTimeSignature(this.value)" style="padding:8px; border-radius:10px; background:#3a3a5a; color:white; border:none; font-size:16px; font-family:'Jua', sans-serif; cursor:pointer; outline:none; max-width:100%; flex-grow:1;">
                <option value="1">기본 (강세 없음)</option>
                <option value="2">2박자 (강-약)</option>
                <option value="3">3박자 (강-약-약)</option>
                <option value="4" selected>4박자 (강-약-중강-약)</option>
                <option value="6">6박자 (강-약-약-중강-약-약)</option>
            </select>
        </div>
        <div id="beat-indicators" style="display:flex; justify-content:center; gap:15px; margin-bottom:20px; height:20px; align-items:center;"></div>
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
            <button onclick="changeBPMBy(-1)" style="background:#3a3a5a; color:white; border:none; border-radius:50%; width:44px; height:44px; font-size:24px; font-weight:bold; cursor:pointer; flex-shrink:0;">-</button>
            <input type="range" id="bpm-slider" min="40" max="240" value="120" oninput="updateBPM(this.value)" style="flex-grow:1; margin-bottom:0;">
            <button onclick="changeBPMBy(1)" style="background:#3a3a5a; color:white; border:none; border-radius:50%; width:44px; height:44px; font-size:24px; font-weight:bold; cursor:pointer; flex-shrink:0;">+</button>
        </div>
    </div>

    <!-- Tuner Panel -->
    <div class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 class="panel-title" style="margin: 0;">🎙️ 튜너</h2>
            <button class="btn-mic" id="mic-btn" onclick="startTuner()" style="padding: 8px 16px; font-size: 14px; margin: 0; box-shadow: 0 2px 5px rgba(255, 71, 87, 0.4);">🎙️ 켜기</button>
        </div>
        <div class="tuner-note" id="note-display">-</div>
        <div class="tuner-meter" style="margin-bottom: 10px;">
            <div class="meter-center"></div>
            <div class="meter-indicator" id="meter-indicator"></div>
        </div>
        <canvas id="oscilloscope" style="width: 100%; height: 35px; background: #1e1e2f; border-radius: 8px; margin-bottom: 0px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);"></canvas>
    </div>
    </div>

    <script>
        // ==========================================
        // 1. PDF / Image Viewer Logic
        // ==========================================
        const dbName = "HarmonicaDB";
        const storeName = "scores";

        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        db.createObjectStore(storeName);
                    }
                };
                request.onsuccess = (event) => resolve(event.target.result);
                request.onerror = (event) => reject(event.target.error);
            });
        }

        async function saveScoreToDB(file) {
            try {
                const db = await initDB();
                const tx = db.transaction(storeName, "readwrite");
                const store = tx.objectStore(storeName);
                store.put(file, "latestScore");
            } catch (e) {
                console.error("Failed to save score to DB", e);
            }
        }

        async function loadScoreFromDB() {
            try {
                const db = await initDB();
                const tx = db.transaction(storeName, "readonly");
                const store = tx.objectStore(storeName);
                const request = store.get("latestScore");
                request.onsuccess = () => {
                    const file = request.result;
                    if (file) {
                        displayFile(file);
                    }
                };
            } catch (e) {
                console.error("Failed to load score from DB", e);
            }
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            displayFile(file);
            saveScoreToDB(file);
        }

        function displayFile(file) {
            const scoreDisplay = document.getElementById('score-display');
            const placeholder = document.getElementById('placeholder-text');
            if (placeholder) placeholder.style.display = 'none';

            const fileURL = URL.createObjectURL(file);
            scoreDisplay.innerHTML = ''; // Clear previous

            if (file.type === 'application/pdf') {
                const embed = document.createElement('embed');
                embed.src = fileURL + '#view=FitV&toolbar=0&navpanes=0&scrollbar=0';
                embed.type = 'application/pdf';
                embed.style.width = '100%';
                embed.style.height = '100%';
                embed.style.border = 'none';
                embed.style.borderRadius = '15px';
                scoreDisplay.appendChild(embed);
            } else if (file.type.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = fileURL;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'contain';
                img.style.borderRadius = '15px';
                scoreDisplay.appendChild(img);
            } else {
                alert("지원하지 않는 파일 형식입니다. (PDF나 이미지만 지원)");
            }
        }

        // ==========================================
        // 2. Metronome Logic (with Time Signature)
        // ==========================================
        let audioCtx;
        let isPlaying = false;
        let bpm = 120;
        let timerID;
        let beatsPerMeasure = 4;
        let currentBeat = 0;

        function changeBPMBy(amount) {
            let slider = document.getElementById('bpm-slider');
            let newVal = parseInt(slider.value) + amount;
            if (newVal < 40) newVal = 40;
            if (newVal > 240) newVal = 240;
            slider.value = newVal;
            updateBPM(newVal);
        }

        function updateBPM(val) {
            bpm = val;
            document.getElementById('bpm-val').innerText = bpm;
            if (isPlaying) {
                clearInterval(timerID);
                timerID = setInterval(playClick, (60 / bpm) * 1000);
            }
        }

        function updateTimeSignature(val) {
            beatsPerMeasure = parseInt(val);
            currentBeat = 0;
            renderBeatIndicators();
        }

        function renderBeatIndicators() {
            const container = document.getElementById('beat-indicators');
            container.innerHTML = '';
            // 1박자일 경우 점을 하나만 표시
            const count = beatsPerMeasure === 1 ? 1 : beatsPerMeasure;
            for (let i = 0; i < count; i++) {
                const dot = document.createElement('div');
                dot.className = 'beat-dot';
                dot.id = `beat-dot-${i + 1}`;
                container.appendChild(dot);
            }
        }

        function playClick() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            currentBeat++;
            if (currentBeat > beatsPerMeasure) {
                currentBeat = 1;
            }

            if (beatsPerMeasure === 1) {
                osc.frequency.value = 800;
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            } else if (currentBeat === 1) {
                osc.frequency.value = 1200; // 강
                gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            } else if ((beatsPerMeasure === 4 && currentBeat === 3) || (beatsPerMeasure === 6 && currentBeat === 4)) {
                osc.frequency.value = 900; // 중강
                gainNode.gain.setValueAtTime(0.7, audioCtx.currentTime);
            } else {
                osc.frequency.value = 700; // 약
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            }
            
            // 시각적 피드백 업데이트
            document.querySelectorAll('.beat-dot').forEach(d => {
                d.classList.remove('active', 'active-strong');
            });
            const currentDot = document.getElementById(`beat-dot-${currentBeat}`);
            if (currentDot) {
                if (currentBeat === 1 && beatsPerMeasure !== 1) {
                    currentDot.classList.add('active-strong');
                } else {
                    currentDot.classList.add('active');
                }
            }

            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function toggleMetronome() {
            const btn = document.getElementById('play-btn');
            if (isPlaying) {
                clearInterval(timerID);
                isPlaying = false;
                currentBeat = 0;
                btn.innerText = '▶ 재생';
                btn.style.background = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                document.querySelectorAll('.beat-dot').forEach(d => d.classList.remove('active', 'active-strong'));
            } else {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                isPlaying = true;
                currentBeat = 0;
                btn.innerText = '⏸ 정지';
                btn.style.background = 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)';
                
                playClick(); 
                timerID = setInterval(playClick, (60 / bpm) * 1000);
            }
        }

        // ==========================================
        // 3. Tuner Logic
        // ==========================================
        let tunerCtx;
        let analyser;
        let stream;
        let reqAnimFrame;
        
        const noteStrings = ["도", "도#", "레", "레#", "미", "파", "파#", "솔", "솔#", "라", "라#", "시"];
        const engStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        function noteFromPitch(frequency) {
            const noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
            return Math.round(noteNum) + 69;
        }

        function frequencyFromNoteNumber(note) {
            return 440 * Math.pow(2, (note - 69) / 12);
        }

        function centsOffFromPitch(frequency, note) {
            return Math.floor(1200 * Math.log(frequency / frequencyFromNoteNumber(note)) / Math.log(2));
        }

        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) rms += buf[i] * buf[i];
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1; 

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (var i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (var i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

            buf = buf.slice(r1, r2);
            SIZE = buf.length;
            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - i; j++) c[i] = c[i] + buf[j] * buf[j + i];
            }
            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            let T0 = maxpos;
            let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
            let a = (x1 + x3 - 2 * x2) / 2;
            let b = (x3 - x1) / 2;
            if (a) T0 = T0 - b / (2 * a);
            return sampleRate / T0;
        }

        async function startTuner() {
            const btn = document.getElementById('mic-btn');
            
            try {
                if(!tunerCtx) tunerCtx = new (window.AudioContext || window.webkitAudioContext)();
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = tunerCtx.createMediaStreamSource(stream);
                analyser = tunerCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);
                
                btn.innerText = '🔴 튜닝 중... (끄기)';
                btn.style.background = 'linear-gradient(135deg, #1dd1a1 0%, #10ac84 100%)';
                btn.onclick = stopTuner;
                
                updatePitch();
            } catch (err) {
                alert("마이크 접근 권한을 허용해주세요!");
            }
        }

        function stopTuner() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
            
            const btn = document.getElementById('mic-btn');
            btn.innerText = '🎙️ 튜너 켜기';
            btn.style.background = 'linear-gradient(135deg, #ff4757 0%, #ff6b81 100%)';
            btn.onclick = startTuner;
            document.getElementById('note-display').innerText = '-';
            document.getElementById('meter-indicator').style.left = '50%';
            
            const canvas = document.getElementById('oscilloscope');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#1e1e2f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
                ctx.moveTo(0, canvas.height/2);
                ctx.lineTo(canvas.width, canvas.height/2);
                ctx.strokeStyle = '#3a3a5a';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function drawOscilloscope(dataArray) {
            const canvas = document.getElementById('oscilloscope');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if (canvas.width !== canvas.clientWidth) canvas.width = canvas.clientWidth;
            if (canvas.height !== canvas.clientHeight) canvas.height = canvas.clientHeight;
            
            const width = canvas.width;
            const height = canvas.height;
            
            ctx.fillStyle = '#1e1e2f';
            ctx.fillRect(0, 0, width, height);
            
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#00f2fe';
            ctx.beginPath();
            
            const sliceWidth = width * 1.0 / dataArray.length;
            let x = 0;
            
            for (let i = 0; i < dataArray.length; i++) {
                // v goes from -1.0 to 1.0. We scale it.
                // multiply by a factor (e.g. 2.0) to make it more visible
                let v = dataArray[i] * 2.5; 
                if (v > 1) v = 1;
                if (v < -1) v = -1;
                
                const y = (v * height / 2) + height / 2;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
                
                x += sliceWidth;
            }
            
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();
        }

        function updatePitch() {
            if(!stream) return;
            let buf = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buf);
            
            drawOscilloscope(buf);
            
            let pitch = autoCorrelate(buf, tunerCtx.sampleRate);
            
            if (pitch !== -1) {
                let note = noteFromPitch(pitch);
                let cents = centsOffFromPitch(pitch, note);
                
                document.getElementById('note-display').innerHTML = `${noteStrings[note % 12]} <span style="font-size:24px; color:#a0a0b0;">(${engStrings[note % 12]})</span>`;
                
                let percent = (cents + 50) / 100;
                percent = Math.max(0, Math.min(1, percent));
                let meterEl = document.getElementById('meter-indicator');
                meterEl.style.left = (percent * 100) + '%';
                
                if (Math.abs(cents) < 5) {
                    meterEl.style.background = '#1dd1a1';
                } else {
                    meterEl.style.background = '#ff4757';
                }
            }
            
            reqAnimFrame = requestAnimationFrame(updatePitch);
        }

        // ==========================================
        // 4. Harmonica Grid Logic
        // ==========================================
        function renderHarmonicaGrid() {
            const middleRow = ['','도','','미','','솔','','도','','미','','솔','','도','','미','','솔','','도','',''];
            const bottomRow = ['레','','파','','라','','시','','레','','파','','라','','시','','레','','파','','라','시'];
            
            // 숫자 악보 표기법 (1~22홀)
            const topRowNumbers = [
                { num: 2, dot: 'bottom' }, // 1: 레 (저음)
                { num: 1, dot: 'bottom' }, // 2: 도 (저음)
                { num: 4, dot: 'bottom' }, // 3: 파 (저음)
                { num: 3, dot: 'bottom' }, // 4: 미 (저음)
                { num: 6, dot: 'bottom' }, // 5: 라 (저음)
                { num: 5, dot: 'bottom' }, // 6: 솔 (저음)
                { num: 7, dot: 'bottom' }, // 7: 시 (저음)
                { num: 1, dot: 'none' },   // 8: 도 (중음)
                { num: 2, dot: 'none' },   // 9: 레 (중음)
                { num: 3, dot: 'none' },   // 10: 미 (중음)
                { num: 4, dot: 'none' },   // 11: 파 (중음)
                { num: 5, dot: 'none' },   // 12: 솔 (중음)
                { num: 6, dot: 'none' },   // 13: 라 (중음)
                { num: 1, dot: 'top' },    // 14: 도 (고음)
                { num: 7, dot: 'none' },   // 15: 시 (중음)
                { num: 3, dot: 'top' },    // 16: 미 (고음)
                { num: 2, dot: 'top' },    // 17: 레 (고음)
                { num: 5, dot: 'top' },    // 18: 솔 (고음)
                { num: 4, dot: 'top' },    // 19: 파 (고음)
                { num: 1, dot: 'top-double' }, // 20: 도 (최고음)
                { num: 6, dot: 'top' },    // 21: 라 (고음)
                { num: 7, dot: 'top' }     // 22: 시 (고음)
            ];

            function getColor(num) {
                if(num <= 7) return '#0984e3'; // 저음 (파랑)
                if(num <= 13) return '#d63031'; // 중음 (빨강)
                if(num <= 19) return '#00b894'; // 고음 (초록)
                return '#e17055'; // 최고음 (주황)
            }

            let html = '<div class="harmonica-grid">';
            
            // 1. Top Row (Numbers)
            for(let i=1; i<=22; i++) {
                const isHighlight = [2,8,14,20].includes(i);
                const bg = isHighlight ? '#fbc2eb' : '#faedcd';
                const note = topRowNumbers[i-1];
                let numberHTML = '';
                
                if (note.dot === 'bottom') {
                    numberHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:3px;"><span style="font-size:16px; font-weight:900; line-height:1;">${note.num}</span><span style="font-size:10px; line-height:0.5; color:rgba(0,0,0,0.6);">●</span></div>`;
                } else if (note.dot === 'top') {
                    numberHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:3px;"><span style="font-size:10px; line-height:0.5; color:rgba(0,0,0,0.6);">●</span><span style="font-size:16px; font-weight:900; line-height:1;">${note.num}</span></div>`;
                } else if (note.dot === 'top-double') {
                    numberHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:3px;"><span style="font-size:8px; line-height:0.5; color:rgba(0,0,0,0.6); letter-spacing:2px; margin-right:-2px;">●●</span><span style="font-size:16px; font-weight:900; line-height:1;">${note.num}</span></div>`;
                } else {
                    numberHTML = `<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;"><span style="font-size:16px; font-weight:900; line-height:1;">${note.num}</span></div>`;
                }

                html += `<div class="harmonica-cell top" style="background:${bg}; color:${getColor(i)};">${numberHTML}</div>`;
            }
            
            // 2. Middle Row (Blow/내쉬기)
            for(let i=1; i<=22; i++) {
                html += `<div class="harmonica-cell middle" style="color:${getColor(i)};">${middleRow[i-1]}</div>`;
            }
            
            // 3. Bottom Row (Draw/마시기)
            for(let i=1; i<=22; i++) {
                html += `<div class="harmonica-cell bottom" style="color:${getColor(i)};">${bottomRow[i-1]}</div>`;
            }
            
            html += '</div>';
            document.getElementById('harmonica-layout-container').innerHTML = html;
        }

        // 초기화
        renderHarmonicaGrid();
        renderBeatIndicators();
        loadScoreFromDB();
    </script>
