<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Detail</title>
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>상담 케이스 상세</h2>
            <a href="case-list.html" class="btn btn-secondary" style="padding: 0.5rem 1rem;">목록으로</a>
        </div>

        <!-- 미처리 상담 접수건 담당자 지정 영역 -->
        <div id="claimActionArea" class="glass-panel" style="display: none; margin-bottom: 2rem; background: linear-gradient(145deg, rgba(239, 68, 68, 0.1), rgba(30, 41, 59, 0.8)); border: 1px solid rgba(239, 68, 68, 0.3); text-align: center;">
            <h3 style="color: #fca5a5; margin-bottom: 0.5rem;">🔔 미처리 온라인 예약 건입니다</h3>
            <p style="color: #cbd5e1; font-size: 0.9rem; margin-bottom: 1.5rem;">이 예약은 아직 담당자가 지정되지 않았습니다. 다른 전문가와 업무가 겹치지 않도록 '진행하기'를 눌러 담당자로 등록해주세요.</p>
            <button id="claimCaseBtn" class="btn" style="background: linear-gradient(to right, #ef4444, #f97316); border: none; font-size: 1.1rem; padding: 0.8rem 2rem; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);">🚀 이 상담 내가 진행하기</button>
        </div>

        <div class="glass-panel" style="margin-bottom: 2rem;">
            <h3>진행 단계</h3>
            <select id="stageSelect">
                <option value="">단계를 선택하세요</option>
            </select>

            <div id="guideSection" style="display: none; margin-top: 1.5rem; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 0.5rem;">
                <h4 style="color: #60a5fa; margin-bottom: 0.5rem;">관련 법령</h4>
                <p id="lawText" style="font-size: 0.9rem; margin-bottom: 1rem; white-space: pre-wrap;"></p>
                
                <h4 style="color: #60a5fa; margin-bottom: 0.5rem;">가이드</h4>
                <p id="guideText" style="font-size: 0.9rem; margin-bottom: 1rem; white-space: pre-wrap;"></p>
                
                <h4 style="color: #60a5fa; margin-bottom: 0.5rem;">체크리스트</h4>
                <div id="checklist" style="font-size: 0.9rem;"></div>
            </div>
        </div>

        <div class="glass-panel">
            <h3>상담 로그</h3>
            
            <form id="logForm" style="display: flex; gap: 0.5rem; margin-bottom: 2rem;">
                <input type="text" id="logInput" placeholder="빠른 메모 입력..." required style="margin-bottom: 0;">
                <button type="submit" class="btn" style="white-space: nowrap; width: auto;">등록</button>
            </form>

            <div class="timeline" id="timeline">
                <div style="text-align: center; color: var(--text-muted);">로딩 중...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, requireAuth, DEMO_MODE } from './supabase-client.js';

        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('id');
        let currentUser = null;

        if (!caseId) {
            window.location.href = 'case-list.html';
        }

        async function init() {
            try {
                await requireAuth();
                
                const { data: { session } } = await supabase.auth.getSession();
                
                if (session) {
                    // Get current user name
                    const { data: userData } = await supabase
                        .from('users')
                        .select('name')
                        .eq('id', session.user.id)
                        .single();
                    
                    currentUser = userData ? userData.name : session.user.email;
                } else {
                    currentUser = "데모 방문자"; // Fallback for demo mode
                }

                await loadStagesAndCase();
                await loadLogs();
                
                // Check if this case is still pending
                if (!DEMO_MODE) {
                    const { data: caseStatusData } = await supabase
                        .from('cases')
                        .select('status')
                        .eq('id', caseId)
                        .single();
                        
                    if (caseStatusData && caseStatusData.status === '온라인접수') {
                        document.getElementById('claimActionArea').style.display = 'block';
                    }
                }
            } catch (err) {
                console.error("Initialization error:", err);
                document.getElementById('timeline').innerHTML = `<div style="color:red; text-align:center;">오류가 발생했습니다:<br>${err.message}</div>`;
            }
        }

        async function loadStagesAndCase() {
            // 1. Get case details first to know the case type
            const { data: caseData } = await supabase
                .from('cases')
                .select('current_stage_id, case_type')
                .eq('id', caseId)
                .single();

            const isPenalty = caseData?.case_type && caseData.case_type.includes('과태료');
            const isAdmin = caseData?.case_type && caseData.case_type.includes('행정처분');

            // 2. Define expected stages based on case_type
            let expectedStages = [];
            if (isPenalty) {
                expectedStages = ['소명', '사전통지', '과태료 부과', '이의제기'];
            } else if (isAdmin) {
                expectedStages = ['조사단계', '사전통지', '행정처분', '불복절차'];
            }

            // 3. Ensure expected stages exist in DB
            for (const stageName of expectedStages) {
                const { data: existing } = await supabase.from('stages').select('id').eq('name', stageName).maybeSingle();
                if (!existing) {
                    await supabase.from('stages').insert([{ name: stageName }]);
                }
            }

            // 4. Load stages for dropdown (Filtered by expected stages if applicable)
            const { data: allStages } = await supabase.from('stages').select('*').order('id');
            const stageSelect = document.getElementById('stageSelect');
            
            if (allStages) {
                allStages.forEach(stage => {
                    // Only add to dropdown if it's in the expected stages, OR if it's '기타' and no expected stages
                    if (expectedStages.length === 0 || expectedStages.includes(stage.name)) {
                        const opt = document.createElement('option');
                        opt.value = stage.id;
                        opt.textContent = stage.name;
                        stageSelect.appendChild(opt);
                    }
                });
            }

            if (caseData && caseData.current_stage_id) {
                stageSelect.value = caseData.current_stage_id;
                loadStageGuide(caseData.current_stage_id);
            }

            // Handle stage change
            stageSelect.addEventListener('change', async (e) => {
                const newStageId = e.target.value;
                if (!newStageId) return;

                await supabase
                    .from('cases')
                    .update({ current_stage_id: newStageId })
                    .eq('id', caseId);

                loadStageGuide(newStageId);
                
                // Add log for stage change
                const stageName = stageSelect.options[stageSelect.selectedIndex].text;
                addLog(`[시스템] 진행 단계가 '${stageName}'(으)로 변경되었습니다.`);
            });
        }

        async function loadStageGuide(stageId) {
            const { data: guide } = await supabase
                .from('stage_guides')
                .select('*')
                .eq('stage_id', stageId)
                .single();

            const guideSection = document.getElementById('guideSection');
            if (guide) {
                guideSection.style.display = 'block';
                document.getElementById('lawText').textContent = guide.law_text || '내용 없음';
                document.getElementById('guideText').textContent = guide.guide_text || '내용 없음';
                
                let checkHtml = '';
                if (guide.checklist && Array.isArray(guide.checklist)) {
                    guide.checklist.forEach(item => {
                        checkHtml += `<div style="margin-bottom: 0.25rem;"><input type="checkbox" style="width:auto; margin-right: 0.5rem;"> ${item}</div>`;
                    });
                } else if (guide.checklist) {
                     checkHtml = guide.checklist;
                }
                document.getElementById('checklist').innerHTML = checkHtml || '내용 없음';
            } else {
                guideSection.style.display = 'none';
            }
        }

        async function loadLogs() {
            const { data: logs } = await supabase
                .from('logs')
                .select('*')
                .eq('case_id', caseId)
                .order('created_at', { ascending: false });

            const timeline = document.getElementById('timeline');
            timeline.innerHTML = '';

            if (logs && logs.length > 0) {
                logs.forEach(log => {
                    const date = new Date(log.created_at).toLocaleString('ko-KR');
                    const item = document.createElement('div');
                    item.className = 'timeline-item';
                    item.innerHTML = `
                        <div class="timeline-date">${date} | 작성자: ${log.created_by}</div>
                        <div class="timeline-content">${log.content.replace(/\n/g, '<br>')}</div>
                    `;
                    timeline.appendChild(item);
                });
            } else {
                timeline.innerHTML = '<div style="color: var(--text-muted);">아직 로그가 없습니다.</div>';
            }
        }

        document.getElementById('logForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('logInput');
            const content = input.value.trim();
            if (!content) return;
            
            input.value = '';
            input.disabled = true;

            await addLog(content);
            
            input.disabled = false;
            input.focus();
        });

        async function addLog(content) {
            const { error } = await supabase
                .from('logs')
                .insert([{
                    case_id: caseId,
                    content: content,
                    created_by: currentUser
                }]);
            
            if (!error) {
                await loadLogs();
            } else {
                alert('로그 등록에 실패했습니다.');
            }
        }

        document.getElementById('claimCaseBtn')?.addEventListener('click', async () => {
            const btn = document.getElementById('claimCaseBtn');
            btn.disabled = true;
            btn.textContent = '처리 중...';
            
            const { error: updateErr } = await supabase
                .from('cases')
                .update({ status: '진행중' })
                .eq('id', caseId);
                
            if (updateErr) {
                alert('오류가 발생했습니다: ' + updateErr.message);
                btn.disabled = false;
                btn.textContent = '🚀 이 상담 내가 진행하기';
                return;
            }
            
            await addLog(`[시스템] ${currentUser} 전문가가 담당자로 지정되어 상담을 시작했습니다.`);
            
            document.getElementById('claimActionArea').style.display = 'none';
            alert('담당자로 지정되었습니다. 이제 상담을 진행해주세요.');
        });

        init();
    </script>
    <footer class="site-footer">
        <div class="site-footer-inner">
            <div class="footer-links">
                <a href="#">회사소개</a>
                <a href="#" style="color: #fca5a5;">개인정보처리방침</a>
                <a href="#">이용약관</a>
            </div>
            <div class="footer-info">
                <strong class="footer-strong">신대림공인중개사사무소</strong>
                <span>사업자등록번호: 219-01-50737</span> <span>전화번호: 010-9128-0586</span><br>
                <span>주소: 서울특별시 마포구 모래내로7길 52 (성산동)</span>
            </div>
        </div>
    </footer>
</body>
</html>
