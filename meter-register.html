<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계량기 등록</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        select,
        input,
        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            font-size: 18px;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h2>계량기 등록</h2>

    <select id="buildingSelect">
        <option value="">건물 선택</option>
    </select>

    <select id="roomSelect">
        <option value="">호수 선택</option>
    </select>

    <input id="electric" placeholder="전기 끝4자리">

    <input id="water" placeholder="수도 끝4자리">

    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 4px;">
        <span style="font-size: 13px; color: #6b7280; margin-left: 4px;">가스공급업체: 강북3고객센터 <a href="tel:1588-5788" style="color: #3b82f6; text-decoration: none; font-weight: bold;">1588-5788</a></span>
    </div>
    <input id="gas" placeholder="가스 끝4자리">

    <div style="margin: 20px 0 10px; border-top: 1px dashed #ccc; padding-top: 15px; font-weight: bold; font-size: 14px; color: #6b7280;">추가 정보</div>
    <input id="contact" placeholder="긴급 연락처 (예: 010-1234-5678)">

    <button onclick="saveMeters()">
        저장
    </button>

    <div id="status"></div>

    <script src="auth-helper.js"></script>
    <script>

        async function loadBuildings() {

            const { data, error } =
                await supabaseClient
                    .from('buildings')
                    .select('*')
                    .eq('user_id', window.currentUser.id)
                    .order('created_at', { ascending: false });

            if (error) {
                alert('건물 목록 로드 에러: ' + error.message);
                console.log(error);
                return;
            }

            const select =
                document.getElementById('buildingSelect');
                
            select.innerHTML = '<option value="">건물 선택</option>';

            data.forEach(building => {

                const option =
                    document.createElement('option');

                option.value = building.id;

                let text = building.road_address;
                if (building.jibun_address) {
                    text += ' (' + building.jibun_address + ')';
                }
                option.textContent = text;

                select.appendChild(option);

            });

            const urlParams = new URLSearchParams(window.location.search);
            const buildingIdFromUrl = urlParams.get('building_id');
            const roomIdFromUrl = urlParams.get('room_id');

            if (buildingIdFromUrl) {
                select.value = buildingIdFromUrl;
                select.disabled = true;
                await loadRooms(roomIdFromUrl);
            }

        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || window.performance && window.performance.navigation.type === 2) {
                loadBuildings();
            }
        });

        async function loadRooms(roomIdToSelect) {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomSelect =
                document.getElementById('roomSelect');

            roomSelect.innerHTML =
                '<option value="">호수 선택</option>';

            const { data, error } =
                await supabaseClient
                    .from('rooms')
                    .select('*')
                    .eq('building_id', buildingId)
                    .eq('user_id', window.currentUser.id);

            if (error) {
                console.log(error);
                return;
            }

            data.forEach(room => {

                const option =
                    document.createElement('option');

                option.value = room.id;

                option.textContent =
                    room.room_name;

                roomSelect.appendChild(option);

            });

            if (typeof roomIdToSelect === 'string' && roomIdToSelect) {
                roomSelect.value = roomIdToSelect;
                roomSelect.disabled = true;
            }

        }

        async function saveMeter(type, value, roomId) {

            if (!value) return;

            const { error } =
                await supabaseClient
                    .from('utility_meters')
                    .insert([
                        {
                            room_id: roomId,
                            type: type,
                            meter_last4: value,
                            user_id: window.currentUser.id
                        }
                    ]);

            if (error) {
                console.log(error);
            }

        }

        async function saveMeters() {

            const roomId =
                document.getElementById('roomSelect').value;

            const electric =
                document.getElementById('electric').value;

            const water =
                document.getElementById('water').value;

            const gas =
                document.getElementById('gas').value;

            const contact =
                document.getElementById('contact').value;

            const status =
                document.getElementById('status');

            const buildingId =
                document.getElementById('buildingSelect').value;

            if (!buildingId) {
                status.innerText = '건물을 선택하세요';
                return;
            }

            if (!roomId) {
                status.innerText = '호수를 선택하세요';
                return;
            }

            status.innerText = '저장 중...';

            await saveMeter('electric', electric, roomId);

            await saveMeter('water', water, roomId);

            await saveMeter('gas', gas, roomId);
            
            await saveMeter('contact', contact, roomId);

            status.innerText = '저장 완료! 이전 화면으로 돌아갑니다...';

            const urlParams = new URLSearchParams(window.location.search);
            const dealId = urlParams.get('deal_id');
            
            setTimeout(() => {
                if (dealId) {
                    location.href = 'deal-detail.html?id=' + dealId;
                } else {
                    if (document.referrer) {
                        location.href = document.referrer;
                    } else {
                        history.back();
                    }
                }
            }, 1500);

        }

        document
            .getElementById('buildingSelect')
            .addEventListener('change', loadRooms);

        async function init() {
            const user = await requireAuth();
            if (user) {
                loadBuildings();
            }
        }
        init();

    </script>

</body>

</html>
