<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>계량기 등록</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        select,
        input,
        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            font-size: 18px;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h2>계량기 등록</h2>

    <select id="buildingSelect">
        <option value="">건물 선택</option>
    </select>

    <select id="roomSelect">
        <option value="">호수 선택</option>
    </select>

    <input id="electric" placeholder="전기 끝4자리">

    <input id="water" placeholder="수도 끝4자리">

    <input id="gas" placeholder="가스 끝4자리">

    <button onclick="saveMeters()">
        저장
    </button>

    <div id="status"></div>

    <script>

        const SUPABASE_URL =
            'https://clzrbyplzjdrrscctcsl.supabase.co';

        const SUPABASE_ANON_KEY =
            'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k';

        const supabaseClient =
            window.supabase.createClient(
                SUPABASE_URL,
                SUPABASE_ANON_KEY
            );

        async function loadBuildings() {

            const { data, error } =
                await supabaseClient
                    .from('buildings')
                    .select('*')
                    .order('created_at', { ascending: false });

            if (error) {
                console.log(error);
                return;
            }

            const select =
                document.getElementById('buildingSelect');

            data.forEach(building => {

                const option =
                    document.createElement('option');

                option.value = building.id;

                option.textContent =
                    building.road_address;

                select.appendChild(option);

            });

        }

        async function loadRooms() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomSelect =
                document.getElementById('roomSelect');

            roomSelect.innerHTML =
                '<option value="">호수 선택</option>';

            const { data, error } =
                await supabaseClient
                    .from('rooms')
                    .select('*')
                    .eq('building_id', buildingId);

            if (error) {
                console.log(error);
                return;
            }

            data.forEach(room => {

                const option =
                    document.createElement('option');

                option.value = room.id;

                option.textContent =
                    room.room_name;

                roomSelect.appendChild(option);

            });

        }

        async function saveMeter(type, value, roomId) {

            if (!value) return;

            const { error } =
                await supabaseClient
                    .from('utility_meters')
                    .insert([
                        {
                            room_id: roomId,
                            type: type,
                            meter_last4: value
                        }
                    ]);

            if (error) {
                console.log(error);
            }

        }

        async function saveMeters() {

            const roomId =
                document.getElementById('roomSelect').value;

            const electric =
                document.getElementById('electric').value;

            const water =
                document.getElementById('water').value;

            const gas =
                document.getElementById('gas').value;

            const status =
                document.getElementById('status');

            const buildingId =
                document.getElementById('buildingSelect').value;

            if (!buildingId) {
                status.innerText = '건물을 선택하세요';
                return;
            }

            if (!roomId) {
                status.innerText = '호수를 선택하세요';
                return;
            }

            status.innerText = '저장 중...';

            await saveMeter('electric', electric, roomId);

            await saveMeter('water', water, roomId);

            await saveMeter('gas', gas, roomId);

            status.innerText = '저장 완료';

        }

        document
            .getElementById('buildingSelect')
            .addEventListener('change', loadRooms);

        loadBuildings();

    </script>

</body>

</html>
