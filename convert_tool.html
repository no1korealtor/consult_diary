<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SQL Converter</title>
</head>
<body>
    <h2>데이터 변환 도구 (수정본)</h2>
    <p>아래 버튼을 누르면 프로젝트 폴더에 있는 dbno1korealtor.sql 파일을 읽어 변환을 시작합니다. ('rn' 현상이 수정되었습니다.)</p>
    <button id="convertBtn" style="padding: 10px 20px; font-size: 16px;">변환 시작 및 다운로드</button>
    <div id="status" style="margin-top: 20px; color: blue;"></div>

    <script>
        function removeHtmlTags(text) {
            if (!text) return "";
            // Replace br and p tags with actual newlines to preserve spacing
            let formatted = text.replace(/<br\s*[\/]?>/gi, "\n");
            formatted = formatted.replace(/<\/p>/gi, "\n\n");
            formatted = formatted.replace(/<p[^>]*>/gi, "");
            
            // Strip remaining HTML using DOMParser
            let doc = new DOMParser().parseFromString(formatted, 'text/html');
            let result = doc.body.textContent || "";
            
            // 다중 줄바꿈 정리 (3개 이상 연속된 줄바꿈은 2개로 줄임)
            result = result.replace(/\n{3,}/g, "\n\n");
            return result.trim();
        }

        function parseSqlString(sql) {
            const inserts = [];
            const prefix = "INSERT INTO `article_tbl` VALUES (";
            
            let pos = 0;
            while (true) {
                pos = sql.indexOf(prefix, pos);
                if (pos === -1) break;
                
                pos += prefix.length;
                
                const values = [];
                let currentVal = "";
                let inString = false;
                let escaped = false;
                
                while (pos < sql.length) {
                    const char = sql[pos];
                    
                    if (escaped) {
                        // SQL의 이스케이프 문자(\r, \n 등)를 실제 문자로 복원
                        if (char === 'r') currentVal += '\r';
                        else if (char === 'n') currentVal += '\n';
                        else if (char === 't') currentVal += '\t';
                        else if (char === '\\') currentVal += '\\';
                        else if (char === "'") currentVal += "'";
                        else if (char === '"') currentVal += '"';
                        else currentVal += char;
                        escaped = false;
                    } else if (char === '\\') {
                        escaped = true;
                    } else if (char === "'") {
                        inString = !inString;
                    } else if (char === ',' && !inString) {
                        values.push(currentVal);
                        currentVal = "";
                    } else if (char === ')' && !inString) {
                        values.push(currentVal);
                        break;
                    } else {
                        currentVal += char;
                    }
                    pos++;
                }
                
                inserts.push(values);
            }
            return inserts;
        }

        document.getElementById('convertBtn').addEventListener('click', async () => {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = "dbno1korealtor.sql 파일을 불러오는 중...";
            
            try {
                const response = await fetch('dbno1korealtor.sql');
                if (!response.ok) throw new Error("SQL 파일을 찾을 수 없습니다.");
                
                const sqlContent = await response.text();
                statusDiv.textContent = "데이터 파싱 중...";
                
                const rows = parseSqlString(sqlContent);
                let finalSql = "";

                rows.forEach(row => {
                    if (row.length < 13) return; // Malformed or missing columns
                    
                    let topMenuId = row[2] === "NULL" ? null : parseInt(row[2].replace(/'/g, ''));
                    let titleRaw = row[8] ? row[8].replace(/^'|'$/g, '') : '';
                    let leadRaw = row[10] ? row[10].replace(/^'|'$/g, '') : '';
                    let articleRaw = row[12] ? row[12].replace(/^'|'$/g, '') : '';
                    
                    let category = "기타";
                    if (topMenuId === 18) category = "중개실무";
                    else if (topMenuId === 31) category = "세법/정책";
                    else if (topMenuId === 32) category = "임대차";
                    
                    let title = removeHtmlTags(titleRaw);
                    let lead = removeHtmlTags(leadRaw);
                    let fullText = removeHtmlTags(articleRaw);
                    
                    let summaryArr = [];
                    if (lead) {
                        summaryArr = lead.split(/\n+/).map(s => s.trim()).filter(s => s);
                    }
                    let summaryJson = JSON.stringify(summaryArr);
                    
                    const escTitle = title.replace(/'/g, "''");
                    const escSummary = summaryJson.replace(/'/g, "''");
                    // PostgreSQL E'...' 문법을 위해 백슬래시와 줄바꿈을 이스케이프 처리
                    const escFullText = fullText
                        .replace(/\\/g, '\\\\')
                        .replace(/'/g, "''")
                        .replace(/\n/g, '\\n')
                        .replace(/\r/g, '\\r');
                    
                    finalSql += `INSERT INTO practical_tips (\n`;
                    finalSql += `  category,\n`;
                    finalSql += `  title,\n`;
                    finalSql += `  summary,\n`;
                    finalSql += `  effective_date,\n`;
                    finalSql += `  warnings,\n`;
                    finalSql += `  full_text,\n`;
                    finalSql += `  is_active,\n`;
                    finalSql += `  created_at\n`;
                    finalSql += `)\nVALUES (\n`;
                    finalSql += `  '${category}',\n`;
                    finalSql += `  '${escTitle}',\n`;
                    finalSql += `  '${escSummary}'::jsonb,\n`;
                    finalSql += `  '',\n`;
                    finalSql += `  '',\n`;
                    finalSql += `  E'${escFullText}',\n`;
                    finalSql += `  true,\n`;
                    finalSql += `  now()\n`;
                    finalSql += `);\n\n`;
                });

                statusDiv.textContent = "변환 완료! 파일을 다운로드합니다.";
                
                const blob = new Blob([finalSql], { type: 'text/sql' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'practical_tips_full_import.sql';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                
            } catch (err) {
                statusDiv.textContent = "오류 발생: " + err.message;
                statusDiv.style.color = "red";
            }
        });
    </script>
</body>
</html>
