<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권한 관리 (관리자)</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f3f4f6;
            padding: 24px 16px;
            max-width: 480px;
            margin: auto;
            color: #111827;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.5px;
        }

        .user-item {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.05);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .user-name {
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }

        .user-phone {
            font-size: 13px;
            color: #6b7280;
        }

        select {
            padding: 6px 12px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background-color: #f8fafc;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: #3b82f6;
        }

        .role-admin {
            color: #ef4444;
            font-weight: bold;
        }

        .role-consultant {
            color: #3b82f6;
        }

        .app-footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: #9ca3af;
            font-size: 12px;
            line-height: 1.6;
        }
    </style>
</head>

<body>

<div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0;">👑 권한 관리</h2>
        <button type="button" onclick="location.href='deal-register.html'" style="width: auto; padding: 8px 16px; font-size: 14px; background: #ffffff; border: 1px solid #e5e7eb; color: #374151; border-radius: 8px; cursor: pointer; margin-bottom: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 6px;">
            <span>◀</span> 돌아가기
        </button>
    </div>

    <ul id="userList" style="list-style: none; padding: 0;"></ul>
</div>

    <script src="auth-helper.js"></script>
    <script>
        async function checkAuthAndLoad() {
            const user = await requireAuth();
            if (user) {
                if (user.role !== 'admin') {
                    alert('관리자 권한이 없습니다.');
                    location.href = 'deal-register.html';
                    return;
                }
                loadUsers();
            }
        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || window.performance && window.performance.navigation.type === 2) {
                checkAuthAndLoad();
            }
        });

        async function changeRole(userId, newRole, userName) {
            if (!newRole) {
                alert('부여할 권한을 선택해주세요.');
                return;
            }
            if (!confirm(`'${userName}' 님의 권한을 '${newRole === 'admin' ? '관리자' : '개업공인중개사'}'(으)로 최종 저장하시겠습니까?`)) {
                return;
            }

            const { error } = await authClient
                .from('users')
                .update({ role: newRole })
                .eq('id', userId);

            if (error) {
                alert('권한 변경에 실패했습니다 (RLS 정책에 의해 차단되었을 수 있습니다): ' + error.message);
                console.error(error);
                loadUsers(); // revert
                return;
            }

            alert('권한이 변경되었습니다.');
            loadUsers();
        }

        async function loadUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = '<li>로딩 중...</li>';

            const { data, error } = await authClient
                .from('users')
                .select('*')
                .order('name');

            if (error) {
                list.innerHTML = `<li style="color: #ef4444; font-size: 14px;">직원 목록을 불러오지 못했습니다.<br>사유: ${error.message}<br><br>💡 권한(RLS) 문제일 확률이 높습니다. Supabase에서 보안 정책을 설정해주세요.</li>`;
                console.error(error);
                return;
            }

            list.innerHTML = '';
            if (!data || data.length === 0) {
                list.innerHTML = '<li>가입된 직원이 없습니다.</li>';
                return;
            }

            data.forEach(user => {
                const li = document.createElement('li');
                li.className = 'user-item';
                
                const nameStr = user.name || '이름 없음';
                const phoneStr = user.phone || '전화번호 미입력';
                const officeStr = user.office_address || '사무실 주소 미입력';
                
                // My own profile shouldn't easily be downgraded without caution, 
                // but we'll let them do it. If they downgrade themselves they lose admin access immediately!
                const isMe = user.id === window.currentUser.id;
                
                li.innerHTML = `
                    <div class="user-info">
                        <span class="user-name">${nameStr} ${isMe ? '(나)' : ''}</span>
                        <span class="user-phone" style="margin-top: 2px;">${phoneStr}</span>
                        <span class="user-phone" style="font-size: 12px;">${officeStr}</span>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <select id="role-${user.id}" ${isMe ? 'disabled' : ''} style="${!user.role ? 'border-color: #ef4444; background-color: #fef2f2; color: #ef4444; font-weight: bold;' : ''}">
                            ${!user.role ? '<option value="" disabled selected>승인 대기 (미부여)</option>' : ''}
                            <option value="consultant" ${user.role === 'consultant' ? 'selected' : ''}>개업공인중개사</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>관리자 (Admin)</option>
                        </select>
                        <button onclick="changeRole('${user.id}', document.getElementById('role-${user.id}').value, '${nameStr}')" style="width: auto; padding: 6px 12px; margin: 0; font-size: 13px; font-weight: 600; background: #3b82f6; color: white; border-radius: 6px; box-shadow: none; ${isMe ? 'display: none;' : ''}">확인</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        checkAuthAndLoad();
    </script>

    <footer class="app-footer">
        <strong>신대림공인중개사사무소</strong>
        사업자등록번호: 219-01-50737 | 전화번호: 010-9128-0586<br>
        서울특별시 마포구 마포대로 123
    </footer>
</body>
</html>
