<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Select</title>
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 10vh;">
        <div class="glass-panel text-center">
            <h2 style="text-align: center; margin-bottom: 2rem;">서비스 선택</h2>
            <div class="flex-col" id="menuContainer">
                <a href="ediary/index.html?service=ediary" class="btn btn-secondary">일기 (Ediary)</a>
                <a href="consult-start.html" class="btn" id="consultMenuBtn" style="position: relative;">
                    상담 (Consulting System)
                    <span id="newConsultBadge" style="display: none; position: absolute; top: -10px; right: -10px; background: #ef4444; color: white; border-radius: 50%; padding: 0.3rem 0.6rem; font-size: 0.8rem; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid #1e293b;">0</span>
                </a>
            </div>
            
            <button onclick="logout()" class="btn btn-secondary" style="margin-top: 2rem; border: none; color: var(--text-muted);">로그아웃</button>
        </div>
    </div>

    <script type="module">
        import { supabase, requireAuth, DEMO_MODE } from './supabase-client.js';

        // Check auth and role
        await requireAuth();

        const role = localStorage.getItem('userRole');
        
        if (role === 'admin') {
            const menuContainer = document.getElementById('menuContainer');
            const guideBtn = document.createElement('a');
            guideBtn.href = '#'; // placeholder for guide management
            guideBtn.className = 'btn btn-secondary';
            guideBtn.textContent = '가이드 관리 (Guide Management)';
            menuContainer.appendChild(guideBtn);
        }

        // 미처리 예약 건수 확인 및 뱃지 표시
        if (!DEMO_MODE) {
            const { count, error } = await supabase
                .from('cases')
                .select('*', { count: 'exact', head: true })
                .eq('status', '온라인접수');
                
            if (count > 0) {
                const badge = document.getElementById('newConsultBadge');
                badge.style.display = 'block';
                badge.textContent = count;
            }
        }

        window.logout = () => {
            supabase.auth.signOut();
            localStorage.removeItem('userRole');
            window.location.href = 'login.html';
        }
    </script>
    <footer class="site-footer">
        <div class="site-footer-inner">
            <div class="footer-links">
                <a href="#">회사소개</a>
                <a href="#" style="color: #fca5a5;">개인정보처리방침</a>
                <a href="#">이용약관</a>
            </div>
            <div class="footer-info">
                <strong class="footer-strong">신대림공인중개사사무소</strong>
                <span>사업자등록번호: 219-01-50737</span> <span>전화번호: 010-9128-0586</span><br>
                <span>주소: 서울특별시 마포구 모래내로7길 52 (성산동)</span>
            </div>
        </div>
    </footer>
</body>
</html>
