<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>잔금 일정 등록</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        select,
        input,
        textarea,
        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            font-size: 18px;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h2>잔금 일정 등록</h2>

    <select id="buildingSelect">
        <option value="">건물 선택</option>
    </select>
    <button
        type="button"
        onclick="location.href='building-register.html'"
    >
        + 새 건물 등록
    </button>

    <select id="roomSelect">
        <option value="">호수 선택</option>
    </select>

    <select id="contractType">

        <option value="입주 정산">
            입주 정산
        </option>

        <option value="퇴실 정산">
            퇴실 정산
        </option>

        <option value="잔금">
            잔금
        </option>

        <option value="계약">
            계약
        </option>

        <option value="기타">
            기타
        </option>

    </select>

    <input type="date" id="balanceDate">

    <textarea id="memo" placeholder="메모"></textarea>

    <button onclick="saveDeal()">
        저장
    </button>

    <div id="status"></div>

    <script>

        const SUPABASE_URL =
            'https://clzrbyplzjdrrscctcsl.supabase.co';

        const SUPABASE_ANON_KEY =
            'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k';

        const supabaseClient =
            window.supabase.createClient(
                SUPABASE_URL,
                SUPABASE_ANON_KEY
            );

        async function loadBuildings() {

            const { data, error } =
                await supabaseClient
                    .from('buildings')
                    .select('*')
                    .order('created_at', { ascending: false });

            if (error) {
                console.log(error);
                return;
            }

            const select =
                document.getElementById('buildingSelect');

            data.forEach(building => {

                const option =
                    document.createElement('option');

                option.value = building.id;

                option.textContent =
                    building.road_address;

                select.appendChild(option);

            });

        }

        async function loadRooms() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomSelect =
                document.getElementById('roomSelect');

            roomSelect.innerHTML =
                '<option value="">호수 선택</option>';

            const { data, error } =
                await supabaseClient
                    .from('rooms')
                    .select('*')
                    .eq('building_id', buildingId);

            if (error) {
                console.log(error);
                return;
            }

            data.forEach(room => {

                const option =
                    document.createElement('option');

                option.value = room.id;

                option.textContent =
                    room.room_name;

                roomSelect.appendChild(option);

            });

        }

        async function saveDeal() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomId =
                document.getElementById('roomSelect').value;

            const contractType =
                document.getElementById('contractType').value;

            const balanceDate =
                document.getElementById('balanceDate').value;

            const memo =
                document.getElementById('memo').value;

            const status =
                document.getElementById('status');

            if (!buildingId) {
                status.innerText = '에러: 건물을 선택해주세요.';
                return;
            }
            if (!roomId) {
                status.innerText = '에러: 호수를 선택해주세요.';
                return;
            }

            status.innerText = '저장 중...';

            const { error } =
                await supabaseClient
                    .from('deals')
                    .insert([
                        {
                            building_id: buildingId,
                            room_id: roomId,
                            contract_type: contractType,
                            balance_date: balanceDate,
                            memo: memo
                        }
                    ]);

            if (error) {

                status.innerText =
                    '에러: ' + error.message;

                return;
            }

            status.innerText = '저장 완료';

        }

        document
            .getElementById('buildingSelect')
            .addEventListener('change', loadRooms);

        loadBuildings();

    </script>

</body>

</html>
