    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <script>

        async function loadBuildings() {

            const { data, error } =
                await supabaseClient
                    .from('buildings')
                    .select('*')
                    .eq('user_id', window.currentUser.id)
                    .order('created_at', { ascending: false });

            if (error) {
                alert('건물 목록 로드 에러: ' + error.message);
                console.log(error);
                return;
            }

            const select =
                document.getElementById('buildingSelect');

            // 검색 가능한 드롭다운(Tom Select) 초기화 전 기존 객체 파괴
            if (window.buildingTomSelect) {
                window.buildingTomSelect.destroy();
            }
                
            select.innerHTML = '<option value="">건물 선택</option>';

            data.forEach(building => {

                const option =
                    document.createElement('option');

                option.value = building.id;

                let text = building.road_address;
                if (building.jibun_address) {
                    text += ' (' + building.jibun_address + ')';
                }
                option.textContent = text;

                select.appendChild(option);

            });

            window.buildingTomSelect = new TomSelect("#buildingSelect", {
                create: false,
                placeholder: "건물명 또는 주소 검색...",
                maxOptions: 100
            });

            // 방금 등록한 건물이 있다면 자동 선택
            const lastBuildingId = sessionStorage.getItem('lastRegisteredBuildingId');
            if (lastBuildingId) {
                window.buildingTomSelect.setValue(lastBuildingId);
                sessionStorage.removeItem('lastRegisteredBuildingId'); // 사용 후 삭제
                loadRooms(); // 호수 목록 자동 갱신
            }

        }

        function goToRoomRegister() {
            const buildingId = document.getElementById('buildingSelect').value;
            if (buildingId) {
                location.href = 'room-register.html?building_id=' + buildingId;
            } else {
                location.href = 'room-register.html';
            }
        }

        let _isCheckingAuth = false;
        async function checkAuthAndLoad() {
            if (_isCheckingAuth) return;
            _isCheckingAuth = true;
            setTimeout(() => { _isCheckingAuth = false; }, 500);

            const user = await requireAuth();
            if (user) {
                const { data: usersData, error: usersErr } = await window.authClient.from('users').select('id, name');
                  if (usersErr) { alert('Users fetch error: ' + usersErr.message); }
                if (usersData) { window.allUsersMap = {}; usersData.forEach(u => window.allUsersMap[u.id] = u.name); }
                if (!user.office_address || !user.phone) {
                    document.getElementById('inline-profile-warning').style.display = 'block';
                }
                loadBuildings();
                loadDeals();
                if(typeof loadTips === 'function') loadTips();
            }
        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || window.performance && window.performance.navigation.type === 2) {
                checkAuthAndLoad();
            }
        });

        async function loadRooms() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomSelect =
                document.getElementById('roomSelect');

            roomSelect.innerHTML =
                '<option value="">호수 선택</option>';

            const { data, error } =
                await supabaseClient
                    .from('rooms')
                    .select('*')
                    .eq('building_id', buildingId)
                    .eq('user_id', window.currentUser.id);

            if (error) {
                console.log(error);
                return;
            }

            data.forEach(room => {

                const option =
                    document.createElement('option');

                option.value = room.id;

                option.textContent =
                    room.room_name;

                roomSelect.appendChild(option);

            });

            // 방금 등록한 호수가 있다면 자동 선택
            const lastRoomId = sessionStorage.getItem('lastRegisteredRoomId');
            if (lastRoomId) {
                roomSelect.value = lastRoomId;
                sessionStorage.removeItem('lastRegisteredRoomId');
            }

        }

        function toggleMeetingFields() {
            const isMeeting = document.getElementById('contractType').value === '모임';
            const mFields = document.getElementById('meetingFields');
            const pFields = document.getElementById('propertyFields');
            if(mFields) mFields.style.display = isMeeting ? 'block' : 'none';
            if(pFields) pFields.style.display = isMeeting ? 'none' : 'block';
            document.getElementById('memo').placeholder = isMeeting ? '모임 이름 (예: 마포구 협회 정기모임)' : '메모 (모임일 경우 모임명 입력)';
        }

        async function saveDeal() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomId =
                document.getElementById('roomSelect').value;

            const contractType =
                document.getElementById('contractType').value;

            const balanceDate =
                document.getElementById('balanceDate').value;

            const memo =
                document.getElementById('memo').value;

            const status =
                document.getElementById('status');

            if (contractType !== '모임' && !buildingId) {
                status.innerText = '건물을 선택해주세요.';
                return;
            }
            if (contractType !== '모임' && !roomId) {
                status.innerText = '호수를 선택해주세요.';
                return;
            }

            status.innerText = '저장 중...';
            
            let finalMemo = memo;
            if (contractType === '모임') {
                const mTime = document.getElementById('meetingTime').value;
                const mLoc = document.getElementById('meetingLocation').value;
                const mAtt = document.getElementById('meetingAttendance').value;
                const mUrl = document.getElementById('meetingUrl').value;
                  const mUrlName = document.getElementById('meetingUrlName').value;
                if(mTime) finalMemo += `[TIME]${mTime}[/TIME]`;
                if(mLoc) finalMemo += `[LOC]${mLoc}[/LOC]`;
                if(mAtt) finalMemo += `[ATT]${mAtt}[/ATT]`;
                if(mUrl) finalMemo += `[URL]${mUrl}[/URL]`;
            }

            const payload = {
                contract_type: contractType,
                balance_date: balanceDate ? balanceDate : null,
                memo: finalMemo,
                user_id: window.currentUser.id
            };
            
            if (contractType !== '모임' && buildingId) payload.building_id = buildingId;
            if (contractType !== '모임' && roomId) payload.room_id = roomId;

            const { error } =

        function getDDay(dateString) {
            if (!dateString) return '';
            const targetDate = new Date(dateString);
            targetDate.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays > 0) return `D-${diffDays}`;
            if (diffDays === 0) return `D-Day`;
            return `D+${Math.abs(diffDays)}`;
        }

function toggleTipText(id, btn) {
    const fullTextDiv = document.getElementById('fullText_' + id);
    if (fullTextDiv.style.display === 'none') {
        fullTextDiv.style.display = 'block';
        btn.innerText = '접기';
        btn.style.background = '#f1f5f9';
    } else {
        fullTextDiv.style.display = 'none';
        btn.innerText = '📄 원문 보기';
        btn.style.background = 'white';
    }
}
