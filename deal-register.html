<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>잔금 일정 등록</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        select,
        input,
        textarea,
        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            font-size: 18px;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h2>잔금 일정 등록 (업데이트됨)</h2>

    <select id="buildingSelect">
        <option value="">건물 선택</option>
    </select>
    <button
        type="button"
        onclick="location.href='building-register.html'"
    >
        + 새 건물 등록
    </button>

    <select id="roomSelect">
        <option value="">호수 선택</option>
    </select>
    <button
        type="button"
        onclick="goToRoomRegister()"
    >
        + 호수 등록
    </button>

    <select id="contractType">

        <option value="입주 정산">
            입주 정산
        </option>

        <option value="퇴실 정산">
            퇴실 정산
        </option>

        <option value="잔금">
            잔금
        </option>

        <option value="계약">
            계약
        </option>

        <option value="기타">
            기타
        </option>

    </select>

    <input type="date" id="balanceDate">

    <textarea id="memo" placeholder="메모"></textarea>

    <button onclick="saveDeal()">
        저장
    </button>

    <div id="status"></div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc;">
    <h3>최근 등록된 일정</h3>
    <ul id="dealList" style="list-style: none; padding: 0;"></ul>

    <script>

        const SUPABASE_URL =
            'https://clzrbyplzjdrrscctcsl.supabase.co';

        const SUPABASE_ANON_KEY =
            'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k';

        const supabaseClient =
            window.supabase.createClient(
                SUPABASE_URL,
                SUPABASE_ANON_KEY
            );

        async function loadBuildings() {

            const { data, error } =
                await supabaseClient
                    .from('buildings')
                    .select('*')
                    .order('created_at', { ascending: false });

            if (error) {
                alert('건물 목록 로드 에러: ' + error.message);
                console.log(error);
                return;
            }

            const select =
                document.getElementById('buildingSelect');
                
            select.innerHTML = '<option value="">건물 선택</option>';

            data.forEach(building => {

                const option =
                    document.createElement('option');

                option.value = building.id;

                option.textContent =
                    building.road_address;

                select.appendChild(option);

            });

        }

        function goToRoomRegister() {
            const buildingId = document.getElementById('buildingSelect').value;
            if (buildingId) {
                location.href = 'room-register.html?building_id=' + buildingId;
            } else {
                location.href = 'room-register.html';
            }
        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || window.performance && window.performance.navigation.type === 2) {
                loadBuildings();
                loadDeals();
            }
        });

        async function loadRooms() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomSelect =
                document.getElementById('roomSelect');

            roomSelect.innerHTML =
                '<option value="">호수 선택</option>';

            const { data, error } =
                await supabaseClient
                    .from('rooms')
                    .select('*')
                    .eq('building_id', buildingId);

            if (error) {
                console.log(error);
                return;
            }

            data.forEach(room => {

                const option =
                    document.createElement('option');

                option.value = room.id;

                option.textContent =
                    room.room_name;

                roomSelect.appendChild(option);

            });

        }

        async function saveDeal() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomId =
                document.getElementById('roomSelect').value;

            const contractType =
                document.getElementById('contractType').value;

            const balanceDate =
                document.getElementById('balanceDate').value;

            const memo =
                document.getElementById('memo').value;

            const status =
                document.getElementById('status');

            if (!buildingId) {
                status.innerText = '에러: 건물을 선택해주세요.';
                return;
            }
            if (!roomId) {
                status.innerText = '에러: 호수를 선택해주세요.';
                return;
            }

            status.innerText = '저장 중...';

            const { error } =
                await supabaseClient
                    .from('deals')
                    .insert([
                        {
                            building_id: buildingId,
                            room_id: roomId,
                            contract_type: contractType,
                            balance_date: balanceDate,
                            memo: memo
                        }
                    ]);

            if (error) {

                status.innerText =
                    '에러: ' + error.message;

                return;
            }

            status.innerText = '저장 완료';
            document.getElementById('memo').value = '';
            loadDeals();

        }

        async function loadDeals() {
            const list = document.getElementById('dealList');
            list.innerHTML = '<li>로딩 중...</li>';

            const { data, error } = await supabaseClient
                .from('deals')
                .select(`
                    id,
                    contract_type,
                    balance_date,
                    memo,
                    buildings ( road_address ),
                    rooms ( room_name )
                `)
                .order('created_at', { ascending: false })
                .limit(10);

            if (error) {
                list.innerHTML = '<li>목록을 불러오지 못했습니다.</li>';
                console.log(error);
                return;
            }

            list.innerHTML = '';
            if (data.length === 0) {
                list.innerHTML = '<li>등록된 일정이 없습니다.</li>';
                return;
            }

            data.forEach(deal => {
                const bName = deal.buildings ? deal.buildings.road_address : '알 수 없는 건물';
                const rName = deal.rooms ? deal.rooms.room_name : '알 수 없는 호수';
                
                const li = document.createElement('li');
                li.style.border = '1px solid #ddd';
                li.style.padding = '10px';
                li.style.marginBottom = '10px';
                li.style.borderRadius = '5px';
                
                li.innerHTML = `
                    <div style="font-weight: bold; margin-bottom: 5px;">${deal.balance_date || '날짜 미정'} - ${deal.contract_type}</div>
                    <div style="margin-bottom: 5px;">${bName} ${rName}</div>
                    <div style="color: gray; font-size: 14px;">${deal.memo || ''}</div>
                `;
                list.appendChild(li);
            });
        }

        document
            .getElementById('buildingSelect')
            .addEventListener('change', loadRooms);

        loadBuildings();
        loadDeals();

    </script>

</body>

</html>
