<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>잔금 일정 등록</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Tom Select 라이브러리 (검색형 드롭다운) -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        select,
        input,
        textarea,
        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            font-size: 18px;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">잔금 일정 등록</h2>
        <button type="button" onclick="logout()" style="width: auto; padding: 8px 12px; font-size: 14px; background: #ef4444; border: none; color: white; border-radius: 4px; cursor: pointer; margin-bottom: 0;">로그아웃</button>
    </div>

    <h3>최근 등록된 일정</h3>
    <ul id="dealList" style="list-style: none; padding: 0;"></ul>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #ccc;">

    <select id="buildingSelect">
        <option value="">건물 선택</option>
    </select>
    <button
        type="button"
        onclick="location.href='building-register.html'"
    >
        + 새 건물 등록
    </button>

    <select id="roomSelect">
        <option value="">호수 선택</option>
    </select>
    <button
        type="button"
        onclick="goToRoomRegister()"
    >
        + 호수 등록
    </button>

    <select id="contractType">

        <option value="입주 정산">
            입주 정산
        </option>

        <option value="퇴실 정산">
            퇴실 정산
        </option>

        <option value="잔금">
            잔금
        </option>

        <option value="계약">
            계약
        </option>

        <option value="기타">
            기타
        </option>

    </select>

    <input type="date" id="balanceDate">

    <textarea id="memo" placeholder="메모"></textarea>

    <button onclick="saveDeal()">
        저장
    </button>

    <div id="status"></div>

    <script>

    <script src="auth-helper.js"></script>
    <script>

        async function loadBuildings() {

            const { data, error } =
                await supabaseClient
                    .from('buildings')
                    .select('*')
                    .eq('user_id', window.currentUser.id)
                    .order('created_at', { ascending: false });

            if (error) {
                alert('건물 목록 로드 에러: ' + error.message);
                console.log(error);
                return;
            }

            const select =
                document.getElementById('buildingSelect');

            // 검색 가능한 드롭다운(Tom Select) 초기화 전 기존 객체 파괴
            if (window.buildingTomSelect) {
                window.buildingTomSelect.destroy();
            }
                
            select.innerHTML = '<option value="">건물 선택</option>';

            data.forEach(building => {

                const option =
                    document.createElement('option');

                option.value = building.id;

                option.textContent =
                    building.road_address;

                select.appendChild(option);

            });

            window.buildingTomSelect = new TomSelect("#buildingSelect", {
                create: false,
                placeholder: "건물명 또는 주소 검색...",
                maxOptions: 100
            });

        }

        function goToRoomRegister() {
            const buildingId = document.getElementById('buildingSelect').value;
            if (buildingId) {
                location.href = 'room-register.html?building_id=' + buildingId;
            } else {
                location.href = 'room-register.html';
            }
        }

        async function checkAuthAndLoad() {
            const user = await requireAuth();
            if (user) {
                loadBuildings();
                loadDeals();
            }
        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || window.performance && window.performance.navigation.type === 2) {
                checkAuthAndLoad();
            }
        });

        async function loadRooms() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomSelect =
                document.getElementById('roomSelect');

            roomSelect.innerHTML =
                '<option value="">호수 선택</option>';

            const { data, error } =
                await supabaseClient
                    .from('rooms')
                    .select('*')
                    .eq('building_id', buildingId)
                    .eq('user_id', window.currentUser.id);

            if (error) {
                console.log(error);
                return;
            }

            data.forEach(room => {

                const option =
                    document.createElement('option');

                option.value = room.id;

                option.textContent =
                    room.room_name;

                roomSelect.appendChild(option);

            });

        }

        async function saveDeal() {

            const buildingId =
                document.getElementById('buildingSelect').value;

            const roomId =
                document.getElementById('roomSelect').value;

            const contractType =
                document.getElementById('contractType').value;

            const balanceDate =
                document.getElementById('balanceDate').value;

            const memo =
                document.getElementById('memo').value;

            const status =
                document.getElementById('status');

            if (!buildingId) {
                status.innerText = '에러: 건물을 선택해주세요.';
                return;
            }
            if (!roomId) {
                status.innerText = '에러: 호수를 선택해주세요.';
                return;
            }

            status.innerText = '저장 중...';

            const { error } =
                await supabaseClient
                    .from('deals')
                    .insert([
                        {
                            building_id: buildingId,
                            room_id: roomId,
                            contract_type: contractType,
                            balance_date: balanceDate,
                            memo: memo,
                            user_id: window.currentUser.id
                        }
                    ]);

            if (error) {

                status.innerText =
                    '에러: ' + error.message;

                return;
            }

            status.innerText = '저장 완료';
            document.getElementById('memo').value = '';
            loadDeals();

        }

        async function loadDeals() {
            const list = document.getElementById('dealList');
            list.innerHTML = '<li>로딩 중...</li>';

            const { data, error } = await supabaseClient
                .from('deals')
                .select(`
                    id,
                    contract_type,
                    balance_date,
                    memo,
                    buildings ( road_address ),
                    rooms ( room_name )
                `)
                .eq('user_id', window.currentUser.id)
                .order('created_at', { ascending: false })
                .limit(10);

            if (error) {
                list.innerHTML = '<li>목록을 불러오지 못했습니다.</li>';
                console.log(error);
                return;
            }

            list.innerHTML = '';
            if (data.length === 0) {
                list.innerHTML = '<li>등록된 일정이 없습니다.</li>';
                return;
            }

            data.forEach(deal => {
                const bName = deal.buildings ? deal.buildings.road_address : '알 수 없는 건물';
                const rName = deal.rooms ? deal.rooms.room_name : '알 수 없는 호수';
                
                const li = document.createElement('li');
                li.style.border = '1px solid #ddd';
                li.style.padding = '10px';
                li.style.marginBottom = '10px';
                li.style.borderRadius = '5px';
                li.style.cursor = 'pointer';
                li.onclick = () => {
                    location.href = 'deal-detail.html?id=' + deal.id;
                };
                
                li.innerHTML = `
                    <div style="font-weight: bold; margin-bottom: 5px;">${deal.balance_date || '날짜 미정'} - ${deal.contract_type}</div>
                    <div style="margin-bottom: 5px;">${bName} ${rName}</div>
                    <div style="color: gray; font-size: 14px;">${deal.memo || ''}</div>
                `;
                list.appendChild(li);
            });
        }

        document
            .getElementById('buildingSelect')
            .addEventListener('change', loadRooms);

        checkAuthAndLoad();

    </script>

</body>

</html>
