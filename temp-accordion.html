<!DOCTYPE html>

<head>

    <style>
        .process-step {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-main);
            white-space: nowrap;
        }
        .process-arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        .form-label {
            display: block; 
            margin-bottom: 0.5rem; 
            color: var(--text-muted); 
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
        }
        .form-input {
            width: 100%; 
            padding: 0.8rem; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2); 
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
        .form-input option {
            background-color: #1a1a2e;
            color: var(--text-main);
        }
        .step-container {
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInStep 0.4s ease forwards;
        }
        @keyframes fadeInStep {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Tooltip Styles for Legal Info */
        .legal-tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }

        .legal-tooltip .tooltip-text {
            visibility: hidden;
            width: 320px;
            background-color: #1a1a2e;
            color: var(--text-main);
            text-align: left;
            border-radius: 8px;
            padding: 1rem;
            position: absolute;
            z-index: 50;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-size: 0.8rem;
            line-height: 1.5;
            white-space: normal;
        }

        .legal-tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: #1a1a2e transparent transparent transparent;
        }

        .legal-tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        }

            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;

        .phase-admin {
            background-color: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .phase-appeal {
            background-color: rgba(168, 85, 247, 0.15);
            color: #d8b4fe;
            border: 1px solid rgba(168, 85, 247, 0.3);
            margin-top: 1.5rem;
        }
        .timeline-wrapper {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 1rem;
        }
        .timeline-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 11px;
            width: 2px;
        }
        .wrapper-admin::before { background: #3b82f6; }
        .wrapper-appeal::before { background: #a855f7; }
        .timeline-item {
            position: relative;
            margin-bottom: 1rem;
        }
        .timeline-dot {
            position: absolute;
            left: -2rem; 
            top: 1rem;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #1e293b;
            border: 3px solid #3b82f6; 
            z-index: 1;
            transition: all 0.3s ease;
        }
        .phase-appeal-item .timeline-dot { border-color: #a855f7; }
        .timeline-item.active .timeline-dot {
            background-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
        }
        .phase-appeal-item.timeline-item.active .timeline-dot {
            background-color: #a855f7;

            background: rgba(30, 41, 59, 0.8);

            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s ease;

        .timeline-card:hover { border-color: #64748b; }
        .timeline-card-header {
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .toggle-icon {
            transition: transform 0.3s ease;
            color: #64748b;
            font-size: 0.8rem;
        }
        .timeline-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
            background: rgba(15, 23, 42, 0.5);
            padding: 0 1.2rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            line-height: 1.5;
        }
        .timeline-item.expanded .timeline-content {
            max-height: 2000px;
            padding: 1rem 1.2rem;
            border-top: 1px solid #334155;
        }
        .timeline-item.expanded .toggle-icon { transform: rotate(180deg); }
        .tip-box {
            background: rgba(234, 179, 8, 0.1);
            border-left: 3px solid #eab308;
            padding: 0.6rem;
            border-radius: 4px;
            margin-top: 0.6rem;
            color: #fef08a;
        }
    </style>
</head>
