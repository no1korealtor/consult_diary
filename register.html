<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Consulting System</title>
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <div class="glass-panel text-center">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">전문가 회원 가입</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">가입 후 관리자 승인이 필요합니다.</p>
            <form id="registerForm" class="flex-col">
                <input type="text" id="name" placeholder="이름 (또는 상호명)" required>
                <input type="email" id="email" placeholder="이메일 (로그인 ID)" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <input type="text" id="office_address" placeholder="사무실 주소 (예: 서울 마포구 모래내로)" required>
                <input type="tel" id="phone" placeholder="전화번호 (예: 010-1234-5678)" required>
                <button type="submit" class="btn" id="registerBtn">가입 신청</button>
            </form>
            <div id="resultMsg" style="margin-top: 1rem; text-align: center; display: none;"></div>
            <div style="margin-top: 1rem;">
                <a href="login.html" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem;">이미 계정이 있으신가요? 로그인</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const office_address = document.getElementById('office_address').value;
            const phone = document.getElementById('phone').value;
            const resultMsg = document.getElementById('resultMsg');
            
            resultMsg.style.display = 'none';
            document.getElementById('registerBtn').disabled = true;
            document.getElementById('registerBtn').textContent = '가입 처리 중...';

            // 1. Supabase Auth 회원가입
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email,
                password
            });

            if (authError) {
                resultMsg.textContent = '회원가입 에러: ' + authError.message;
                resultMsg.style.color = '#ef4444';
                resultMsg.style.display = 'block';
                document.getElementById('registerBtn').disabled = false;
                document.getElementById('registerBtn').textContent = '가입 신청';
                return;
            }

            // 2. 가입 완료 메시지 출력 (사용자 정보 입력은 Trigger 또는 수동 처리)
            // 참고: users 테이블 insert는 보통 auth hook이나 DB trigger를 사용하지만, 
            // 현재 클라이언트에서 직접 입력도 시도할 수 있습니다. 
            // 단, 권한 문제로 막힐 수 있으므로 안내 메시지로 대체합니다.
            
            if (authData.user) {
                try {
                    await supabase.from('users').insert([
                        { id: authData.user.id, name: name, office_address: office_address, phone: phone, role: null }
                    ]);
                } catch (e) {
                    console.error("Users table insert skipped or failed:", e);
                }
            }

            resultMsg.textContent = '가입 신청이 완료되었습니다! 관리자 승인 후 로그인해 주세요.';
            resultMsg.style.color = '#86efac';
            resultMsg.style.display = 'block';
            document.getElementById('registerBtn').textContent = '신청 완료';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 3000);
        });
    </script>
    <footer class="site-footer">
        <div class="site-footer-inner">
            <div class="footer-links">
                <a href="#">회사소개</a>
                <a href="#" style="color: #fca5a5;">개인정보처리방침</a>
                <a href="#">이용약관</a>
            </div>
            <div class="footer-info">
                <strong class="footer-strong">신대림공인중개사사무소</strong>
                <span>사업자등록번호: 219-01-50737</span> <span>전화번호: 010-9128-0586</span><br>
                <span>주소: 서울특별시 마포구 모래내로7길 52 (성산동)</span>
            </div>
        </div>
    </footer>
    <script src="add_footer.js"></script>
</body>
</html>
