<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#f8fafc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f8fafc;
            padding: 0;
            margin: 0;
            color: #111827;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 32px 20px;
            box-sizing: border-box;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .brand-title {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand-title h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #2563eb, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .brand-title p {
            margin: 8px 0 0 0;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
        }

        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(0, 0, 0, 0.03);
            margin-bottom: 24px;
        }

        input {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            transition: all 0.2s;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            background: linear-gradient(135deg, #3b82f6, #4f46e5);
            color: white;
            font-size: 16px;
            padding: 16px;
            border-radius: 14px;
            border: none;
            width: 100%;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            margin-top: 8px;
            font-family: inherit;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            background: #94a3b8;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-title">
            <h1>회원가입</h1>
            <p>가입 후 관리자(010-9128-0586 조항준) 승인이 필요합니다.</p>
        </div>

        <div class="login-card">
            <form id="registerForm">
                <input type="text" id="name" placeholder="이름 (또는 상호명)" required>
                <input type="email" id="email" placeholder="이메일 (로그인 ID)" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <div style="display: flex; gap: 8px; margin-bottom: 12px; width: 100%;">
                    <input type="text" id="office_address" placeholder="사무실 주소 (주소 검색 클릭)" required readonly style="margin-bottom: 0; flex: 1; cursor: pointer; background: #ffffff;" onclick="openAddressSearch()">
                    <button type="button" onclick="openAddressSearch()" style="width: auto; padding: 0 16px; margin-bottom: 0; white-space: nowrap; box-sizing: border-box; background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 14px; font-family: inherit;">검색</button>
                </div>
                <input type="tel" id="phone" placeholder="업무용 전화번호 (스마트폰 입력 가능)" required>
                
                <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 16px; text-align: left;">
                    <strong style="color: #475569; font-size: 12px; display: block; margin-bottom: 4px;">📢 정보 공개 안내</strong>
                    <span style="color: #64748b; font-size: 11px; line-height: 1.4; display: block; word-break: keep-all; margin-bottom: 10px;">
                        원활한 협업을 위해 가입 승인 완료 시 <b>이름(상호명), 사무실 주소, 업무용 전화번호</b>가 시스템 내 '연락처' 메뉴를 통해 전체 회원에게 공개됩니다.
                    </span>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 12px; color: #1e293b; font-weight: 800; background: #e2e8f0; padding: 8px 12px; border-radius: 8px;">
                        <input type="checkbox" id="agree_disclosure" required style="width: 18px; height: 18px; margin: 0; cursor: pointer; accent-color: #3b82f6; flex-shrink: 0;">
                        위 정보 공개에 동의합니다. (필수)
                    </label>
                </div>
                
                <button type="submit" class="btn-login" id="registerBtn">가입 신청</button>
            </form>
            
            <div id="resultMsg" style="margin-top: 16px; text-align: center; display: none; font-size: 13px; font-weight: 700; padding: 12px; border-radius: 12px;"></div>

            <div style="margin-top: 24px; text-align: center; display: flex; flex-direction: column; gap: 12px;">
                <a href="login.html" style="color: #64748b; text-decoration: none; font-size: 14px; font-weight: 600;">
                    이미 계정이 있으신가요? <span style="color: #3b82f6; font-weight: 800;">로그인하기</span>
                </a>
                <a href="manual.html" style="display: inline-block; padding: 12px 16px; background: #eff6ff; border-radius: 12px; color: #2563eb; text-decoration: none; font-size: 13px; font-weight: 700; border: 1px dashed #bfdbfe; transition: all 0.2s;" onmouseover="this.style.background='#dbeafe'" onmouseout="this.style.background='#eff6ff'">
                    📖 어떤 앱인지 궁금하다면? 사용 설명서 둘러보기
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';

        window.openAddressSearch = function() {
            if (window.showToast) showToast('주소 검색 창을 엽니다.\n창이 뜨지 않으면 팝업 차단을 해제해주세요.', 'info');
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('office_address').value = data.address;
                }
            }).open();
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const office_address = document.getElementById('office_address').value;
            const phone = document.getElementById('phone').value;
            const resultMsg = document.getElementById('resultMsg');
            
            resultMsg.style.display = 'none';
            document.getElementById('registerBtn').disabled = true;
            document.getElementById('registerBtn').textContent = '가입 처리 중...';

            // 1. Supabase Auth 회원가입
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email,
                password
            });

            if (authError) {
                resultMsg.textContent = '회원가입 에러: ' + authError.message;
                resultMsg.style.color = '#ef4444';
                resultMsg.style.display = 'block';
                document.getElementById('registerBtn').disabled = false;
                document.getElementById('registerBtn').textContent = '가입 신청';
                return;
            }
            
            if (authData.user) {
                try {
                    await supabase.from('users').insert([
                        { id: authData.user.id, name: name, office_address: office_address, phone: phone, role: null }
                    ]);
                } catch (e) {
                    console.error("Users table insert skipped or failed:", e);
                }
            }

            resultMsg.textContent = '가입 신청이 완료되었습니다! 관리자(010-9128-0586 조항준) 승인 후 로그인해 주세요.';
            resultMsg.style.color = '#86efac';
            resultMsg.style.display = 'block';
            document.getElementById('registerBtn').textContent = '신청 완료';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 3000);
        });
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
