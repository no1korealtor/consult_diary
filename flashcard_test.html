<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>플래시카드 테스트</title>
    <style>
        body { 
            font-family: 'Malgun Gothic', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: #e9ecef; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 50px 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            text-align: center; 
            min-width: 320px; 
            max-width: 90%;
        }
        .word { 
            font-size: 56px; 
            font-weight: bold; 
            margin-bottom: 20px; 
            color: #2b2b2b; 
        }
        .meaning { 
            font-size: 28px; 
            color: #4a4a4a; 
            margin-bottom: 40px; 
        }
        .btn-next { 
            padding: 16px 32px; 
            font-size: 20px; 
            font-weight: bold;
            background: #4facfe; 
            color: white; 
            border: none; 
            border-radius: 50px; 
            cursor: pointer; 
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
            transition: transform 0.1s;
        }
        .btn-next:active { 
            transform: scale(0.95); 
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="word" id="word">로딩중...</div>
        <div class="meaning" id="meaning">데이터를 불러오는 중입니다</div>
        <button class="btn-next" onclick="nextWord()">다음 단어 ➔</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script>
        const supabaseUrl = 'https://clzrbyplzjdrrscctcsl.supabase.co';
        const supabaseKey = 'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        let words = [];
        let currentIndex = -1;

        async function loadWords() {
            const { data, error } = await supabaseClient
                .from('study_words')
                .select('*')
                .eq('is_memorized', false); // 외우지 않은 단어만 가져오기

            if (error) {
                console.error("데이터 불러오기 실패:", error);
                document.getElementById('word').innerText = "오류 발생";
                document.getElementById('meaning').innerText = "데이터를 불러오지 못했습니다.";
                return;
            }
            
            if (data.length === 0) {
                document.getElementById('word').innerText = "완벽해요!";
                document.getElementById('meaning').innerText = "모든 단어를 다 외웠습니다.";
                document.querySelector('.btn-next').style.display = 'none';
                return;
            }

            words = data;
            
            // 배열 섞기 (랜덤 순서)
            words.sort(() => Math.random() - 0.5);
            
            nextWord();
        }

        function nextWord() {
            if (words.length === 0) return;
            
            currentIndex++;
            if (currentIndex >= words.length) {
                currentIndex = 0; // 끝까지 가면 처음으로 돌아감
            }
            
            const currentWord = words[currentIndex];
            document.getElementById('word').innerText = currentWord.word;
            document.getElementById('meaning').innerText = currentWord.meaning || '뜻이 등록되지 않았습니다';
        }

        loadWords();
    </script>
</body>
</html>
