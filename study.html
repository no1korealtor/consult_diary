<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>오늘 공부</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&family=Nunito:wght@400;600;700&display=swap');

        body {
            font-family: 'Nunito', 'Jua', sans-serif;
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
            background-attachment: fixed;
            padding: 20px;
            min-height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 24px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            font-family: 'Jua', sans-serif;
            text-align: center;
        }

        .last-updated {
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            font-family: 'Nunito', sans-serif;
            text-align: center;
        }

        #card-wrapper {
            width: 100%;
            max-width: 480px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 36px;
            padding: 36px 24px;
            box-shadow: 0 15px 35px rgba(255, 175, 189, 0.4), 
                        inset 0 0 0 4px rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .word {
            font-family: 'Jua', sans-serif;
            font-size: 48px;
            color: #ff758c;
            margin-bottom: 8px;
            text-align: center;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .speaker-icon {
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            background: #fff0f5;
            padding: 8px;
            border-radius: 50%;
        }

        .speaker-icon:hover {
            transform: scale(1.15) rotate(-10deg);
            background: #ffe4e1;
        }

        .speaker-icon:active {
            transform: scale(0.9);
        }

        .hanja {
            font-size: 20px;
            color: #b2bec3;
            margin-bottom: 16px;
            text-align: center;
        }

        .irregular {
            font-size: 18px;
            color: #ff9a9e;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
            background: #fff0f5;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        .tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .subject {
            background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(142, 197, 252, 0.3);
        }

        .category {
            background: linear-gradient(120deg, #f6d365 0%, #fda085 100%);
            color: white;
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(253, 160, 133, 0.3);
        }

        .meaning {
            margin-top: 16px;
            font-size: 24px;
            line-height: 1.6;
            color: #2d3436;
            text-align: center;
            font-weight: bold;
            font-family: 'Jua', sans-serif;
        }

        .example {
            margin-top: 20px;
            color: #636e72;
            line-height: 1.7;
            background: #f8f9fa;
            padding: 18px;
            border-radius: 20px;
            font-size: 16px;
            text-align: center;
            border: 2px dashed #ffeaa7;
        }

        .buttons {
            margin-top: 36px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            border: none;
            padding: 16px 24px;
            border-radius: 999px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            font-family: 'Nunito', 'Jua', sans-serif;
            color: white;
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }

        button:active {
            transform: scale(0.92);
        }

        .btn-meaning { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); color: #4a69bd; }
        .btn-test { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); color: #d63031; }
        .btn-next { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); color: #009432; }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .btn-cancel { background: #dfe6e9; color: #636e72; box-shadow: none; }

        .word-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 24px;
            margin-bottom: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .hidden {
            display: none !important;
        }

        /* Test Mode Styles */
        .test-title {
            font-size: 28px;
            font-weight: bold;
            color: #6c5ce7;
            margin-bottom: 24px;
            text-align: center;
            font-family: 'Jua', sans-serif;
        }

        .meaning-hint {
            font-size: 26px;
            font-weight: bold;
            color: #2d3436;
            margin: 24px 0;
            padding: 24px;
            background: #fff;
            border-radius: 24px;
            border: 3px solid #ff758c;
            text-align: center;
            font-family: 'Jua', sans-serif;
            box-shadow: 0 10px 20px rgba(255, 117, 140, 0.15);
        }

        .irregular-hint {
            font-size: 18px;
            color: #ff758c;
            margin-bottom: 24px;
            text-align: center;
            font-weight: bold;
            background: #fff0f5;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
        }

        .input-group {
            margin: 28px 0;
        }

        #test-input {
            width: 100%;
            padding: 20px;
            font-size: 24px;
            border: 3px solid #ffeaa7;
            border-radius: 24px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s;
            text-align: center;
            font-family: 'Nunito', sans-serif;
            color: #2d3436;
            background: #fff9e6;
            font-weight: bold;
        }

        #test-input:focus {
            border-color: #ff758c;
            background: #fff;
            box-shadow: 0 0 0 6px rgba(255, 117, 140, 0.2);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            font-family: 'Jua', sans-serif;
            font-size: 28px;
            color: #ff758c;
        }
        @media (max-width: 600px) {
            h1 { font-size: 28px; }
            .card { padding: 24px 16px; border-radius: 28px; }
            .word { font-size: 36px; gap: 8px; }
            .speaker-icon { font-size: 26px; padding: 6px; }
            .meaning { font-size: 20px; }
            .example { font-size: 14px; padding: 12px; }
            button { padding: 12px 18px; font-size: 15px; }
            .tags { margin-bottom: 16px; }
            .hanja { font-size: 18px; }
            .irregular { font-size: 16px; }
        }
    </style>
</head>

<body>

    <h1>
        🌸 오늘의 단어장 🌸
    </h1>

    <div id="card-wrapper"></div>
    <div id="last-updated" class="last-updated"></div>

    <script>
        const supabaseUrl = 'https://clzrbyplzjdrrscctcsl.supabase.co'
        const supabaseKey = 'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k'

        const supabaseClient = window.supabase.createClient(
            supabaseUrl,
            supabaseKey
        )

        let words = []
        let currentWord = null
        let meaningVisible = false
        let isTestMode = false
        
        let wordsBySubject = {}
        let subjects = []
        let currentSubjectIndex = 0

        async function loadWords() {
            const { data, error } = await supabaseClient
                .from('study_words')
                .select('*')
                .order('created_at', { ascending: false })

            if (error) {
                console.log(error)
                return
            }
            
            if (data.length > 0) {
                const latestDate = new Date(data[0].created_at);
                document.getElementById('last-updated').textContent = `최근 업데이트: ${latestDate.toLocaleDateString()} ${latestDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
            }

            words = data.filter(w => w.is_memorized !== true)

            setupSubjects()
        }

        function setupSubjects() {
            wordsBySubject = {}
            words.forEach(w => {
                const subj = w.subject || '기타'
                if (!wordsBySubject[subj]) {
                    wordsBySubject[subj] = []
                }
                wordsBySubject[subj].push(w)
            })

            subjects = Object.keys(wordsBySubject)

            pickNextWord()
            renderCard()
        }

        function renderCard() {
            const cardContainer = document.getElementById('card-wrapper')

            if (words.length === 0) {
                cardContainer.innerHTML = '<div class="card empty-state">🎉 모든 단어를 다 외웠어요! 최고야! 💖</div>'
                return
            }

            const word = currentWord

            if (isTestMode) {
                cardContainer.innerHTML = `
                    <div class="card test-mode">
                        <div class="test-title">💡 암기 확인 테스트 💡</div>
                        ${word.image_url ? `<img src="${word.image_url}" class="word-image" onerror="this.style.display='none'" />` : ''}
                        
                        <div class="tags">
                            <div class="subject">${word.subject}</div>
                            <div class="category">${word.category}</div>
                        </div>
                        
                        <div class="meaning-hint">${word.meaning || '뜻이 등록되지 않은 단어입니다.'}</div>
                        
                        <div style="text-align: center;">
                            ${word.irregular ? `<div class="irregular-hint">불규칙/원형 힌트: ${word.irregular}</div>` : ''}
                        </div>
                        
                        <div class="input-group">
                            <input type="text" id="test-input" placeholder="스펠링을 입력해봐요! ✍️" autocomplete="off" onkeypress="if(event.key === 'Enter') checkTest()">
                        </div>

                        <div class="buttons">
                            <button class="btn-submit" onclick="checkTest()">정답 제출 💖</button>
                            <button class="btn-cancel" onclick="cancelTest()">취소 닫기</button>
                        </div>
                    </div>
                `
                setTimeout(() => document.getElementById('test-input').focus(), 10);
                return;
            }

            cardContainer.innerHTML = `
        <div class="card">
          ${word.image_url ? `<img src="${word.image_url}" class="word-image" onerror="this.style.display='none'" />` : ''}
          <div class="word">
              ${word.word}
              <span class="speaker-icon" onclick="speakWord('${word.word.replace(/'/g, "\\'")}')" title="발음 듣기">🔊</span>
          </div>
          
          <div style="text-align: center;">
              ${word.irregular ? `<div class="irregular">${word.irregular}</div>` : ''}
          </div>
          
          <div class="hanja">${word.hanja || ''}</div>

          <div class="tags">
              <div class="subject">${word.subject}</div>
              <div class="category">${word.category}</div>
          </div>

          <div class="example">${word.example || ''}</div>

          <div class="meaning ${meaningVisible ? '' : 'hidden'}">${word.meaning || ''}</div>

          <div class="buttons">
            <button class="btn-meaning" onclick="toggleMeaning()">✨ 뜻 보기</button>
            <button class="btn-test" onclick="toggleTestMode()">📝 암기 완료</button>
            <button class="btn-next" onclick="nextWord()">다음 🚀</button>
          </div>

        </div>
      `
        }

        function toggleMeaning() {
            meaningVisible = !meaningVisible
            renderCard()
        }
        
        function toggleTestMode() {
            isTestMode = true
            renderCard()
        }
        
        function cancelTest() {
            isTestMode = false
            renderCard()
        }
        
        async function checkTest() {
            const inputVal = document.getElementById('test-input').value.trim();
            if (inputVal.toLowerCase() === currentWord.word.toLowerCase()) {
                const { error } = await supabaseClient
                    .from('study_words')
                    .update({ is_memorized: true })
                    .eq('id', currentWord.id);
                    
                if (error) {
                    console.error("DB 업데이트 에러:", error);
                    alert("서버 저장 중 오류가 발생했어요. 다시 시도해주세요! 😥");
                    return;
                }

                alert("정답이에요! 🎉 이제 이 단어는 마스터했어요!");
                
                words = words.filter(w => w.id !== currentWord.id);
                isTestMode = false;
                setupSubjects();
            } else {
                alert("앗, 틀렸어요! 다시 한 번 시도해볼까요? 😉");
                const inputEl = document.getElementById('test-input');
                inputEl.value = '';
                inputEl.focus();
            }
        }

        function pickNextWord() {
            if (subjects.length === 0) return

            const subj = subjects[currentSubjectIndex]
            currentSubjectIndex++
            if (currentSubjectIndex >= subjects.length) {
                currentSubjectIndex = 0
            }

            const list = wordsBySubject[subj]
            const randomIndex = Math.floor(Math.random() * list.length)
            currentWord = list[randomIndex]
        }

        function nextWord() {
            meaningVisible = false
            pickNextWord()
            renderCard()
        }

        function speakWord(text) {
            if ('speechSynthesis' in window) {
                // 기존 재생중인 음성 취소
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US'; // 미국 영어
                utterance.rate = 0.85;    // 약간 천천히 (아이들이 듣기 편하게)
                utterance.pitch = 1.1;    // 살짝 높은 톤으로 밝게
                
                window.speechSynthesis.speak(utterance);
            } else {
                alert("앗! 지금 사용 중인 브라우저에서는 발음 듣기가 안 돼요. 😥 (크롬/사파리를 추천해요)");
            }
        }

        loadWords()
    </script>

</body>

</html>
