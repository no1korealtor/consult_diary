<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>일정 로직 TDD 테스트</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; padding: 20px; background-color: #f8fafc; color: #1e293b; max-width: 600px; margin: 0 auto; }
        h2 { color: #0f172a; margin-bottom: 24px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
        .test-box { padding: 16px; border-radius: 12px; margin-bottom: 12px; font-size: 15px; font-weight: 600; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .pass { background-color: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .fail { background-color: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .info { background-color: #ffffff; padding: 16px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 24px; font-size: 14px; line-height: 1.6; color: #475569; }
        .expected { font-size: 13px; font-weight: normal; margin-top: 4px; opacity: 0.8; }
    </style>
</head>
<body>
    <h2>🚀 일정 로직 TDD 테스트 결과</h2>
    
    <div class="info">
        <strong>테스트 대상:</strong> <code>getDDay()</code> 함수<br>
        <strong>설명:</strong> 현재 날짜와 목표 날짜를 비교하여 정확한 D-Day 문자열("D-5", "D-Day", "D+3")을 반환하는지 순수 환경에서 검증합니다.
    </div>

    <div id="testResults"></div>

    <script src="schedule_parser.js"></script>
    <script>
        const resultsContainer = document.getElementById('testResults');

        // 커스텀 테스트 함수 (TDD 프레임워크 흉내)
        function test(description, expected, actual) {
            const div = document.createElement('div');
            
            if (expected === actual) {
                div.className = 'test-box pass';
                div.innerHTML = `
                    <div>
                        <div>✅ ${description}</div>
                        <div class="expected">결과: "${actual}" (예상과 일치)</div>
                    </div>
                `;
            } else {
                div.className = 'test-box fail';
                div.innerHTML = `
                    <div>
                        <div>❌ ${description}</div>
                        <div class="expected">예상: "${expected}" / 실제: "${actual}"</div>
                    </div>
                `;
            }
            resultsContainer.appendChild(div);
        }

        // TDD 실행 (고정된 '오늘 날짜' 주입)
        const mockToday = new Date('2026-05-29T12:00:00'); // 테스트 기준일

        // 1. 미래 날짜 테스트
        test(
            "미래 날짜 입력 시 (5일 후)",
            "D-5",
            getDDay("2026-06-03", mockToday)
        );

        // 2. 당일 날짜 테스트
        test(
            "당일 날짜 입력 시",
            "D-Day",
            getDDay("2026-05-29", mockToday)
        );

        // 3. 과거 날짜 테스트
        test(
            "과거 날짜 입력 시 (3일 전)",
            "D+3",
            getDDay("2026-05-26", mockToday)
        );

        // 4. 빈 값 예외 처리 테스트
        test(
            "날짜가 빈 문자열일 때",
            "",
            getDDay("", mockToday)
        );

    </script>
</body>
</html>
