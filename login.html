<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Consulting System</title>
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <div class="glass-panel text-center">
            <h2 id="loginTitle" style="text-align: center; margin-bottom: 0.5rem;">시스템 로그인</h2>
            <p id="loginDesc" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; display: none;">전문가 전용 상담 관리 CRM</p>
            <form id="loginForm" class="flex-col">
                <input type="email" id="email" placeholder="이메일" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <button type="submit" class="btn" id="loginBtn">로그인</button>
            </form>
            <div id="errorMsg" style="color: #ef4444; margin-top: 1rem; text-align: center; display: none;"></div>
            <div style="margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.8rem;">
                <a href="index.html" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem;">← 홈페이지 메인으로 돌아가기</a>
                <a href="register.html" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem;">전문가 계정이 없으신가요? 회원가입</a>
            </div>
        </div>
        
        <!-- 일반 사용자 유입을 위한 CTA (버튼) -->
        <div id="publicCtaSection" style="margin-top: 2rem; padding: 1.5rem; background: linear-gradient(145deg, rgba(37,99,235,0.1), rgba(15,23,42,0.6)); border: 1px solid rgba(59,130,246,0.3); border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3);">
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1rem; line-height: 1.5; word-break: keep-all;">갑작스러운 과태료나 행정처분으로 막막하신가요?<br>내 상황에 딱 맞는 전문가의 대응 가이드를 확인해 보세요.</p>
            <a href="index.html" class="btn" style="background: linear-gradient(to right, #3b82f6, #8b5cf6); border: none; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); text-decoration: none; display: inline-block; width: 100%; font-weight: bold; font-size: 1.05rem;">무료 자가진단 및 상담 예약하기</a>
        </div>
    </div>

    <script src="auth-helper.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isProLogin = urlParams.get('pro') === 'true';

        if (isProLogin) {
            document.getElementById('loginTitle').textContent = '공인중개사 / 전문 상담사 로그인';
            document.getElementById('loginDesc').style.display = 'block';
        }

        // 이미 로그인되어 있는지 확인
        async function checkSession() {
            const { data: { user } } = await authClient.auth.getUser();
            if (user) {
                window.location.href = 'deal-register.html';
            }
        }
        checkSession();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.style.display = 'none';
            document.getElementById('loginBtn').disabled = true;
            document.getElementById('loginBtn').textContent = '로그인 중...';

            const { data, error } = await authClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                errorMsg.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
                errorMsg.style.display = 'block';
                document.getElementById('loginBtn').disabled = false;
                document.getElementById('loginBtn').textContent = '로그인';
            } else {
                // 로그인 성공 시 무조건 deal-register.html 로 이동
                window.location.href = 'deal-register.html';
            }
        });
    </script>
    <footer class="site-footer">
        <div class="site-footer-inner">
            <div class="footer-links">
                <a href="#">회사소개</a>
                <a href="#" style="color: #fca5a5;">개인정보처리방침</a>
                <a href="#">이용약관</a>
            </div>
            <div class="footer-info">
                <strong class="footer-strong">신대림공인중개사사무소</strong>
                <span>사업자등록번호: 219-01-50737</span> <span>전화번호: 010-9128-0586</span><br>
                <span>주소: 서울특별시 마포구 모래내로7길 52 (성산동)</span>
            </div>
        </div>
    </footer>
</body>
</html>
