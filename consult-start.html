<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consult Start</title>
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 10vh;">
        <div class="glass-panel text-center">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0;">고객 검색 (Consult Start)</h2>
                <a href="service-select.html" class="btn btn-secondary" style="padding: 0.5rem 1rem; width: auto;">뒤로</a>
            </div>
            
            <form id="searchForm" style="display: flex; flex-direction: column; gap: 1rem;">
                <input type="tel" id="phoneInput" placeholder="전화번호 입력 (하이픈 없이 또는 포함하여 입력)" required>
                <button type="submit" class="btn">검색</button>
            </form>

            <div id="resultArea" style="margin-top: 2rem; display: none;">
                <p id="resultMsg" style="margin-bottom: 1rem;"></p>
                <button id="createCustomerBtn" class="btn btn-secondary" style="display: none; width: 100%;">Create New Customer</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';

        // Check auth
        const { data: { session } } = await supabase.auth.getSession();
        if (!session) {
            window.location.href = 'index.html';
        }

        const searchForm = document.getElementById('searchForm');
        const phoneInput = document.getElementById('phoneInput');
        const resultArea = document.getElementById('resultArea');
        const resultMsg = document.getElementById('resultMsg');
        const createCustomerBtn = document.getElementById('createCustomerBtn');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Normalize phone number (remove hyphens)
            const rawPhone = phoneInput.value.trim();
            const normalizedPhone = rawPhone.replace(/-/g, '');
            
            if (!normalizedPhone) return;

            // Show loading state
            resultArea.style.display = 'block';
            resultMsg.textContent = '검색 중...';
            resultMsg.style.color = 'var(--text-main)';
            createCustomerBtn.style.display = 'none';

            // Query customers table by phone
            const { data: customers, error } = await supabase
                .from('customers')
                .select('*')
                .eq('phone', normalizedPhone);

            if (error) {
                console.error('Error fetching customer:', error);
                resultMsg.textContent = '검색 중 오류가 발생했습니다.';
                resultMsg.style.color = '#ef4444';
                return;
            }

            if (customers && customers.length > 0) {
                // If found: navigate to CaseList
                resultMsg.textContent = '고객이 확인되었습니다. 이동합니다...';
                resultMsg.style.color = 'var(--accent-color)';
                
                setTimeout(() => {
                    window.location.href = `case-list.html?customer_id=${customers[0].id}`;
                }, 500);
            } else {
                // If not found: show "Create New Customer" button
                resultMsg.textContent = '등록된 고객이 없습니다.';
                resultMsg.style.color = 'var(--text-muted)';
                createCustomerBtn.style.display = 'block';
            }
        });

        createCustomerBtn.addEventListener('click', () => {
            // Navigation or modal for new customer
            alert('신규 고객 등록 기능 구현 예정');
        });
    </script>
</body>
</html>
