<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consult Start</title>
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .process-step {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: rgba(139, 92, 246, 0.2);
            border: 1px solid var(--accent-color);
            border-radius: 20px;
            font-size: 0.9rem;
            color: var(--text-main);
            white-space: nowrap;
        }
        .process-arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        .form-label {
            display: block; 
            margin-bottom: 0.5rem; 
            color: var(--text-muted); 
            font-size: 0.9rem;
            font-weight: 500;
            text-align: left;
        }
        .form-input {
            width: 100%; 
            padding: 0.8rem; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(0,0,0,0.2); 
            color: var(--text-main);
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
        .form-input option {
            background-color: #1a1a2e;
            color: var(--text-main);
        }
        .step-container {
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeInStep 0.4s ease forwards;
        }
        @keyframes fadeInStep {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Tooltip Styles for Legal Info */
        .legal-tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }

        .legal-tooltip .tooltip-text {
            visibility: hidden;
            width: 320px;
            background-color: #1a1a2e;
            color: var(--text-main);
            text-align: left;
            border-radius: 8px;
            padding: 1rem;
            position: absolute;
            z-index: 50;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            font-size: 0.8rem;
            line-height: 1.5;
            white-space: normal;
        }

        .legal-tooltip .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -6px;
            border-width: 6px;
            border-style: solid;
            border-color: #1a1a2e transparent transparent transparent;
        }

        .legal-tooltip:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* 수직 타임라인 스타일 */
        .timeline-container {
            width: 100%;
            text-align: left;
        }
        .phase-header {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .phase-admin {
            background-color: rgba(59, 130, 246, 0.15);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        .phase-appeal {
            background-color: rgba(168, 85, 247, 0.15);
            color: #d8b4fe;
            border: 1px solid rgba(168, 85, 247, 0.3);
            margin-top: 1.5rem;
        }
        .timeline-wrapper {
            position: relative;
            padding-left: 2rem;
            margin-bottom: 1rem;
        }
        .timeline-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 11px;
            width: 2px;
        }
        .wrapper-admin::before { background: #3b82f6; }
        .wrapper-appeal::before { background: #a855f7; }
        .timeline-item {
            position: relative;
            margin-bottom: 1rem;
        }
        .timeline-dot {
            position: absolute;
            left: -2rem; 
            top: 1rem;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #1e293b;
            border: 3px solid #3b82f6; 
            z-index: 1;
            transition: all 0.3s ease;
        }
        .phase-appeal-item .timeline-dot { border-color: #a855f7; }
        .timeline-item.active .timeline-dot {
            background-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
        }
        .phase-appeal-item.timeline-item.active .timeline-dot {
            background-color: #a855f7;
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.6);
        }
        .timeline-card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s ease;
        }
        .timeline-card:hover { border-color: #64748b; }
        .timeline-card-header {
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 500;
            font-size: 0.95rem;
        }
        .toggle-icon {
            transition: transform 0.3s ease;
            color: #64748b;
            font-size: 0.8rem;
        }
        .timeline-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.4s ease;
            background: rgba(15, 23, 42, 0.5);
            padding: 0 1.2rem;
            font-size: 0.85rem;
            color: #cbd5e1;
            line-height: 1.5;
        }
        .timeline-item.expanded .timeline-content {
            max-height: 2000px;
            padding: 1rem 1.2rem;
            border-top: 1px solid #334155;
        }
        .timeline-item.expanded .toggle-icon { transform: rotate(180deg); }
        .tip-box {
            background: rgba(234, 179, 8, 0.1);
            border-left: 3px solid #eab308;
            padding: 0.6rem;
            border-radius: 4px;
            margin-top: 0.6rem;
            color: #fef08a;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px; margin-top: 10vh; margin-bottom: 10vh;">
        <div class="glass-panel text-center">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="margin: 0;">상담 시작 (Consult Start)</h2>
                <div id="topActionButtons">
                    <a href="service-select.html" class="btn btn-secondary" style="padding: 0.5rem 1rem; width: auto; margin-right: 0.5rem;">뒤로</a>
                    <button onclick="logout()" class="btn btn-secondary" style="padding: 0.5rem 1rem; width: auto;">로그아웃</button>
                </div>
            </div>
            
            <!-- Step 1 -->
            <div class="step-container" style="animation-delay: 0s;">
                <label for="categorySelect" class="form-label">1. 상담 유형 (Category)</label>
                <select id="categorySelect" class="form-input">
                    <option value="">유형을 선택하세요</option>
                    <option value="과태료">과태료</option>
                    <option value="행정처분">행정처분</option>
                    <option value="기타">기타</option>
                </select>
            </div>

            <!-- Step 1-2 (Sub Category) -->
            <div id="subCategoryArea" class="step-container" style="display: none; animation-delay: 0.05s;">
                <label for="subCategorySelect" class="form-label">상세 유형 (Sub Category)</label>
                <select id="subCategorySelect" class="form-input">
                </select>
            </div>


            <!-- Step 2 -->
            <div id="processFlowArea" class="step-container" style="display: none; animation-delay: 0.1s;">
                <label class="form-label">진행 프로세스 (Process Flow)</label>
                <div id="processFlowBox" style="padding: 1.5rem 1rem; border-radius: 8px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; gap: 0.5rem; flex-wrap: wrap;">
                    <!-- Process items injected here -->
                </div>
            </div>

            <!-- Step 3 -->
            <form id="searchForm" class="step-container" style="display: flex; flex-direction: column; gap: 1rem; text-align: left; animation-delay: 0.2s;">
                <div>
                    <label for="phoneInput" class="form-label">2. 고객 검색</label>
                    <input type="tel" id="phoneInput" class="form-input" placeholder="010-0000-0000 (하이픈 포함 권장)" required>
                </div>
                <button type="submit" class="btn" style="margin-top: 0.5rem;">고객 검색</button>
            </form>

            <div id="resultArea" class="step-container" style="margin-top: 1rem; display: none; animation-delay: 0s;">
                <p id="resultMsg" style="margin-bottom: 1rem;"></p>
                <div id="existingCustomerActions" style="display: none; gap: 0.5rem; flex-direction: column;">
                    <button id="viewListBtn" class="btn btn-secondary" style="width: 100%;">기존 상담 내역 보기</button>
                    <button id="createNewCaseBtn" class="btn" style="width: 100%;">이 고객으로 새 상담(사건) 시작</button>
                </div>
                <button id="createCustomerBtn" class="btn btn-secondary" style="display: none; width: 100%;">신규 고객 등록 및 상담 시작</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, requireAuth, DEMO_MODE } from './supabase-client.js';

        // Timeline toggle function
        window.toggleTimeline = (element) => {
            element.classList.toggle('expanded');
        };

        // Logout function
        window.logout = async () => {
            await supabase.auth.signOut();
            localStorage.removeItem('userRole');
            window.location.href = 'index.html';
        };

        // Check auth
        await requireAuth();

        const categorySelect = document.getElementById('categorySelect');
        const processFlowArea = document.getElementById('processFlowArea');
        const processFlowBox = document.getElementById('processFlowBox');
        
        const searchForm = document.getElementById('searchForm');
        const phoneInput = document.getElementById('phoneInput');
        const resultArea = document.getElementById('resultArea');
        const resultMsg = document.getElementById('resultMsg');
        const createCustomerBtn = document.getElementById('createCustomerBtn');
        const existingCustomerActions = document.getElementById('existingCustomerActions');
        const viewListBtn = document.getElementById('viewListBtn');
        const createNewCaseBtn = document.getElementById('createNewCaseBtn');
        
        let currentFoundCustomer = null;

        // Hide search form and top action buttons if DEMO_MODE is true
        if (DEMO_MODE) {
            searchForm.style.display = 'none';
            const topActionButtons = document.getElementById('topActionButtons');
            if (topActionButtons) topActionButtons.style.display = 'none';
        }

        // Phone input auto-hyphenation formatting
        phoneInput.addEventListener('input', function(e) {
            let val = this.value.replace(/[^0-9]/g, '');
            if (val.length > 3 && val.length <= 7) {
                val = val.slice(0,3) + '-' + val.slice(3);
            } else if (val.length > 7) {
                val = val.slice(0,3) + '-' + val.slice(3,7) + '-' + val.slice(7,11);
            }
            this.value = val;
        });

        // Category selection handler
        categorySelect.addEventListener('change', (e) => {
            const val = e.target.value;
            const subCategoryArea = document.getElementById('subCategoryArea');
            const subCategorySelect = document.getElementById('subCategorySelect');
            
            subCategorySelect.innerHTML = '';
            
            if (val === '과태료') {
                subCategorySelect.innerHTML = `
                    <option value="표시광고위반">표시광고위반</option>
                    <option value="부동산거래신고위반">부동산거래신고위반</option>
                    <option value="기타">기타</option>
                `;
                subCategoryArea.style.display = 'block';
            } else if (val === '행정처분') {
                subCategorySelect.innerHTML = `
                    <option value="업무정지">업무정지</option>
                    <option value="등록취소">등록취소</option>
                    <option value="자격취소">자격취소</option>
                    <option value="기타">기타</option>
                `;
                subCategoryArea.style.display = 'block';
            } else {
                subCategoryArea.style.display = 'none';
            }

            if (!val) {
                processFlowArea.style.display = 'none';
                return;
            }
            
            let flowHtml = '';
            let basisHtml = '';
            let appealHtml = '';

            if (val === '과태료') {
                basisHtml = ''; // 하나의 타임라인에 통합
                appealHtml = '';
                flowHtml = `
                    <div class="timeline-container">
                        <!-- 행정 절차 -->
                        <div class="phase-header phase-admin">
                            ⚖️ 근거법: 질서위반행위규제법 (행정 절차)
                        </div>
                        <div class="timeline-wrapper wrapper-admin">
                            <div class="timeline-item expanded active" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>1. 소명</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>위반 행위에 대해 정당한 사유가 있음을 주장하는 초기 단계입니다.</p>
                                        <div class="tip-box">
                                            <strong>💡 Tip:</strong> 소명 기한은 통상 10일 이상. 객관적 자료가 필수입니다.
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="timeline-item" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>2. 사전통지 (의견청취)</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>행정청이 당사자에게 미리 알리고 의견을 제출할 기회를 줍니다.</p>
                                        <div class="tip-box" style="margin-bottom: 0.8rem;">
                                            <strong>💰 안내:</strong> 자진 납부 시 최대 20% 과태료 감경 가능.
                                        </div>
                                        <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; font-size: 0.8rem; border-left: 3px solid #60a5fa; margin-top: 0.5rem;">
                                            <strong style="color: #60a5fa;">📖 질서위반행위규제법 시행령 제3조(사전통지 및 의견제출 등)</strong><br><br>
                                            <span style="color: #cbd5e1;">① 법 제16조제1항에 따라 행정청이 과태료 부과에 관하여 미리 통지하는 경우에는 다음 각 호의 사항을 모두 적은 서면으로 하여야 한다.<br>
                                            &nbsp;&nbsp;1. 당사자의 성명과 주소<br>
                                            &nbsp;&nbsp;<u>2. 과태료 부과의 원인이 되는 사실, 과태료 금액 및 적용 법령</u><br>
                                            &nbsp;&nbsp;3. 과태료를 부과하는 행정청의 명칭과 주소<br>
                                            &nbsp;&nbsp;4. 당사자가 의견을 제출할 수 있다는 사실과 그 제출기한<br>
                                            &nbsp;&nbsp;5. 법 제18조에 따라 자진 납부하는 경우 과태료를 감경받을 수 있다는 사실<br>
                                            &nbsp;&nbsp;<u>5의2. 감경된 과태료 납부 시 과태료 부과·징수절차가 종료되어 의견 제출 및 이의제기를 할 수 없다는 사실</u><br>
                                            &nbsp;&nbsp;6. 제2조의2에 따라 과태료를 감경받을 수 있다는 사실<br>
                                            &nbsp;&nbsp;7. 그 밖에 과태료 부과에 관하여 필요한 사항<br><br>
                                            ② 당사자는 의견제출 기한 이내에 서면이나 말로 의견을 제출(진술)할 수 있고, 증거자료 등을 제출할 수 있다.<br><br>
                                            ③ 행정청은 당사자가 말로 의견을 진술한 경우에는 진술자와 그 의견의 요지를 기록해 두어야 한다.</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="timeline-item" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>3. 과태료 부과</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>정식으로 과태료 납부 고지서가 발송됩니다.</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 불복 절차 -->
                        <div class="phase-header phase-appeal">
                            🚨 불복 절차 (사법 절차)
                        </div>
                        <div class="timeline-wrapper wrapper-appeal">
                            <div class="timeline-item phase-appeal-item" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>4. 이의제기</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>과태료 부과 처분에 불복하여 이의를 제기합니다.</p>
                                        <div class="tip-box" style="margin-bottom: 0.8rem;">
                                            <strong>⚠️ 주의:</strong> 부과 통지 받은 날부터 <b>60일 이내 서면</b> 제출. 이의 제기 시 과태료 처분 효력 상실.
                                        </div>
                                        <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; font-size: 0.8rem; border-left: 3px solid #fca5a5;">
                                            <strong style="color: #fca5a5;">📖 제20조(이의제기)</strong><br><br>
                                            <span style="color: #cbd5e1;">① 행정청의 과태료 부과에 불복하는 당사자는 제17조제1항에 따른 과태료 부과 통지를 받은 날부터 60일 이내에 해당 행정청에 서면으로 이의제기를 할 수 있다.<br><br>
                                            ② 제1항에 따른 이의제기가 있는 경우에는 행정청의 과태료 부과처분은 그 효력을 상실한다.<br><br>
                                            ③ 당사자는 행정청으로부터 제21조제3항에 따른 통지를 받기 전까지는 행정청에 대하여 서면으로 이의제기를 철회할 수 있다.</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="timeline-item phase-appeal-item" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>5. 법원에의 통보</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>행정청은 이의제기를 받은 날부터 14일 이내에 법원에 통보합니다.</p>
                                        <div class="tip-box" style="margin-bottom: 0.8rem;">
                                            <strong>💡 실무 Tip:</strong> 실무상 사실상 <b>전수 약식재판</b>으로 진행됩니다.
                                        </div>
                                        <div style="background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; font-size: 0.8rem; border-left: 3px solid #fca5a5;">
                                            <strong style="color: #fca5a5;">📖 제21조(법원에의 통보)</strong><br><br>
                                            <span style="color: #cbd5e1;">① 제20조제1항에 따른 이의제기를 받은 행정청은 이의제기를 받은 날부터 14일 이내에 이에 대한 의견 및 증빙서류를 첨부하여 관할 법원에 통보하여야 한다. 다만, 다음 각 호의 어느 하나에 해당하는 경우에는 그러하지 아니하다.<br>
                                            &nbsp;&nbsp;1. 당사자가 이의제기를 철회한 경우<br>
                                            &nbsp;&nbsp;2. 당사자의 이의제기에 이유가 있어 과태료를 부과할 필요가 없는 것으로 인정되는 경우<br><br>
                                            ② 행정청은 사실상 또는 법률상 같은 원인으로 말미암아 다수인에게 과태료를 부과할 필요가 있는 경우에는 다수인 가운데 1인에 대한 관할권이 있는 법원에 제1항에 따른 이의제기 사실을 통보할 수 있다.<br><br>
                                            ③ 행정청이 제1항 및 제2항에 따라 관할 법원에 통보를 하거나 통보하지 아니하는 경우에는 그 사실을 즉시 당사자에게 통지하여야 한다.</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="timeline-item phase-appeal-item" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>6. 약식재판 | 재판</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>약식재판은 심문없이 진행되며 이의신청이 적법하다 인정되는 때 그 효력을 잃는다.</p>
                                        <p style="margin-top: 0.5rem;">약식재판 결과에 불복할 경우 정식 재판/항고 가능합니다.</p>
                                        <div class="tip-box">
                                            <strong>⏰ 기한:</strong> 결정 통지 받은 날부터 <b>7일 이내</b> 즉시항고.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (val === '행정처분') {
                basisHtml = '';
                appealHtml = '';
                flowHtml = `
                    <div class="timeline-container">
                        <!-- 행정 절차 -->
                        <div class="phase-header phase-admin">
                            ⚖️ 근거법: 행정절차법 (행정 절차)
                        </div>
                        <div class="timeline-wrapper wrapper-admin">
                            <div class="timeline-item expanded active" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>1. 조사</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>위반 사실에 대한 현장 조사 및 관련 자료 수집 단계입니다.</p>
                                        <div class="tip-box">
                                            <strong>💡 Tip:</strong> 조사 과정에서 작성되는 확인서나 문답서의 내용이 향후 처분의 핵심 근거가 되므로 신중히 답변해야 합니다.
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="timeline-item" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>2. 사전통지 (의견청취)</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>처분을 내리기 전 당사자에게 미리 알리고, 의견이나 소명을 듣는 절차로 등록취소 또는 자격취소의 경우 청문으로 업무정지의 경우 의견제출로서 의견청취를 하게 된다.</p>
                                        <div class="tip-box">
                                            <strong>📝 주의:</strong> 이 단계에서 적극적으로 유리한 증거와 의견서를 제출하여 처분 수위를 낮추는 것이 가장 효과적입니다.
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="timeline-item" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>3. 처분</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>행정처분의 효력은 도달로서 효력이 발생하고 비로서 행정심판이나 행정소송의 청구가 가능하며 효력정지를 집행정지시키기 위해서는 1주정도의 시간이 소요된다.</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 불복 절차 -->
                        <div class="phase-header phase-appeal">
                            🚨 불복 절차 (사법 및 심판 절차)
                        </div>
                        <div class="timeline-wrapper wrapper-appeal">
                            <div class="timeline-item phase-appeal-item" onclick="toggleTimeline(this)">
                                <div class="timeline-dot"></div>
                                <div class="timeline-card">
                                    <div class="timeline-card-header">
                                        <span>4. 행정심판 및 행정소송</span>
                                        <span class="toggle-icon">▼</span>
                                    </div>
                                    <div class="timeline-content">
                                        <p>처분에 불복하여 상급 기관(행정심판위원회)에 심판을 청구하거나, 관할 법원에 소송을 제기합니다.</p>
                                        <div class="tip-box">
                                            <strong>⏰ 제기 기한:</strong> 처분이 있음을 <b>안 날부터 90일</b>, 있은 날부터 <b>180일(소송은 1년) 이내</b>에 제기해야 합니다.<br><br>
                                            <strong>🛡️ 실무 전략:</strong> 처분의 효력을 일시적으로 멈추기 위해 반드시 <b>'집행정지 신청'</b>을 병행하는 것이 일반적입니다.
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            } else if (val === '기타') {
                flowHtml = `<span style="color: var(--text-muted); font-size: 0.9rem;">별도 지정 프로세스 없음</span>`;
            }

            processFlowBox.innerHTML = basisHtml + flowHtml + appealHtml;
            
            // Trigger reflow for animation
            processFlowArea.style.display = 'none';
            processFlowArea.offsetHeight; // force reflow
            processFlowArea.style.display = 'block';
        });

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Normalize phone number (remove hyphens for DB matching)
            const rawPhone = phoneInput.value.trim();
            const normalizedPhone = rawPhone.replace(/-/g, '');
            
            if (!normalizedPhone) return;

            // Show loading state
            resultArea.style.display = 'block';
            resultMsg.textContent = '검색 중...';
            resultMsg.style.color = 'var(--text-main)';
            createCustomerBtn.style.display = 'none';
            existingCustomerActions.style.display = 'none';
            currentFoundCustomer = null;

            // Query customers table by phone
            const { data: customers, error } = await supabase
                .from('customers')
                .select('*')
                .eq('phone', normalizedPhone);

            if (error) {
                console.error('Error fetching customer:', error);
                resultMsg.textContent = '검색 중 오류가 발생했습니다.';
                resultMsg.style.color = '#ef4444';
                return;
            }

            if (customers && customers.length > 0) {
                currentFoundCustomer = customers[0];
                resultMsg.textContent = `${currentFoundCustomer.name} 고객님이 확인되었습니다.`;
                resultMsg.style.color = 'var(--accent-color)';
                
                existingCustomerActions.style.display = 'flex';
            } else {
                // If not found: show "Create New Customer & Case" button
                resultMsg.textContent = '등록된 고객이 없습니다.';
                resultMsg.style.color = 'var(--text-muted)';
                createCustomerBtn.style.display = 'block';
            }
        });

        viewListBtn.addEventListener('click', () => {
            if (!currentFoundCustomer) return;
            const selectedCategory = categorySelect.value;
            const subCategoryArea = document.getElementById('subCategoryArea');
            const subCategorySelect = document.getElementById('subCategorySelect');
            let finalCategory = selectedCategory;
            if (subCategoryArea.style.display !== 'none' && subCategorySelect.value) {
                finalCategory = `${selectedCategory} (${subCategorySelect.value})`;
            }

            const queryParams = new URLSearchParams({ customer_id: currentFoundCustomer.id });
            if (finalCategory) {
                queryParams.set('category', finalCategory);
            }
            window.location.href = `case-list.html?${queryParams.toString()}`;
        });

        createNewCaseBtn.addEventListener('click', async () => {
            if (!currentFoundCustomer) return;
            await createCaseForCustomer(currentFoundCustomer);
        });

        async function createCaseForCustomer(customer) {
            const selectedCategory = categorySelect.value || '기타';
            const subCategoryArea = document.getElementById('subCategoryArea');
            const subCategorySelect = document.getElementById('subCategorySelect');
            
            let finalCategory = selectedCategory;
            if (subCategoryArea.style.display !== 'none' && subCategorySelect.value) {
                finalCategory = `${selectedCategory} (${subCategorySelect.value})`;
            }
            
            resultMsg.textContent = '새 사건을 생성 중입니다...';
            resultMsg.style.color = 'var(--text-main)';
            existingCustomerActions.style.display = 'none';
            createCustomerBtn.style.display = 'none';

            try {
                let current_stage_id = null;
                let targetStageName = null;
                
                if (selectedCategory === '과태료') targetStageName = '소명';
                else if (selectedCategory === '행정처분') targetStageName = '조사';
                
                if (targetStageName) {
                    const { data: stageData, error: stageError } = await supabase
                        .from('stages')
                        .select('id')
                        .eq('name', targetStageName)
                        .maybeSingle(); 
                        
                    if (stageData) {
                        current_stage_id = stageData.id;
                    }
                }
                
                const { data: newCase, error: caseError } = await supabase
                    .from('cases')
                    .insert([{
                        customer_id: customer.id,
                        case_type: finalCategory,
                        status: '진행중',
                        current_stage_id: current_stage_id
                    }])
                    .select()
                    .single();
                    
                if (caseError) throw caseError;
                
                await supabase.from('logs').insert([{
                    case_id: newCase.id,
                    content: `[시스템] 신규 케이스 생성 - 유형: ${finalCategory}`,
                    created_by: '시스템'
                }]);
                
                window.location.href = `case-detail.html?id=${newCase.id}`;
                
            } catch (err) {
                console.error("Error creating case:", err);
                alert("생성 중 오류가 발생했습니다: " + err.message);
                resultMsg.textContent = '생성 실패. 다시 시도해주세요.';
                existingCustomerActions.style.display = 'flex';
            }
        }

        createCustomerBtn.addEventListener('click', async () => {
            const rawPhone = phoneInput.value.trim();
            const normalizedPhone = rawPhone.replace(/-/g, '');
            
            createCustomerBtn.disabled = true;
            createCustomerBtn.textContent = '생성 중...';
            resultMsg.textContent = '신규 고객을 생성 중입니다...';
            
            try {
                const customerName = prompt("고객 이름을 입력하세요:", "신규고객") || "신규고객";
                
                const { data: newCustomer, error: customerError } = await supabase
                    .from('customers')
                    .insert([{ name: customerName, phone: normalizedPhone }])
                    .select()
                    .single();
                    
                if (customerError) throw customerError;

                await createCaseForCustomer(newCustomer);
                
            } catch (err) {
                console.error("Error creating customer/case:", err);
                alert("생성 중 오류가 발생했습니다: " + err.message);
                createCustomerBtn.disabled = false;
                createCustomerBtn.textContent = '신규 고객 등록 및 상담 시작';
                resultMsg.textContent = '생성 실패. 다시 시도해주세요.';
            }
        });
    </script>

        <div class="site-footer-inner">

                <strong class="footer-strong">신대림공인중개사사무소</strong>
                <span>사업자등록번호: 219-01-50737</span> <span>전화번호: 010-9128-0586</span><br>
                <span>주소: 서울특별시 마포구 모래내로7길 52 (성산동)</span>
            </div>
        </div>
    </footer>
