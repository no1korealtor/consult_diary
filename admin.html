<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>공부 관리자</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f6fb;
            padding: 20px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 24px;
        }
        input, textarea {
            width: 100%;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 14px;
            border: 1px solid #ddd;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            background: #222;
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 14px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 8px;
        }
        .btn-delete {
            background: #e74c3c;
        }
        .btn-cancel {
            background: #95a5a6;
        }
        
        /* List Styles */
        h2 {
            margin-top: 40px;
            font-size: 24px;
        }
        .word-item {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .word-item:hover {
            background: #f0f0f0;
        }
        .word-title {
            font-weight: bold;
            font-size: 18px;
        }
        .word-meta {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1 id="page-title">공부 추가</h1>

    <input type="hidden" id="edit_id" />
    <input id="word" placeholder="단어" />
    <input id="hanja" placeholder="한자 (없으면 비워도 됨)" />
    <input id="subject" placeholder="과목" />
    <input id="category" placeholder="분류" />
    <input id="irregular" placeholder="불규칙 변화 (예: go - went - gone, foot - feet 등)" />
    <textarea id="meaning" placeholder="뜻"></textarea>
    <textarea id="example" placeholder="예문"></textarea>
    <input id="image_url" placeholder="이미지 URL 주소 (선택사항, 닻 사진 등 인터넷 주소)" />

    <div style="display:flex; margin-bottom: 20px;">
        <button id="btn-save" onclick="saveWord()">공부 추가</button>
        <button id="btn-cancel" class="btn-cancel" onclick="resetForm()" style="display:none;">작성 취소</button>
        <button id="btn-delete" class="btn-delete" onclick="deleteWord()" style="display:none;">삭제</button>
    </div>

    <h2>등록된 단어 목록 (클릭하여 수정)</h2>
    <div id="word-list"></div>

    <script>
        const supabaseUrl = 'https://clzrbyplzjdrrscctcsl.supabase.co'
        const supabaseKey = 'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k'

        const supabaseClient = window.supabase.createClient(
            supabaseUrl,
            supabaseKey
        )

        async function loadWords() {
            const { data, error } = await supabaseClient
                .from('study_words')
                .select('*')
                .order('created_at', { ascending: false })

            if (error) {
                console.log(error);
                return;
            }

            const list = document.getElementById('word-list');
            list.innerHTML = '';

            data.forEach(item => {
                const div = document.createElement('div');
                div.className = 'word-item';
                div.innerHTML = `
                    <div>
                        <div class="word-title">${item.word} ${item.hanja ? `(${item.hanja})` : ''}</div>
                        <div class="word-meta">${item.subject} | ${item.category}</div>
                    </div>
                `;
                div.onclick = () => editWord(item);
                list.appendChild(div);
            });
        }

        function editWord(item) {
            document.getElementById('edit_id').value = item.id;
            document.getElementById('word').value = item.word || '';
            document.getElementById('hanja').value = item.hanja || '';
            document.getElementById('subject').value = item.subject || '';
            document.getElementById('category').value = item.category || '';
            document.getElementById('irregular').value = item.irregular || '';
            document.getElementById('meaning').value = item.meaning || '';
            document.getElementById('example').value = item.example || '';
            document.getElementById('image_url').value = item.image_url || '';

            document.getElementById('page-title').innerText = '공부 수정';
            document.getElementById('btn-save').innerText = '수정 완료';
            document.getElementById('btn-cancel').style.display = 'block';
            document.getElementById('btn-delete').style.display = 'block';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('edit_id').value = '';
            document.getElementById('word').value = '';
            document.getElementById('hanja').value = '';
            document.getElementById('subject').value = '';
            document.getElementById('category').value = '';
            document.getElementById('irregular').value = '';
            document.getElementById('meaning').value = '';
            document.getElementById('example').value = '';
            document.getElementById('image_url').value = '';

            document.getElementById('page-title').innerText = '공부 추가';
            document.getElementById('btn-save').innerText = '공부 추가';
            document.getElementById('btn-cancel').style.display = 'none';
            document.getElementById('btn-delete').style.display = 'none';
        }

        async function saveWord() {
            const id = document.getElementById('edit_id').value;
            const word = document.getElementById('word').value;
            const hanja = document.getElementById('hanja').value;
            const subject = document.getElementById('subject').value;
            const category = document.getElementById('category').value;
            const irregular = document.getElementById('irregular').value;
            const meaning = document.getElementById('meaning').value;
            const example = document.getElementById('example').value;
            const image_url = document.getElementById('image_url').value;

            if (!word) {
                alert('단어를 입력해주세요.');
                return;
            }

            const payload = { word, hanja, subject, category, irregular, meaning, example, image_url };

            let error;
            if (id) {
                // 수정
                const res = await supabaseClient.from('study_words').update(payload).eq('id', id);
                error = res.error;
            } else {
                // 추가
                const res = await supabaseClient.from('study_words').insert([payload]);
                error = res.error;
            }

            if (error) {
                alert('저장 실패');
                console.log(error);
            } else {
                alert(id ? '수정 완료!' : '저장 완료!');
                resetForm();
                loadWords();
            }
        }

        async function deleteWord() {
            const id = document.getElementById('edit_id').value;
            if (!id) return;

            if (!confirm('정말 삭제하시겠습니까?')) return;

            const { error } = await supabaseClient.from('study_words').delete().eq('id', id);
            
            if (error) {
                alert('삭제 실패');
                console.log(error);
            } else {
                alert('삭제 완료');
                resetForm();
                loadWords();
            }
        }

        // 초기 로드
        loadWords();
    </script>
</body>
</html>
