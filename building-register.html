<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건물 등록</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            margin-bottom: 10px;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body>

    <h2>건물 등록</h2>

    <button onclick="openAddressSearch()">
        주소 검색
    </button>

    <input id="road_address" placeholder="도로명 주소">

    <input id="jibun_address" placeholder="지번 주소">

    <input id="entrance_password" placeholder="공동현관 비밀번호">

    <button onclick="saveBuilding()">
        저장
    </button>

    <div id="status"></div>

    <script src="auth-helper.js"></script>
    <script>

        function openAddressSearch() {

            new daum.Postcode({

                oncomplete: function (data) {

                    document.getElementById('road_address').value =
                        data.roadAddress;

                    document.getElementById('jibun_address').value =
                        data.jibunAddress;

                }

            }).open();

        }

        async function saveBuilding() {

            const roadAddress =
                document.getElementById('road_address').value;

            const jibunAddress =
                document.getElementById('jibun_address').value;

            const entrancePassword =
                document.getElementById(
                    'entrance_password'
                ).value;

            const status =
                document.getElementById('status');

            if (!roadAddress) {

                status.innerText =
                    '주소를 입력하세요';

                return;
            }

            status.innerText = '저장 중...';

            const { data, error } = await supabaseClient
                .from('buildings')
                .insert([
                    {
                        road_address: roadAddress,
                        jibun_address: jibunAddress,
                        entrance_password: entrancePassword,
                        user_id: window.currentUser.id
                    }
                ])
                .select();

            if (error) {

                if (
                    error.message.includes(
                        'unique_user_road_address'
                    )
                ) {

                    status.innerText =
                        '이미 등록된 주소입니다.';

                    return;
                }

                status.innerText =
                    '에러: ' + error.message;

                return;
            }

            if (data && data.length > 0) {
                sessionStorage.setItem('lastRegisteredBuildingId', data[0].id);
            }

            status.innerText = '저장 완료! 이전 화면으로 돌아갑니다...';
            setTimeout(() => {
                if (document.referrer) {
                    location.href = document.referrer;
                } else {
                    history.back();
                }
            }, 1500);

        }

        // 페이지 로드 시 인증 확인
        requireAuth();

    </script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>

</html>
