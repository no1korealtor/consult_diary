<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 수정</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <link rel="stylesheet" href="nav.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
        body { font-family: 'Pretendard Variable', sans-serif; background-color: #f3f4f6; padding: 24px 16px; max-width: 480px; margin: auto; color: #111827; }
        .card { background-color: #ffffff; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); }
        h2 { font-size: 24px; font-weight: 800; margin-bottom: 20px; }
        select, input, textarea { width: 100%; padding: 14px 16px; margin-bottom: 12px; font-size: 15px; box-sizing: border-box; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: #3b82f6; background-color: #ffffff; }
        button { width: 100%; padding: 16px; margin-bottom: 12px; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-secondary { background-color: #f3f4f6; color: #374151; }
        #status { text-align: center; font-size: 14px; margin-top: 10px; }
        .notice { font-size: 13px; color: #6b7280; margin-bottom: 16px; background: #f9fafb; padding: 8px; border-radius: 6px; }
    </style>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="card">
        <h2>일정 수정</h2>
        <div id="buildingRoomText" style="margin-bottom: 8px; font-weight: bold; color: #4b5563; font-size: 15px;">불러오는 중...</div>
        <div class="notice">💡 건물이나 호수를 변경해야 한다면 기존 일정을 삭제하고 새로 등록해 주세요.</div>
        
        <select id="contractType" style="margin-bottom: 12px;">
            <option value="정산">정산</option>
            <option value="잔금">잔금</option>
            <option value="계약">계약</option>
            <option value="기타">기타</option>
        </select>
        
        <textarea id="memo" placeholder="일정 메모 / 모임명" rows="4" style="margin-bottom: 12px;"></textarea>

        <label id="balanceDateLabel" style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: none;">날짜 지정</label>
        <input type="date" id="balanceDate" style="margin-bottom: 12px;">
        
        <div id="meetingEditFields" style="display: none; background: #eff6ff; padding: 16px; border-radius: 12px; border: 1px solid #bfdbfe; margin-bottom: 12px;">
            <label style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">모임 장소 (주소 검색)</label>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <input type="text" id="mLoc" placeholder="도로명/지번 주소 검색" readonly style="flex: 1; margin-bottom: 0; cursor: pointer;" onclick="execDaumPostcodeMeeting()">
                <button type="button" onclick="execDaumPostcodeMeeting()" style="width: auto; padding: 0 16px; margin-bottom: 0; background: #3b82f6; color: white; border-radius: 12px; font-weight: 600;">검색</button>
            </div>
            <input type="text" id="mLocDetail" placeholder="상세 장소 (예: 2층 호프집)" style="margin-bottom: 12px; display: none;">
            
            <label style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">시간</label>
            <div style="display: flex; gap: 4px; margin-bottom: 12px;">
                <select id="mTimeAmPm" style="flex: 1; padding: 12px; border-radius: 12px; font-size: 15px; border: 1px solid #e2e8f0; appearance: none; background: white;">
                    <option value="">오전/오후</option><option value="AM">오전</option><option value="PM">오후</option>
                </select>
                <select id="mTimeHour" style="flex: 1; padding: 12px; border-radius: 12px; font-size: 15px; border: 1px solid #e2e8f0; appearance: none; background: white;"></select>
                <select id="mTimeMinute" style="flex: 1; padding: 12px; border-radius: 12px; font-size: 15px; border: 1px solid #e2e8f0; appearance: none; background: white;"></select>
            </div>
            
            <label style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">관련 링크(URL)</label>
            <input type="text" id="mUrl" placeholder="https://...">
            
            <label style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">링크 표시 이름</label>
            <input type="text" id="mUrlName" placeholder="예: 카카오맵 길찾기">
        </div>

        <button class="btn-primary" onclick="updateDeal()">수정 완료</button>
        <button class="btn-secondary" onclick="history.back()">취소</button>
        <div id="status"></div>
    </div>

    <script src="auth-helper.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const scheduleId = urlParams.get('id');

        async function loadDeal() {
            const { data, error } = await supabaseClient
                .from('schedules')
                .select(`
                    *,
                    buildings ( jibun_address, road_address ),
                    rooms ( room_name )
                `)
                .eq('id', scheduleId)
                .single();

            if (error) {
                alert('일정을 불러오지 못했습니다.');
                return;
            }

            if (data.schedule_type === '모임' || !data.buildings) {
                document.getElementById('buildingRoomText').innerText = `👥 모임 일정 수정`;
                document.getElementById('contractType').style.display = 'none';
                document.getElementById('balanceDateLabel').style.display = 'block';
                document.querySelector('.notice').innerText = "💡 장소, 시간, 링크 및 메모를 수정할 수 있습니다.";
                document.getElementById('meetingEditFields').style.display = 'block';

                let rawMemo = data.memo || '';
                
                let mTime = data.schedule_time ? data.schedule_time.substring(0, 5) : null;
                if (!mTime) {
                    const timeMatch = rawMemo.match(/\[TIME\](.*?)\[\/TIME\]/);
                    if (timeMatch) mTime = timeMatch[1];
                }
                
                if (mTime) {
                    let [h, m] = mTime.split(':');
                    let hh = parseInt(h, 10);
                    let ampm = 'AM';
                    if (hh >= 12) {
                        ampm = 'PM';
                        if (hh > 12) hh -= 12;
                    }
                    if (hh === 0) hh = 12;
                    document.getElementById('mTimeAmPm').value = ampm;
                    document.getElementById('mTimeHour').value = String(hh).padStart(2, '0');
                    document.getElementById('mTimeMinute').value = m;
                }
                
                let mLoc = data.location || null;
                if (data.location_detail) mLoc += ' ' + data.location_detail;
                if (!mLoc) {
                    const locMatch = rawMemo.match(/\[LOC\](.*?)\[\/LOC\]/);
                    if (locMatch) mLoc = locMatch[1];
                }
                if (mLoc) document.getElementById('mLoc').value = mLoc;
                
                let mUrl = data.url || null;
                let mUrlName = data.url_name || null;
                if (!mUrl) {
                    const urlMatch = rawMemo.match(/\[URL\](.*?)\[\/URL\]/);
                    if (urlMatch) {
                        const parts = urlMatch[1].split('|');
                        mUrl = parts[0];
                        if (parts.length > 1) mUrlName = parts[1];
                    }
                }
                if (mUrl) document.getElementById('mUrl').value = mUrl;
                if (mUrlName) document.getElementById('mUrlName').value = mUrlName;

                // Strip ALL occurrences of functional tags globally so they don't show up in textarea
                rawMemo = rawMemo.replace(/\[TIME\].*?\[\/TIME\]/g, '');
                rawMemo = rawMemo.replace(/\[LOC\].*?\[\/LOC\]/g, '');
                rawMemo = rawMemo.replace(/\[URL\].*?\[\/URL\]/g, '');
                rawMemo = rawMemo.replace(/\[ATT\].*?\[\/ATT\]/g, '');
                
                // Retain hidden attributes like PROPOSAL, PENDING_ADMIN, PRIVATE, DONE
                window.meetingHiddenTags = '';
                const tags = ['[DONE]', '[PRIVATE]', '[PROPOSAL]', '[PENDING_ADMIN]'];
                tags.forEach(tag => {
                    if (rawMemo.includes(tag)) {
                        window.meetingHiddenTags += tag;
                    }
                });
                
                // Strip hidden tags safely
                rawMemo = rawMemo.replace(/\[DONE\]/g, '');
                rawMemo = rawMemo.replace(/\[PRIVATE\]/g, '');
                rawMemo = rawMemo.replace(/\[PROPOSAL\]/g, '');
                rawMemo = rawMemo.replace(/\[PENDING_ADMIN\]/g, '');

                document.getElementById('memo').value = rawMemo.trim();

            } else {
                let bName = data.buildings.road_address;
                if (data.buildings.jibun_address) {
                    bName += ' (' + data.buildings.jibun_address + ')';
                }
                const rName = data.rooms ? data.rooms.room_name : '';
                
                document.getElementById('buildingRoomText').innerText = `📍 ${bName} ${rName}`;
                document.getElementById('contractType').value = data.schedule_type;
            }

            if (data.schedule_date) {
                document.getElementById('balanceDate').value = data.schedule_date;
            }
            if (document.getElementById('meetingEditFields').style.display === 'none') {
                document.getElementById('memo').value = data.memo || '';
            }
        }

        async function updateDeal() {
            const contractType = document.getElementById('contractType').style.display !== 'none' ? document.getElementById('contractType').value : undefined;
            const balanceDate = document.getElementById('balanceDate').style.display !== 'none' ? document.getElementById('balanceDate').value : undefined;
            let memo = document.getElementById('memo').value;
            
            const status = document.getElementById('status');

            status.innerText = '저장 중...';

            const payload = {
                memo: memo
            };
            
            // If meeting, reconstruct memo
            if (document.getElementById('meetingEditFields').style.display === 'block') {
                const mLocBase = document.getElementById('mLoc').value;
                const mLocDetail = document.getElementById('mLocDetail').style.display !== 'none' ? document.getElementById('mLocDetail').value.trim() : '';
                
                const ampm = document.getElementById('mTimeAmPm').value;
                const hour = document.getElementById('mTimeHour').value;
                const min = document.getElementById('mTimeMinute').value;
                let mTime = null;
                if (ampm && hour && min) {
                    let hh = parseInt(hour, 10);
                    if (ampm === 'PM' && hh < 12) hh += 12;
                    if (ampm === 'AM' && hh === 12) hh = 0;
                    mTime = String(hh).padStart(2, '0') + ':' + min;
                }
                
                const mUrl = document.getElementById('mUrl').value;
                const mUrlName = document.getElementById('mUrlName').value;

                payload.memo = (window.meetingHiddenTags || '') + memo;
                payload.schedule_time = mTime;
                payload.location = mLocBase || null;
                payload.location_detail = mLocDetail || null;
                payload.url = mUrl || null;
                payload.url_name = mUrlName || null;
            }

            if (contractType !== undefined) payload.schedule_type = contractType;
            if (balanceDate !== undefined) payload.schedule_date = balanceDate ? balanceDate : null;

            const { error } = await supabaseClient
                .from('schedules')
                .update(payload)
                .eq('id', scheduleId);

            if (error) {
                status.innerText = '에러: ' + error.message;
                return;
            }

            status.innerText = '수정 완료';
            alert('일정이 성공적으로 수정되었습니다.');
            location.href = 'deal-detail.html?id=' + scheduleId;
        }

        async function init() {
            const user = await requireAuth();
            if (user) {
                if (!scheduleId) {
                    alert('잘못된 접근입니다.');
                    history.back();
                    return;
                }
                loadDeal();
            }
        }
        function execDaumPostcodeMeeting() {
            new daum.Postcode({
                oncomplete: function(data) {
                    let addr = data.roadAddress !== '' ? data.roadAddress : data.jibunAddress;
                    document.getElementById('mLoc').value = addr;
                    const detailInput = document.getElementById('mLocDetail');
                    detailInput.style.display = 'block';
                    detailInput.focus();
                }
            }).open();
        }

        init();

        function populateTimeSelects(prefix) {
            const hSel = document.getElementById(prefix + 'Hour');
            const mSel = document.getElementById(prefix + 'Minute');
            if (!hSel || !mSel) return;

            let hOpts = '<option value="">시</option>';
            for (let h = 1; h <= 12; h++) {
                const hh = String(h).padStart(2, '0');
                hOpts += `<option value="${hh}">${h}시</option>`;
            }
            hSel.innerHTML = hOpts;

            let mOpts = '<option value="">분</option>';
            for (let m = 0; m < 60; m += 10) {
                const mm = String(m).padStart(2, '0');
                const selected = (mm === '00') ? ' selected' : '';
                mOpts += `<option value="${mm}"${selected}>${mm}분</option>`;
            }
            mSel.innerHTML = mOpts;
        }

        window.addEventListener('DOMContentLoaded', () => {
            populateTimeSelects('mTime');
        });
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
