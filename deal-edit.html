<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일정 수정</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
    <link rel="stylesheet" href="nav.css">
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');
        body { font-family: 'Pretendard Variable', sans-serif; background-color: #f3f4f6; padding: 24px 16px; max-width: 480px; margin: auto; color: #111827; }
        .card { background-color: #ffffff; border-radius: 16px; padding: 24px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02); }
        h2 { font-size: 24px; font-weight: 800; margin-bottom: 20px; }
        select, input, textarea { width: 100%; padding: 14px 16px; margin-bottom: 12px; font-size: 15px; box-sizing: border-box; background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; font-family: inherit; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: #3b82f6; background-color: #ffffff; }
        button { width: 100%; padding: 16px; margin-bottom: 12px; font-size: 16px; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-secondary { background-color: #f3f4f6; color: #374151; }
        #status { text-align: center; font-size: 14px; margin-top: 10px; }
        .notice { font-size: 13px; color: #6b7280; margin-bottom: 16px; background: #f9fafb; padding: 8px; border-radius: 6px; }
    </style>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="card">
        <h2>일정 수정</h2>
        <div id="propertyFields" style="display: none; margin-bottom: 16px;">
            <label style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">장소 (건물/매물) 수정</label>
            <select id="buildingSelect">
                <option value="">건물 또는 매물 선택</option>
            </select>
            <div style="display: flex; gap: 4px; margin-top: 8px; align-items: center;" id="roomSelectContainer">
                <select id="roomSelect" style="flex: 1; margin-bottom: 0;">
                    <option value="">호수 선택</option>
                </select>
            </div>
        </div>
        <div class="notice">💡 건물/매물이나 호수를 선택하여 변경할 수 있습니다. (주소 변경 시 기존 건물에 종속된 관련 데이터는 유지됩니다.)</div>
        
        <div id="clientSelectContainer" style="margin-bottom: 16px;">
            <select id="clientSelect" placeholder="손님 선택 (전화번호 뒷자리 등)">
                <option value="">손님 선택 안함</option>
            </select>
            <button type="button" onclick="location.href='market.html?tab=clients&action=new'" style="width:100%; padding:10px; margin-top:8px; border-radius:8px; font-weight:bold; background:#f1f5f9; color:#3b82f6; border:1px solid #cbd5e1; cursor:pointer; font-size: 13px;">+ 손님을 찾을 수 없나요? 손님 장부에서 새로 등록하기</button>
        </div>

        <select id="contractType" style="margin-bottom: 12px;">
            <option value="정산">정산</option>
            <option value="잔금">잔금</option>
            <option value="계약">계약</option>
            <option value="집보여주기">집보여주기</option>
            <option value="기타">기타</option>
        </select>
        
        <textarea id="memo" placeholder="일정 메모 / 모임명" rows="4" style="margin-bottom: 12px;"></textarea>

        <div style="display: flex; gap: 8px;">
            <div style="flex: 1;">
                <label id="balanceDateLabel" style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">날짜 지정</label>
                <input type="date" id="balanceDate" style="margin-bottom: 12px;">
            </div>
            <div style="flex: 1;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <label style="font-size: 12px; color: #6b7280; font-weight: 600;">시간 지정 (선택)</label>
                    <label style="font-size: 12px; color: #1e293b; font-weight: 600; display: flex; align-items: center; gap: 4px; cursor: pointer;">
                        <input type="checkbox" id="chkMeetAllDay" style="width: 14px; height: 14px; margin: 0; accent-color: #3b82f6;" onchange="document.getElementById('mTimeContainer').style.opacity = this.checked ? '0.5' : '1'; document.getElementById('mTimeContainer').style.pointerEvents = this.checked ? 'none' : 'auto';"> 하루 종일
                    </label>
                </div>
                <div id="mTimeContainer" style="display: flex; gap: 4px; margin-bottom: 12px;">
                    <select id="mTimeAmPm" style="flex: 1; padding: 14px 8px; border-radius: 12px; font-size: 15px; border: 1px solid #e2e8f0; appearance: none; background: white;">
                        <option value="">오전/오후</option><option value="AM">오전</option><option value="PM">오후</option>
                    </select>
                    <select id="mTimeHour" style="flex: 1; padding: 14px 8px; border-radius: 12px; font-size: 15px; border: 1px solid #e2e8f0; appearance: none; background: white;"></select>
                    <select id="mTimeMinute" style="flex: 1; padding: 14px 8px; border-radius: 12px; font-size: 15px; border: 1px solid #e2e8f0; appearance: none; background: white;"></select>
                </div>
            </div>
        </div>
        
        <div id="meetingEditFields" style="display: none; background: #eff6ff; padding: 16px; border-radius: 12px; border: 1px solid #bfdbfe; margin-bottom: 12px;">
            <label style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">모임 장소 (주소 검색)</label>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <input type="text" id="mLoc" placeholder="도로명/지번 주소 검색" readonly style="flex: 1; margin-bottom: 0; cursor: pointer;" onclick="execDaumPostcodeMeeting()">
                <button type="button" onclick="execDaumPostcodeMeeting()" style="width: auto; padding: 0 16px; margin-bottom: 0; background: #3b82f6; color: white; border-radius: 12px; font-weight: 600;">검색</button>
            </div>
            <input type="text" id="mLocDetail" placeholder="상세 장소 (예: 2층 호프집)" style="margin-bottom: 12px; display: none;">
            
            <label style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">관련 링크(URL)</label>
            <input type="text" id="mUrl" placeholder="https://...">
            
            <label style="font-size: 12px; color: #6b7280; font-weight: 600; margin-bottom: 4px; display: block;">링크 표시 이름</label>
            <input type="text" id="mUrlName" placeholder="예: 카카오맵 길찾기">
        </div>

        <button class="btn-primary" onclick="updateDeal()">수정 완료</button>
        <button class="btn-secondary" onclick="history.back()">취소</button>
        <div id="status"></div>
    </div>

    <script src="auth-helper.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const scheduleId = urlParams.get('id');

        async function loadDeal() {
            const { data, error } = await supabaseClient
                .from('schedules')
                .select(`
                    *,
                    buildings ( jibun_address, road_address ),
                    rooms ( room_name )
                `)
                .eq('id', scheduleId)
                .single();

            if (error) {
                alert('일정을 불러오지 못했습니다.');
                return;
            }
            loadClients(data.client_id);

            if (data.property_id) {
                const { data: prop } = await supabaseClient.from('properties').select('address').eq('id', data.property_id).single();
                if (prop) {
                    data.properties = prop;
                }
            }

            let rawMemo = data.memo || '';
            window.preservedTags = '';
            
            const exactTags = ['[DONE]', '[PRIVATE]', '[PROPOSAL]', '[PENDING_ADMIN]'];
            exactTags.forEach(tag => {
                if (rawMemo.includes(tag)) {
                    window.preservedTags += tag;
                    rawMemo = rawMemo.replace(tag, '');
                }
            });
            
            const regexTags = [/\[HIDDEN:[^\]]+\]/g, /\[SETTLED_DATE\].*?\[\/SETTLED_DATE\]/g, /\[DONE:[^\]]+\]/g];
            regexTags.forEach(regex => {
                const matches = rawMemo.match(regex);
                if (matches) {
                    window.preservedTags += matches.join('');
                    rawMemo = rawMemo.replace(regex, '');
                }
            });

            let mTime = data.schedule_time ? data.schedule_time.substring(0, 5) : null;
            if (!mTime) {
                const timeMatch = rawMemo.match(/\[TIME\](.*?)\[\/TIME\]/);
                if (timeMatch) mTime = timeMatch[1];
            }
            
            if (mTime) {
                if (mTime === '하루 종일') {
                    const chk = document.getElementById('chkMeetAllDay');
                    if (chk) { chk.checked = true; chk.dispatchEvent(new Event('change')); }
                } else {
                    let [h, m] = mTime.split(':');
                    let hh = parseInt(h, 10);
                    let ampm = 'AM';
                    if (hh >= 12) {
                        ampm = 'PM';
                        if (hh > 12) hh -= 12;
                    }
                    if (hh === 0) hh = 12;
                    document.getElementById('mTimeAmPm').value = ampm;
                    document.getElementById('mTimeHour').value = String(hh).padStart(2, '0');
                    document.getElementById('mTimeMinute').value = m;
                }
            }

            if (data.schedule_type === '모임' || (!data.buildings && !data.properties)) {
                document.getElementById('propertyFields').style.display = 'none';
                document.getElementById('contractType').style.display = 'none';
                if(document.getElementById('clientSelectContainer')) document.getElementById('clientSelectContainer').style.display = 'none';
                document.getElementById('balanceDateLabel').style.display = 'block';
                document.querySelector('.notice').innerText = "💡 장소, 링크 및 메모를 수정할 수 있습니다.";
                document.getElementById('meetingEditFields').style.display = 'block';
                
                let mLoc = data.location || null;
                if (data.location_detail) mLoc += ' ' + data.location_detail;
                if (!mLoc) {
                    const locMatch = rawMemo.match(/\[LOC\](.*?)\[\/LOC\]/);
                    if (locMatch) mLoc = locMatch[1];
                }
                if (mLoc) document.getElementById('mLoc').value = mLoc;
                
                let mUrl = data.url || null;
                let mUrlName = data.url_name || null;
                if (!mUrl) {
                    const urlMatch = rawMemo.match(/\[URL\](.*?)\[\/URL\]/);
                    if (urlMatch) {
                        const parts = urlMatch[1].split('|');
                        mUrl = parts[0];
                        if (parts.length > 1) mUrlName = parts[1];
                    }
                }
                if (mUrl) document.getElementById('mUrl').value = mUrl;
                if (mUrlName) document.getElementById('mUrlName').value = mUrlName;

                // Strip ALL occurrences of functional tags globally so they don't show up in textarea
                rawMemo = rawMemo.replace(/\[TIME\].*?\[\/TIME\]/g, '');
                rawMemo = rawMemo.replace(/\[LOC\].*?\[\/LOC\]/g, '');
                rawMemo = rawMemo.replace(/\[URL\].*?\[\/URL\]/g, '');
                rawMemo = rawMemo.replace(/\[ATT\].*?\[\/ATT\]/g, '');
                
                document.getElementById('memo').value = rawMemo.trim();

            } else {
                document.getElementById('propertyFields').style.display = 'block';
                document.getElementById('contractType').value = data.schedule_type;
                await loadBuildings(data.building_id, data.property_id, data.room_id);
            }

            if (data.schedule_date) {
                document.getElementById('balanceDate').value = data.schedule_date;
            }
            if (document.getElementById('meetingEditFields').style.display === 'none') {
                document.getElementById('memo').value = rawMemo.trim();
            }
        }

        async function updateDeal() {
            const contractType = document.getElementById('contractType').style.display !== 'none' ? document.getElementById('contractType').value : undefined;
            const balanceDate = document.getElementById('balanceDate').style.display !== 'none' ? document.getElementById('balanceDate').value : undefined;
            let memo = document.getElementById('memo').value;
            
            const status = document.getElementById('status');

            status.innerText = '저장 중...';

            const payload = {
                memo: ''
            };
            
            let finalTags = window.preservedTags || '';
            const todayStr = new Date().toLocaleDateString('en-CA');
            if (balanceDate && balanceDate >= todayStr) {
                finalTags = finalTags.replace(/\[DONE\]/g, '').replace(/\[DONE:[^\]]+\]/g, '');
            }
            payload.memo = finalTags + memo;

            if (document.getElementById('propertyFields').style.display === 'block') {
                const bVal = document.getElementById('buildingSelect').value;
                if (bVal && bVal.startsWith('P_')) {
                    payload.property_id = bVal.substring(2);
                    payload.building_id = null;
                    payload.room_id = null;
                } else if (bVal && bVal.startsWith('B_')) {
                    payload.building_id = bVal.substring(2);
                    payload.property_id = null;
                    const rVal = document.getElementById('roomSelect').value;
                    payload.room_id = rVal || null;
                } else {
                    payload.building_id = null;
                    payload.property_id = null;
                    payload.room_id = null;
                }
            }
            
            // If meeting, reconstruct memo
            if (document.getElementById('meetingEditFields').style.display === 'block') {
                const mLocBase = document.getElementById('mLoc').value;
                const mLocDetail = document.getElementById('mLocDetail').style.display !== 'none' ? document.getElementById('mLocDetail').value.trim() : '';
                
                const mUrl = document.getElementById('mUrl').value;
                const mUrlName = document.getElementById('mUrlName').value;

                payload.location = mLocBase || null;
                payload.location_detail = mLocDetail || null;
                payload.url = mUrl || null;
                payload.url_name = mUrlName || null;
            }

            let mTime = null;
            if (document.getElementById('chkMeetAllDay')?.checked) {
                payload.memo = '[TIME]하루 종일[/TIME]\n' + payload.memo;
            } else {
                const ampm = document.getElementById('mTimeAmPm').value;
                const hour = document.getElementById('mTimeHour').value;
                const min = document.getElementById('mTimeMinute').value;
                if (ampm && hour && min) {
                    let hh = parseInt(hour, 10);
                    if (ampm === 'PM' && hh < 12) hh += 12;
                    if (ampm === 'AM' && hh === 12) hh = 0;
                    mTime = String(hh).padStart(2, '0') + ':' + min;
                }
            }
            payload.schedule_time = mTime;

            if (contractType !== undefined) payload.schedule_type = contractType;
            if (balanceDate !== undefined) payload.schedule_date = balanceDate ? balanceDate : null;
            const clientId = document.getElementById('clientSelect') ? document.getElementById('clientSelect').value : null;
            payload.client_id = clientId || null;

            const { error } = await supabaseClient
                .from('schedules')
                .update(payload)
                .eq('id', scheduleId);

            if (error) {
                status.innerText = '에러: ' + error.message;
                return;
            }

            status.innerText = '수정 완료';
            alert('일정이 성공적으로 수정되었습니다.');
            location.href = 'deal-detail.html?id=' + scheduleId;
        }

        async function loadClients(currentClientId) {
            const select = document.getElementById('clientSelect');
            if (window.clientTomSelect) window.clientTomSelect.destroy();
            select.innerHTML = '<option value="">손님 검색 (전화번호 뒤 4자리 등)</option>';
            const { data, error } = await supabaseClient.from('client_requests').select('id, client_phone, memo').eq('office_id', window.currentUser.office_id).order('created_at', { ascending: false });
            if (error) return;
            data.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.id;
                const phone = c.client_phone ? c.client_phone.replace(/[^0-9]/g, '').replace(/(\d{3})(\d{3,4})(\d{4})/, '$1-$2-$3') : '';
                opt.textContent = `${phone} ${c.memo ? '(' + c.memo.substring(0, 15) + ')' : ''}`;
                select.appendChild(opt);
            });
            window.clientTomSelect = new TomSelect('#clientSelect', {
                create: false, sortField: { field: 'text', direction: 'asc' }, maxOptions: null, placeholder: "손님 선택 (전화번호 뒷자리 등)"
            });
            if (currentClientId) {
                window.clientTomSelect.setValue(currentClientId);
            }
        }

        async function loadBuildings(selectedBuildingId, selectedPropertyId, selectedRoomId) {
            const p1 = supabaseClient.from('buildings').select('*').eq('office_id', window.currentUser.office_id).order('created_at', { ascending: false });
            const p2 = supabaseClient.from('properties').select('id, address, deal_types, room_count, memo').eq('office_id', window.currentUser.office_id).order('created_at', { ascending: false });

            const [res1, res2] = await Promise.all([p1, p2]);
            if (res1.error) return;

            const select = document.getElementById('buildingSelect');
            if (window.buildingTomSelect) window.buildingTomSelect.destroy();
            select.innerHTML = '<option value="">건물 또는 매물 검색</option>';

            const optgroupB = document.createElement('optgroup');
            optgroupB.label = "🏢 내 관리 건물";
            const seenBuildings = new Set();
            res1.data.forEach(building => {
                let text = building.road_address;
                if (building.jibun_address) text += ' (' + building.jibun_address + ')';
                if (seenBuildings.has(text)) return;
                seenBuildings.add(text);
                const option = document.createElement('option');
                option.value = 'B_' + building.id;
                option.textContent = text;
                optgroupB.appendChild(option);
            });
            select.appendChild(optgroupB);

            if (res2.data && res2.data.length > 0) {
                const optgroupP = document.createElement('optgroup');
                optgroupP.label = "🏠 내 매물장";
                res2.data.forEach(prop => {
                    const option = document.createElement('option');
                    option.value = 'P_' + prop.id;
                    let displayAddr = prop.address || '주소없음';
                    if (window.formatAddress) displayAddr = window.formatAddress(displayAddr, prop.user_id);
                    option.textContent = `[매물] ${displayAddr}`;
                    optgroupP.appendChild(option);
                });
                select.appendChild(optgroupP);
            }

            window.buildingTomSelect = new TomSelect("#buildingSelect", {
                create: false,
                placeholder: "건물명, 지번 검색...",
                onChange: function(value) {
                    const roomSelectContainer = document.getElementById('roomSelectContainer');
                    if (value && value.startsWith('P_')) {
                        roomSelectContainer.style.display = 'none';
                    } else if (value) {
                        roomSelectContainer.style.display = 'flex';
                        loadRooms(value.substring(2));
                    } else {
                        roomSelectContainer.style.display = 'none';
                    }
                }
            });

            if (selectedPropertyId) {
                window.buildingTomSelect.setValue('P_' + selectedPropertyId);
            } else if (selectedBuildingId) {
                window.buildingTomSelect.setValue('B_' + selectedBuildingId);
                await loadRooms(selectedBuildingId, selectedRoomId);
            }
        }

        async function loadRooms(buildingId, selectedRoomId) {
            const roomSelect = document.getElementById('roomSelect');
            roomSelect.innerHTML = '<option value="">호수 선택</option>';
            if (!buildingId) return;

            const { data, error } = await supabaseClient.from('rooms').select('*').eq('building_id', buildingId).eq('office_id', window.currentUser.office_id);
            if (error) return;

            const seenRooms = new Set();
            data.forEach(room => {
                const normalizedName = (room.room_name || '').replace(/[\u200B-\u200D\uFEFF]/g, '').replace(/\s+/g, ' ').trim();
                if (seenRooms.has(normalizedName)) return;
                seenRooms.add(normalizedName);
                const option = document.createElement('option');
                option.value = room.id;
                option.textContent = normalizedName;
                roomSelect.appendChild(option);
            });
            if (selectedRoomId) {
                roomSelect.value = selectedRoomId;
            }
        }

        async function init() {
            const user = await requireAuth();
            if (user) {
                if (!scheduleId) {
                    alert('잘못된 접근입니다.');
                    history.back();
                    return;
                }
                loadDeal();
            }
        }
        function execDaumPostcodeMeeting() {
            new daum.Postcode({
                oncomplete: function(data) {
                    let addr = data.roadAddress !== '' ? data.roadAddress : data.jibunAddress;
                    document.getElementById('mLoc').value = addr;
                    const detailInput = document.getElementById('mLocDetail');
                    detailInput.style.display = 'block';
                    detailInput.focus();
                }
            }).open();
        }

        init();

        function populateTimeSelects(prefix) {
            const hSel = document.getElementById(prefix + 'Hour');
            const mSel = document.getElementById(prefix + 'Minute');
            if (!hSel || !mSel) return;

            let hOpts = '<option value="">시</option>';
            for (let h = 1; h <= 12; h++) {
                const hh = String(h).padStart(2, '0');
                hOpts += `<option value="${hh}">${h}시</option>`;
            }
            hSel.innerHTML = hOpts;

            let mOpts = '<option value="">분</option>';
            for (let m = 0; m < 60; m += 10) {
                const mm = String(m).padStart(2, '0');
                const selected = (mm === '00') ? ' selected' : '';
                mOpts += `<option value="${mm}"${selected}>${mm}분</option>`;
            }
            mSel.innerHTML = mOpts;
        }

        window.addEventListener('DOMContentLoaded', () => {
            populateTimeSelects('mTime');
        });
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
