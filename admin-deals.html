<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전체 일정 보기 (관리자)</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css');

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: #f3f4f6;
            padding: 24px 16px;
            max-width: 480px;
            margin: auto;
            color: #111827;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
        }

        h2 {
            font-size: 24px;
            font-weight: 800;
            color: #111827;
            letter-spacing: -0.5px;
        }

        h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #374151;
        }

        .deal-item {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.05);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .deal-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.04);
            border-color: #bfdbfe;
        }

        .app-footer {
            margin-top: 40px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
            text-align: center;
            color: #9ca3af;
            font-size: 12px;
            line-height: 1.6;
        }

        .app-footer strong {
            color: #6b7280;
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2 style="margin: 0;">👑 전체 일정 보기</h2>
        <button type="button" onclick="location.href='deal-register.html'" style="width: auto; padding: 8px 16px; font-size: 14px; background: #ffffff; border: 1px solid #e5e7eb; color: #374151; border-radius: 8px; cursor: pointer; margin-bottom: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); display: flex; align-items: center; gap: 6px;">
            <span>◀</span> 돌아가기
        </button>
    </div>

    <ul id="dealList" style="list-style: none; padding: 0;"></ul>
</div>

    <script src="auth-helper.js"></script>
    <script>
        async function checkAuthAndLoad() {
            const user = await requireAuth();
            if (user) {
                if (user.role !== 'admin') {
                    alert('관리자 권한이 없습니다.');
                    location.href = 'deal-register.html';
                    return;
                }
                loadDeals();
            }
        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || window.performance && window.performance.navigation.type === 2) {
                checkAuthAndLoad();
            }
        });

        function getDDay(dateString) {
            if (!dateString) return '';
            const targetDate = new Date(dateString);
            targetDate.setHours(0,0,0,0);
            const today = new Date();
            today.setHours(0,0,0,0);
            
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays > 0) return `D-${diffDays}`;
            if (diffDays === 0) return `D-Day`;
            return `D+${Math.abs(diffDays)}`;
        }

        async function loadDeals() {
            const list = document.getElementById('dealList');
            list.innerHTML = '<li>로딩 중...</li>';

            // 어드민이므로 user_id 필터 없이 전체 조회
            // users 테이블 조인이 가능한지 시도
            let { data, error } = await supabaseClient
                .from('deals')
                .select(`
                    id,
                    contract_type,
                    balance_date,
                    memo,
                    buildings ( jibun_address, road_address ),
                    rooms ( room_name ),
                    users ( name )
                `)
                .order('balance_date', { ascending: false })
                .limit(50);

            if (error) {
                // users 조인이 안 될 경우 대비 폴백
                console.warn('users join failed, falling back:', error.message);
                const fallback = await supabaseClient
                    .from('deals')
                    .select(`
                        id,
                        contract_type,
                        balance_date,
                        memo,
                        buildings ( jibun_address, road_address ),
                        rooms ( room_name )
                    `)
                    .order('balance_date', { ascending: false })
                    .limit(50);
                
                if (fallback.error) {
                    list.innerHTML = '<li>목록을 불러오지 못했습니다.</li>';
                    console.log(fallback.error);
                    return;
                }
                data = fallback.data;
            }

            list.innerHTML = '';
            if (!data || data.length === 0) {
                list.innerHTML = '<li>등록된 일정이 없습니다.</li>';
                return;
            }

            // 오늘 날짜 기준으로 가장 가까운 순서대로 정렬
            data.sort((a, b) => {
                if (!a.balance_date) return 1;
                if (!b.balance_date) return -1;
                const dateA = new Date(a.balance_date);
                const dateB = new Date(b.balance_date);
                const today = new Date();
                today.setHours(0,0,0,0);
                
                const diffA = Math.abs(dateA - today);
                const diffB = Math.abs(dateB - today);
                return diffA - diffB;
            });

            data.forEach(deal => {
                let locationHtml = '';
                if (deal.contract_type === '세무') {
                    locationHtml = `<div style="margin-bottom: 4px; color: #1f2937; font-size: 15px; font-weight: 600;">🏢 사무소 공통 일정 (세무)</div>`;
                } else {
                    let bName = '알 수 없는 건물';
                    if (deal.buildings) {
                        bName = deal.buildings.road_address;
                        if (deal.buildings.jibun_address) {
                            bName += ' (' + deal.buildings.jibun_address + ')';
                        }
                    }
                    const rName = deal.rooms ? deal.rooms.room_name : '알 수 없는 호수';
                    locationHtml = `<div style="margin-bottom: 4px; color: #1f2937; font-size: 15px; font-weight: 600;">📍 ${bName} ${rName}</div>`;
                }
                const uName = deal.users && deal.users.name ? deal.users.name : '알수없음';
                
                const dDayText = getDDay(deal.balance_date);
                let dDayHtml = '';
                if (dDayText) {
                    let badgeBg = '#f3f4f6', badgeColor = '#6b7280'; // Past
                    if (dDayText === 'D-Day') { badgeBg = '#fee2e2'; badgeColor = '#ef4444'; }
                    else if (dDayText.startsWith('D-')) { badgeBg = '#dbeafe'; badgeColor = '#2563eb'; }
                    
                    dDayHtml = `<span style="background: ${badgeBg}; color: ${badgeColor}; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 800; margin-right: 8px;">${dDayText}</span>`;
                }

                const li = document.createElement('li');
                li.className = 'deal-item';
                li.onclick = () => {
                    location.href = 'deal-detail.html?id=' + deal.id;
                };
                
                li.innerHTML = `
                    <div style="display: flex; align-items: center; margin-bottom: 8px;">
                        <span style="background: #e0e7ff; color: #4338ca; padding: 2px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; margin-right: 8px;">${deal.contract_type}</span>
                        ${dDayHtml}
                        <span style="background: #fef3c7; color: #d97706; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 700; margin-right: 8px;">👤 ${uName}</span>
                        <span style="color: #6b7280; font-size: 13px; margin-left: auto;">${deal.balance_date || '날짜 미정'}</span>
                    </div>
                    ${locationHtml}
                    ${deal.memo ? `<div style="color: #9ca3af; font-size: 13px; margin-top: 6px; background: #f8fafc; padding: 6px 10px; border-radius: 6px;">📝 ${deal.memo}</div>` : ''}
                `;
                list.appendChild(li);
            });
        }

        checkAuthAndLoad();
    </script>

    <footer class="app-footer">
        <strong>신대림공인중개사사무소</strong>
        사업자등록번호: 219-01-50737 | 전화번호: 010-9128-0586<br>
        서울특별시 마포구 모래내로7길 52 (성산동)
    </footer>
</body>
</html>
