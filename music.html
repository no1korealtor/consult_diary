<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>광고 없는 음악 도구 (메트로놈 & 튜너)</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: #1e1e2f;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            background: #2a2a40;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            color: #4facfe;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #3a3a5a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #4facfe;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
        }

        .container {
            background: #2a2a40;
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Metronome Styles */
        .bpm-display {
            font-size: 64px;
            font-weight: 800;
            color: #4facfe;
            margin: 20px 0;
        }

        .slider-container {
            margin: 30px 0;
        }

        input[type=range] {
            width: 100%;
            accent-color: #4facfe;
        }

        .btn-play {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4);
            transition: transform 0.2s;
        }

        .btn-play:active {
            transform: scale(0.95);
        }

        /* Tuner Styles */
        .tuner-note {
            font-size: 80px;
            font-weight: 800;
            color: #00f2fe;
            margin: 20px 0;
            height: 100px;
        }

        .tuner-cents {
            font-size: 20px;
            color: #a0a0b0;
        }

        .tuner-meter {
            width: 100%;
            height: 20px;
            background: #1e1e2f;
            border-radius: 10px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .meter-indicator {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ff4757;
            left: 50%;
            transform: translateX(-50%);
            transition: left 0.1s ease-out;
        }

        .meter-center {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(255,255,255,0.3);
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-mic {
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🎵 Music Tools (광고 없음)</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('metronome')">메트로놈</button>
        <button class="tab-btn" onclick="switchTab('tuner')">튜너</button>
    </div>

    <!-- Metronome Section -->
    <div id="metronome-sec" class="container">
        <div class="bpm-display"><span id="bpm-val">120</span> BPM</div>
        <div class="slider-container">
            <input type="range" id="bpm-slider" min="40" max="240" value="120" oninput="updateBPM(this.value)">
        </div>
        <button class="btn-play" id="play-btn" onclick="toggleMetronome()">▶ 재생</button>
    </div>

    <!-- Tuner Section -->
    <div id="tuner-sec" class="container hidden">
        <p style="color: #a0a0b0; margin-bottom: 10px;">마이크 접근 권한이 필요합니다.</p>
        <div class="tuner-note" id="note-display">-</div>
        <div class="tuner-cents" id="cents-display">0 ¢</div>
        
        <div class="tuner-meter">
            <div class="meter-center"></div>
            <div class="meter-indicator" id="meter-indicator"></div>
        </div>
        
        <button class="btn-mic" id="mic-btn" onclick="startTuner()">🎙️ 튜너 켜기</button>
    </div>

    <script>
        // --- Tab Logic ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'metronome') {
                document.getElementById('metronome-sec').classList.remove('hidden');
                document.getElementById('tuner-sec').classList.add('hidden');
                stopTuner();
            } else {
                document.getElementById('tuner-sec').classList.remove('hidden');
                document.getElementById('metronome-sec').classList.add('hidden');
                if(isPlaying) toggleMetronome(); // stop metronome
            }
        }

        // --- Metronome Logic ---
        let audioCtx;
        let isPlaying = false;
        let bpm = 120;
        let timerID;

        function updateBPM(val) {
            bpm = val;
            document.getElementById('bpm-val').innerText = bpm;
        }

        function playClick() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            osc.frequency.value = 800; // Click pitch
            
            // Short click sound envelope
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function toggleMetronome() {
            const btn = document.getElementById('play-btn');
            if (isPlaying) {
                clearInterval(timerID);
                isPlaying = false;
                btn.innerText = '▶ 재생';
                btn.style.background = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
            } else {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                isPlaying = true;
                btn.innerText = '⏸ 정지';
                btn.style.background = 'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)';
                
                playClick(); // play first click immediately
                timerID = setInterval(playClick, (60 / bpm) * 1000);
            }
        }

        // --- Tuner Logic (Autocorrelation) ---
        let tunerCtx;
        let analyser;
        let stream;
        let reqAnimFrame;
        
        const noteStrings = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];

        function noteFromPitch(frequency) {
            const noteNum = 12 * (Math.log(frequency / 440) / Math.log(2));
            return Math.round(noteNum) + 69;
        }

        function frequencyFromNoteNumber(note) {
            return 440 * Math.pow(2, (note - 69) / 12);
        }

        function centsOffFromPitch(frequency, note) {
            return Math.floor(1200 * Math.log(frequency / frequencyFromNoteNumber(note)) / Math.log(2));
        }

        // AutoCorrelate Algorithm to find pitch
        function autoCorrelate(buf, sampleRate) {
            let SIZE = buf.length;
            let rms = 0;
            for (let i = 0; i < SIZE; i++) {
                let val = buf[i];
                rms += val * val;
            }
            rms = Math.sqrt(rms / SIZE);
            if (rms < 0.01) return -1; // Not enough signal

            let r1 = 0, r2 = SIZE - 1, thres = 0.2;
            for (var i = 0; i < SIZE / 2; i++)
                if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (var i = 1; i < SIZE / 2; i++)
                if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

            buf = buf.slice(r1, r2);
            SIZE = buf.length;
            let c = new Array(SIZE).fill(0);
            for (let i = 0; i < SIZE; i++) {
                for (let j = 0; j < SIZE - i; j++) {
                    c[i] = c[i] + buf[j] * buf[j + i];
                }
            }
            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < SIZE; i++) {
                if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            }
            let T0 = maxpos;
            let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
            let a = (x1 + x3 - 2 * x2) / 2;
            let b = (x3 - x1) / 2;
            if (a) T0 = T0 - b / (2 * a);
            return sampleRate / T0;
        }

        async function startTuner() {
            const btn = document.getElementById('mic-btn');
            
            try {
                if(!tunerCtx) tunerCtx = new (window.AudioContext || window.webkitAudioContext)();
                stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = tunerCtx.createMediaStreamSource(stream);
                analyser = tunerCtx.createAnalyser();
                analyser.fftSize = 2048;
                source.connect(analyser);
                
                btn.innerText = '🔴 튜닝 중... (마이크 켜짐)';
                btn.style.background = 'linear-gradient(135deg, #1dd1a1 0%, #10ac84 100%)';
                
                updatePitch();
            } catch (err) {
                alert("마이크 접근이 거부되었습니다. 권한을 허용해주세요!");
            }
        }

        function stopTuner() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
            
            const btn = document.getElementById('mic-btn');
            btn.innerText = '🎙️ 튜너 켜기';
            btn.style.background = 'linear-gradient(135deg, #ff4757 0%, #ff6b81 100%)';
            document.getElementById('note-display').innerText = '-';
            document.getElementById('cents-display').innerText = '0 ¢';
            document.getElementById('meter-indicator').style.left = '50%';
        }

        function updatePitch() {
            if(!stream) return;
            let buf = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(buf);
            
            let pitch = autoCorrelate(buf, tunerCtx.sampleRate);
            
            if (pitch !== -1) {
                let note = noteFromPitch(pitch);
                let cents = centsOffFromPitch(pitch, note);
                
                document.getElementById('note-display').innerText = noteStrings[note % 12];
                document.getElementById('cents-display').innerText = cents + ' ¢';
                
                // Update meter UI (from -50 to +50 cents maps to 0% to 100% width)
                let percent = (cents + 50) / 100;
                percent = Math.max(0, Math.min(1, percent));
                let meterEl = document.getElementById('meter-indicator');
                meterEl.style.left = (percent * 100) + '%';
                
                // Color green if perfectly in tune (within 5 cents)
                if (Math.abs(cents) < 5) {
                    meterEl.style.background = '#1dd1a1';
                    document.getElementById('note-display').style.color = '#1dd1a1';
                } else {
                    meterEl.style.background = '#ff4757';
                    document.getElementById('note-display').style.color = '#00f2fe';
                }
            }
            
            reqAnimFrame = requestAnimationFrame(updatePitch);
        }
    </script>
</body>
</html>
