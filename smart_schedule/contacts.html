<ul id="userList" style="list-style: none; padding: 0;"></ul>

    <script src="auth-helper.js"></script>
    <script>
        function switchTab(tabName) {
            document.getElementById('staffTab').style.display = tabName === 'staff' ? 'block' : 'none';
            document.getElementById('orgsTab').style.display = tabName === 'orgs' ? 'block' : 'none';
            
            document.getElementById('tabStaff').className = tabName === 'staff' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabOrgs').className = tabName === 'orgs' ? 'tab-btn active' : 'tab-btn';
        }

        async function checkAuthAndLoad() {
            const user = await requireAuth();
            if (user) {
                document.getElementById('welcomeMessage').innerText = (user.name || '전문가') + '님 환영합니다!';
                loadUsers();
            }
        }

        window.addEventListener('pageshow', function(event) {
            if (event.persisted || window.performance && window.performance.navigation.type === 2) {
                checkAuthAndLoad();
            }
        });

        async function loadUsers() {
            const list = document.getElementById('userList');
            list.innerHTML = '<li>로딩 중...</li>';

            // users 정보와 속한 그룹(user_groups -> groups) 정보를 함께 가져옴
            let query = authClient
                .from('users')
                .select(`
                    id, name, phone, office_address, role,
                    user_groups ( group_id, status, group_role, groups ( name ) )
                `)
                .not('role', 'is', null) // 승인된 유저만 노출
                .order('name');

            const { data, error } = await query;

            if (error) {
                list.innerHTML = `<li style="color: #ef4444; font-size: 14px;">직원 목록을 불러오지 못했습니다.<br>사유: ${error.message}</li>`;
                return;
            }

            list.innerHTML = '';
            if (!data || data.length === 0) {
                list.innerHTML = '<li>가입된 직원이 없습니다.</li>';
                return;
            }

            data.forEach(user => {
                const li = document.createElement('li');
                li.className = 'user-item';
                li.style.flexDirection = 'column';
                li.style.alignItems = 'stretch';
                
                const nameStr = user.name || '이름 없음';
                const phoneStr = user.phone || '전화번호 미입력';
                const officeStr = user.office_address || '사무실 주소 미입력';
                const isMe = user.id === window.currentUser.id;

                let groupBadges = '';
                if (user.user_groups && user.user_groups.length > 0) {
                    user.user_groups.forEach(ug => {
                        const gName = ug.groups?.name || '알 수 없는 그룹';
                        const isPending = ug.status === 'pending';
                        if (isPending) return; // 승인 대기중인 그룹은 일반 노출 안함
                        
                        groupBadges += `<span style="display: inline-block; padding: 3px 8px; border-radius: 6px; background: #e0e7ff; color: #4338ca; font-size: 11px; font-weight: 700; margin-right: 4px; margin-top: 4px;">${gName}</span>`;
                    });
                }
                if (!groupBadges) {
                    groupBadges = `<span style="display: inline-block; padding: 3px 8px; border-radius: 6px; background: #f1f5f9; color: #64748b; font-size: 11px; font-weight: 700; margin-top: 4px;">소속 없음</span>`;
                }

                li.innerHTML = `
                    <div style="display: flex; flex-direction: column; width: 100%;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <div class="user-info">
                                <span class="user-name">${nameStr} ${isMe ? '(나)' : ''}</span>
                                <span class="user-phone" style="margin-top: 2px;">☎️ ${phoneStr}</span>
                                <span class="user-phone" style="font-size: 12px;">${officeStr}</span>
                            </div>
                            
                        </div>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        checkAuthAndLoad();
    </script>
