<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개업공인중개사 회원가입</title>
    <link rel="stylesheet" href="app.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <div class="glass-panel text-center">
            <h2 style="text-align: center; margin-bottom: 0.5rem;">개업공인중개사 회원가입</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem;">가입 후 관리자(010-9128-0586 조항준) 승인이 필요합니다.</p>
            <form id="registerForm" class="flex-col">
                <input type="text" id="name" placeholder="이름 (또는 상호명)" required>
                <input type="email" id="email" placeholder="이메일 (로그인 ID)" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <div style="display: flex; gap: 8px; margin-bottom: 1rem; width: 100%;">
                    <input type="text" id="office_address" placeholder="사무실 주소 (주소 검색 클릭)" required readonly style="margin-bottom: 0; flex: 1; cursor: pointer;" onclick="openAddressSearch()">
                    <button type="button" class="btn btn-secondary" onclick="openAddressSearch()" style="width: auto; padding: 0 12px; margin-bottom: 0; white-space: nowrap; height: 100%; box-sizing: border-box; background: #e2e8f0; color: #1e293b;">검색</button>
                </div>
                <input type="tel" id="phone" placeholder="전화번호 (예: 010-1234-5678)" required>
                <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 16px; text-align: left;">
                    <strong style="color: #475569; font-size: 12px; display: block; margin-bottom: 4px;">📢 정보 공개 안내</strong>
                    <span style="color: #64748b; font-size: 11px; line-height: 1.4; display: block; word-break: keep-all; margin-bottom: 10px;">
                        원활한 협업을 위해 가입 승인 완료 시 <b>이름(상호명), 사무실 주소, 전화번호</b>가 시스템 내 '연락처' 메뉴를 통해 전체 회원에게 공개됩니다.
                    </span>
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 12px; color: #1e293b; font-weight: 800; background: #e2e8f0; padding: 8px 12px; border-radius: 8px;">
                        <input type="checkbox" id="agree_disclosure" required style="width: 18px; height: 18px; margin: 0; cursor: pointer; accent-color: #3b82f6;">
                        위 정보 공개에 동의합니다. (필수)
                    </label>
                </div>
                <button type="submit" class="btn" id="registerBtn">가입 신청</button>
            </form>
            <div id="resultMsg" style="margin-top: 1rem; text-align: center; display: none;"></div>
            <div style="margin-top: 1rem;">
                <a href="login.html" style="color: var(--accent-color); text-decoration: none; font-size: 0.9rem;">이미 계정이 있으신가요? 로그인</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from './supabase-client.js';

        window.openAddressSearch = function() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('office_address').value = data.address;
                }
            }).open();
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const office_address = document.getElementById('office_address').value;
            const phone = document.getElementById('phone').value;
            const resultMsg = document.getElementById('resultMsg');
            
            resultMsg.style.display = 'none';
            document.getElementById('registerBtn').disabled = true;
            document.getElementById('registerBtn').textContent = '가입 처리 중...';

            // 1. Supabase Auth 회원가입
            const { data: authData, error: authError } = await supabase.auth.signUp({
                email,
                password
            });

            if (authError) {
                resultMsg.textContent = '회원가입 에러: ' + authError.message;
                resultMsg.style.color = '#ef4444';
                resultMsg.style.display = 'block';
                document.getElementById('registerBtn').disabled = false;
                document.getElementById('registerBtn').textContent = '가입 신청';
                return;
            }
            
            if (authData.user) {
                try {
                    await supabase.from('users').insert([
                        { id: authData.user.id, name: name, office_address: office_address, phone: phone, role: null }
                    ]);
                } catch (e) {
                    console.error("Users table insert skipped or failed:", e);
                }
            }

            resultMsg.textContent = '가입 신청이 완료되었습니다! 관리자(010-9128-0586 조항준) 승인 후 로그인해 주세요.';
            resultMsg.style.color = '#86efac';
            resultMsg.style.display = 'block';
            document.getElementById('registerBtn').textContent = '신청 완료';
            
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 3000);
        });
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js');
    });
  }
</script>
</body>
</html>
