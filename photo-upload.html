<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>사진 업로드</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            max-width: 480px;
            margin: auto;
        }

        input,
        button {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            font-size: 18px;
        }

        img {
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <h2>사진 업로드</h2>

    <!-- 숨겨진 실제 파일 입력 -->
    <input
        type="file"
        id="photoInput"
        accept="image/*"
        capture="environment"
        style="display: none;"
        onchange="previewLocalPhoto()"
    >

    <!-- 사용자에게 보여지는 촬영 버튼 -->
    <button onclick="document.getElementById('photoInput').click()">
        📷 사진 촬영하기
    </button>

    <div id="status"></div>

    <img id="preview" style="display: none;">

    <!-- 사진을 찍은 후 나타나는 저장 버튼 -->
    <button id="saveBtn" onclick="uploadPhoto()" style="display: none; background-color: #2196F3; color: white; margin-top: 20px;">
        💾 이 사진 저장하기
    </button>

    <script>

        const SUPABASE_URL =
            'https://clzrbyplzjdrrscctcsl.supabase.co';

        const SUPABASE_ANON_KEY =
            'sb_publishable_SqGXeBJseIB_4hjHB6GZ8g_rF_tv11k';

        const supabaseClient =
            window.supabase.createClient(
                SUPABASE_URL,
                SUPABASE_ANON_KEY
            );

        // 1. 촬영 후 로컬에서 바로 미리보기
        function previewLocalPhoto() {
            const file = document.getElementById('photoInput').files[0];
            const status = document.getElementById('status');
            const preview = document.getElementById('preview');
            const saveBtn = document.getElementById('saveBtn');

            if (file) {
                // 서버에 올리기 전에 내 폰(브라우저)에서 바로 미리보기
                const objectUrl = URL.createObjectURL(file);
                preview.src = objectUrl;
                preview.style.display = 'block';
                
                status.innerText = '사진을 확인하고 마음에 들면 아래 저장 버튼을 눌러주세요.';
                saveBtn.style.display = 'block'; // 저장 버튼 보이기
            }
        }

        // 2. 확정 후 서버로 업로드
        async function uploadPhoto() {

            const file =
                document.getElementById('photoInput')
                    .files[0];

            const status =
                document.getElementById('status');
            
            const saveBtn =
                document.getElementById('saveBtn');

            if (!file) {
                status.innerText = '사진을 먼저 촬영하세요.';
                return;
            }

            status.innerText = '저장 중입니다... 잠시만 기다려주세요.';
            saveBtn.style.display = 'none'; // 업로드 중에는 다시 누르지 못하게 숨김

            const fileName =
                Date.now() + '_' + file.name;

            const { data, error } =
                await supabaseClient
                    .storage
                    .from('meter-photos')
                    .upload(fileName, file);

            if (error) {
                status.innerText = '에러: ' + error.message;
                saveBtn.style.display = 'block'; // 에러나면 다시 시도할 수 있게 버튼 표시
                return;
            }

            // 업로드 성공 후 처리
            status.innerText = '✅ 저장이 완료되었습니다!';
            
            // 필요 시 업로드된 URL 확인
            const { data: publicUrlData } =
                supabaseClient
                    .storage
                    .from('meter-photos')
                    .getPublicUrl(fileName);

            console.log("저장된 사진 URL:", publicUrlData.publicUrl);
        }

    </script>

</body>

</html>
